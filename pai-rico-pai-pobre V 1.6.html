      { tipo: 'small', texto: 'Sindicato Nacional dos Editores de Livros, RJ K68p Kiyosaki, Robert T., 1947Pai rico, pai pobre [recurso eletrônico] / Robert T. Kiyosaki e Sharon L. Lechter; tradução Maria Monteiro. — Rio de Janeiro: Elsevier, 2011. recurso digital Tradução de: Rich dad, poor dad Formato: PDF Requisitos do sistema: Adobe Acrobat Reader Modo de acesso: World Wide Web ISBN 978-85-352-5319-1 (recurso eletrônico) 1. Finanças pessoais. 2. Investimentos. 3. Livros eletrônicos. I. Lechter, Sharon L. II. Título. CDD: 332.02401 11-6663 CDU: 330.567.2' },

      { tipo: 'small', texto: 'Este livro é dedicado a todos os pais, de qualquer lugar, os mestres mais importantes de toda criança.' },

      //Página 4 Agradecimentos
      { tipo: 'h2', texto: 'Agradecimentos' },
      { tipo: 'em', texto: 'C' },
      
      { tipo: 'small', texto: 'omo dizer “obrigado” quando há tantos a quem agradecer? Obviamente este livro é um agradecimento a meus pais, poderosos modelos de vida, e a minha mãe, que me ensinou o amor e a bondade.' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Algumas pessoas são responsáveis de forma mais direta pela transformação deste livro em realidade. Agradeço a minha esposa Kim, que torna minha vida mais plena. Kim é minha parceira no casamento, nos negócios e na vida. Sem ela estaria perdido. Aos pais de Kim, Winnie e Bill Meyer, por terem criado uma filha tão maravilhosa. Agradeço a Sharon Lechter por reunir os pedaços deste livro em meu computador. Ao marido de Sharon, Mike, por ser um grande especialista em direito e propriedade intelectual e a seus filhos, Phillip, Shelly e Rick, por sua participação e cooperação. Agradeço a Keith Cunningham por seus conhecimentos financeiros e por sua inspiração. A Larry e Lisa Clark pelo dom da amizade e do incentivo. A Rolf Parta pelo gênio técnico. A Anne Nevin, Bobbi DePorter e Joe Chapon por sua compreensão do aprendizado. A DC e Hohn Harrison, Jannie Tay, Sandy Khoo, Richard e Veronica Tan, Peter Johnston e Suzi Dafnis, Jacqueline Seow, a Nyhl Henson, Michael e Monette Hamlin, Edwin e Camilla Khoo, K.C. e Jessica See, pelo apoio profissional; a Kevin e Sara da InSync pelos gráficos brilhantes. A John e Shari Burley, Bill e Cindy Shopoff, Van Tharp, Diane Kennedy, C.W. Allen, Marilu Deignan, Kim Arries e Tom Weisenborn, por seus conhecimentos financeiros. A Sam Georges, Anthony Robbins, Enid Vien, Lawrence e Jayne Taylor-West, Alan Wright e Zig Ziglar, pela clareza mental. A J.W. Wilson, Marty Weber, Randy Craft, Don Mueller, Brad Walker, Blair e Eileen Singer, Wayne e Lynn Morgan, Mimi Brennan, Jerome Summers, Dr. Peter Powers, Will Hepburn, Dr. Enrique Teuscher, Dr. Robert Marin, Betty Oyster, Julie Belden, Jamie Danforth, Cherie Clark, Rick Merica, Joia Jitahide, Jeff Bassett, Dr. Tom Burns e Bill Galvin, pela grande amizade e apoio aos projetos. Ao Center Managers e aos milhares de graduados de Money and You e The Business School for Entrepreneurs. E a Frank Crerie, Clint Miller, Thomas Allen e Norman Long, por serem grandes parceiros nos negócios.' },

      //INTRODUÇÃO
      { tipo: 'h3', texto: 'INTRODUÇÃO' },
      { tipo: 'h2', texto: 'Há uma necessidade' },
      { tipo: 'p', texto: 'A escola prepara as crianças para o mundo real? “Estude com afinco, tire boas notas e você encontrará um bom emprego com um salário alto”, costumavam falar meus pais. O objetivo deles na vida era oferecer instrução superior para mim e para minha irmã mais velha, de modo que no futuro tivéssemos maiores oportunidades de sucesso. Quando finalmente me formei em 1976 — com destaque, pois fui um dos primeiros lugares da turma no curso de contabilidade da Florida State University —, meus pais finalmente atingiram seu objetivo. De acordo com o “Plano Diretor”, fui contratada por um dos “Oito Grandes” escritórios de contabilidade e imaginava à minha frente uma longa carreira e uma aposentadoria enquanto ainda fosse jovem.' },
      
{ tipo: 'big', texto: 'Meu marido, Michael, seguiu um percurso semelhante. Ambos viemos de famílias trabalhadoras, de recursos modestos, mas com uma forte ética em relação ao trabalho. Michael também se formou com louvor, e ele o fez duas vezes: primeiro em engenharia e depois em direito. Rapidamente foi contratado por um prestigioso escritório de advocacia em Washington, D.C., especializado em patentes. Seu futuro parecia brilhante, com uma trajetória profissional bem definida e uma aposentadoria precoce garantida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora nossas carreiras tenham sido bem-sucedidas, elas não foram exatamente o que esperávamos. Ambos mudamos de emprego várias vezes, pelas razões certas. Contudo, não há planos de pensão garantidos: nossos fundos de aposentadoria só aumentam em função de nossas contribuições individuais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Michael e eu somos muito felizes no casamento e temos três filhos maravilhosos. Enquanto escrevo este livro, dois deles já estão na faculdade e o terceiro está começando o segundo grau. Gastamos uma fortuna para assegurar-nos de que nossos filhos estão recebendo a melhor formação possível.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dia, em 1996, um dos meus filhos chegou em casa decepcionado com a escola. Estava aborrecido e cansado de estudar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Por que tenho de perder tempo estudando coisas que nunca aplicarei na vida real? — protestou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sem pensar, respondi:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Porque se você não tiver boas notas, você não vai entrar na faculdade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mesmo que não entre na faculdade — replicou — vou ficar rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se você não se formar, não vai conseguir um bom emprego — respondi com uma ponta de pânico e preocupação maternal. — E se você não tiver um bom emprego, como é que você pode ficar rico?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu filho deu um sorriso forçado e balançou a cabeça. Já tínhamos levado este papo várias vezes. Ele abaixou a cabeça e desviou o olhar. Minhas palavras cheias de sabedoria materna caíam novamente em ouvidos surdos. Embora esperto e determinado, ele sempre se mostrou um garoto bem-educado e respeitador.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mãe! — começou. Era minha vez de ouvir um sermão. — Caia na real! Olhe o que está acontecendo. As pessoas mais ricas não ficaram ricas por causa do estudo. Veja o Michael Jordan e a Madonna. Até o Bill Gates largou Harvard para fundar a Microsoft, e ainda tem pouco mais de trinta anos. Há um arremessador de beisebol que ganha mais de US$4 milhões embora digam que é “desafiado mentalmente”.[1]' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Seguiu-se um prolongado silêncio. Percebi que estava dando a meu filho os mesmos conselhos que meus pais tinham me dado. O mundo havia mudado, mas os conselhos continuavam os mesmos. Boa formação e notas altas não são mais suficientes para garantir o sucesso e ninguém parece ter se dado conta, a não ser nossos filhos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mãe — continuou ele —, não quero trabalhar tanto como você e o papai. Vocês ganham muito dinheiro, moramos numa casa grande e temos muitos brinquedos. Se seguir seu conselho vou acabar como vocês, trabalhando demais só para pagar mais impostos e me endividar. Não há mais segurança no emprego; já sei tudo a respeito de downsizing e de rightsizing.[2] Também sei que o pessoal que se forma na universidade não está ganhando tanto quanto antigamente. Sei que não posso depender da Seguridade Social ou dos fundos de pensão da empresa para aposentar-me. Preciso de novas respostas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele estava certo. Ele precisava de novas respostas e eu também. O conselho de meus pais pode ter funcionado para as pessoas que nasceram antes de 1945, mas pode ser um desastre para os que nasceram em um mundo em rápida transformação. Não basta dizer para meus filhos “Vá para a escola, tire boas notas e procure um emprego tranquilo e seguro”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu sabia que tinha que procurar novas formas de orientar a educação de meus filhos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como mãe e contadora, preocupava-me com a falta de instrução financeira nas escolas que nossos filhos frequentam. Muitos dos jovens de hoje têm cartão de crédito antes de concluir o segundo grau e, todavia, nunca tiveram aulas sobre dinheiro e a maneira de investi-lo, para não falar da compreensão do impacto dos juros compostos sobre os cartões de crédito. Simplesmente, são analfabetos financeiros e, sem o conhecimento de como o dinheiro funciona, eles não estão preparados para enfrentar o mundo que os espera, um mundo que dá mais ênfase à despesa do que à poupança.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando meu filho mais velho ficou totalmente endividado no cartão de crédito, no primeiro ano da faculdade, eu o ajudei a rasgar os cartões e comecei a procurar um programa que me ajudasse a educar meus filhos em termos de questões financeiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No ano passado, meu marido ligou do escritório: “Encontrei alguém que pode ajudar você”, disse ele. “Seu nome é Robert Kiyosaki. Ele é empresário e investidor e está aqui para patentear um produto educacional. Penso que é o que você estava procurando.”' },

      { tipo: 'br', texto: '' },
       { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Justamente o que eu estava procurando' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu marido, Mike, ficou tão impressionado com CASHFLOW, o novo produto educacional que Robert Kiyosaki estava desenvolvendo, que conseguiu que nós participássemos de um teste do protótipo. Como se tratava de um produto educacional, perguntei também a minha filha de 19 anos, caloura na universidade local, se ela gostaria de participar do teste e ela concordou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Cerca de quinze pessoas, divididas em três grupos, participaram do teste. Mike estava certo. Era esse o produto educacional que eu estava procurando. Parecia um tabuleiro coloridíssimo de Banco Imobiliário, contudo havia duas pistas: uma interna e outra externa. O objetivo do jogo era sair da pista interna, que Robert chamava de “Corrida dos Ratos”,[3] e alcançar a pista externa, ou “Pista de Alta Velocidade”.[4] Como dizia Robert, a Pista de Alta Velocidade simula o jogo dos ricos na vida real.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então Robert descreveu para nós a “Corrida dos Ratos”:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Se você observar a vida das pessoas de instrução média, trabalhadoras, você verá uma trajetória semelhante. A criança nasce e vai para a escola. Os pais se orgulham porque o filho se destaca, tira notas boas ou altas e consegue entrar na universidade. O filho se forma, talvez faça uma pós-graduação, e então faz exatamente o que estava determinado: procura um emprego ou segue uma carreira segura e tranquila. Encontra esse emprego, quem sabe de médico ou de advogado, ou entra para as Forças Armadas ou para o serviço público. Geralmente, o filho começa a ganhar dinheiro, chega um monte de cartões de crédito e começam as compras, se é que já não tinham começado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Com dinheiro para torrar, o filho vai aos mesmos lugares onde vão os jovens, conhece alguém, namora e, às vezes, casa. A vida é então maravilhosa porque atualmente marido e mulher trabalham. Dois salários são uma bênção. Eles se sentem bem-sucedidos, seu futuro é brilhante, e eles decidem comprar uma casa, um carro, uma televisão, tirar férias e ter filhos. O desejo se concretiza. A necessidade de dinheiro é imensa. O feliz casal concluiu que suas carreiras são da maior importância e começa a trabalhar cada vez mais para conseguir promoções e aumentos. A renda aumenta e vem outro filho... e a necessidade de uma casa maior. Eles trabalham ainda mais arduamente, tornam-se funcionários melhores. Voltam a estudar para obter especialização e ganhar mais dinheiro. Talvez arrumem mais um emprego. Suas rendas crescem, mas a alíquota do imposto de renda, o imposto predial da casa maior, as contribuições para a Seguridade Social e outros impostos também crescem. Eles olham para aquele contracheque alto e se perguntam para onde todo aquele dinheiro vai. Aplicam em alguns fundos mútuos e pagam as contas do supermercado com cartão de crédito. As crianças já têm 5 ou 6 anos e é necessário poupar não só para os aumentos das mensalidades escolares, mas também para a velhice.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O feliz casal, nascido há 35 anos, está agora preso na armadilha da Corrida dos Ratos pelo resto de seus dias. Eles trabalham para os donos da em presa, para o governo, quando pagam os impostos, e para o banco, quando pagam cartões de crédito e hipoteca.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então eles aconselham seus filhos a estudar com afinco, obter boas notas e conseguir um emprego ou carreira seguros. Eles não aprendem nada sobre dinheiro, a não ser com aqueles que se aproveitam de sua ingenuidade e trabalham arduamente a vida inteira. O processo se repete com a geração seguinte de trabalhadores. Esta é a Corrida dos Ratos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A única maneira de sair da “Corrida dos Ratos” é provar sua proficiência tanto na contabilidade quanto no investimento, que são dois dos assuntos mais difíceis de dominar. Como auditora independente formada que já trabalhou para um dos Oito Grandes escritórios de contabilidade, fiquei surpresa ao ver que Robert tornara o aprendizado desses dois temas divertido e empolgante. O processo estava tão bem dissimulado que enquanto trabalhávamos diligentemente para sair da “Corrida dos Ratos” esquecíamos rapidamente que estávamos aprendendo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Logo o teste do produto se transformou em uma tarde divertida em que falei com minha filha de coisas que nunca tínhamos discutido antes. Como contadora, jogar um jogo que precisava de uma Demonstração de Renda e de um Balanço era fácil, de modo que tive tempo para ajudar minha filha e os demais jogadores do meu grupo a entender conceitos que eles desconheciam. Naquele dia, fui a primeira pessoa — e a única de todo o grupo do teste — a sair da “Corrida dos Ratos”. Saí em cinquenta minutos, embora o jogo continuasse por cerca de três horas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na minha mesa estavam um gerente de banco, o dono de uma empresa e um programador de computadores. O que me perturbou muito foi o pouco que essas pessoas sabiam sobre contabilidade e investimento, assuntos importantes para suas vidas. Fiquei imaginando como eles administravam as questões financeiras na vida real. Podia entender que minha filha de 19 anos não soubesse nada, mas eles eram adultos com pelo menos o dobro de sua idade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Depois que terminei a “Corrida dos Ratos”, fiquei acompanhando por duas horas minha filha e aqueles adultos instruídos e abastados que rolavam os dados e movimentavam seus marcadores. Embora estivesse contente de vêlos aprender tanto, fiquei incomodada ao perceber como os adultos tinham pouco conhecimento dos princípios básicos da contabilidade e do investimento. Eles não conseguiam ver com clareza a relação entre suas Demonstrações de Renda e seus Balanços. À medida que compravam e vendiam ativos, eles tinham dificuldade em lembrar que cada transação poderia ter impacto sobre o fluxo de renda mensal. Pensei em quantos milhões de pessoas, no mundo real, lutam com problemas financeiros só porque nunca estudaram esse tema.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Graças a Deus, estes estavam se divertindo e se distraíam na ânsia de ganhar o jogo, disse para mim mesma. Quando Robert deu por finalizado o teste, ele nos concedeu quinze minutos para discutir e criticar CASHFLOW entre nós mesmos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O dono de empresa do meu grupo não estava feliz. Ele não gostou do jogo. “Não preciso conhecer isso”, disse. “Tenho contadores, gerentes de banco e advogados que me assessoram nestes assuntos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Robert lhe respondeu: “Você já notou que há uma porção de contadores que não ficam ricos? E gerentes de banco, e advogados, e corretores de valores e corretores imobiliários? Eles sabem muita coisa, e em geral são inteligentes, mas a maioria não é rica. Como nossas escolas não ensinam o que os ricos conhecem, seguimos os conselhos dessas pessoas. Mas, um dia, você está dirigindo na estrada, preso no engarrafamento enquanto tenta chegar ao escritório e olha para o lado e vê seu contador preso no mesmo engarrafamento. Você olha para o outro lado e vê seu gerente de banco. Isso deveria dizerlhe alguma coisa.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O programador de computadores também não ficou muito impressionado com o jogo: “Posso comprar um software que me ensine tudo isto.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O gerente de banco, contudo, estava empolgado: “Estudei isto na escola — quer dizer, a parte da contabilidade — mas nunca soube aplicá-la à vida real. Agora sei. Preciso sair da Corrida dos Ratos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas foi o comentário de minha filha o que mais me impressionou: “Me diverti aprendendo” — disse. “Aprendi um monte de coisas sobre como o dinheiro funciona e como investi-lo.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então acrescentou: “Agora posso escolher uma profissão pelo que quero fazer e não para ter um emprego seguro ou mordomias ou pelo salário. Se eu aprender o que este jogo ensina, ficarei livre para fazer e estudar o que meu coração pede... e não porque as empresas estão à procura de determinadas habilidades profissionais. Se aprender isto, não vou ter de me preocupar com segurança no emprego e Seguridade Social como a maioria de minha turma.” Não consegui ficar para conversar com Robert depois que o jogo acabou, mas concordei em voltar a me encontrar com ele para falar mais do projeto. Sabia que ele queria usar o jogo para ajudar os outros a ficarem mais espertos do ponto de vista financeiro e estava ansiosa para ouvir mais a respeito de seus projetos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu marido e eu marcamos um jantar com Robert e sua esposa para dali a alguns dias. Embora fosse nosso primeiro encontro social, parecia que nos conhecíamos há anos. Descobrimos que tínhamos muito em comum. Falamos de tudo, de esportes e teatro a restaurantes e questões socioeconômicas. Falamos do mundo em transformação. Ficamos conversando bastante tempo sobre como a maioria dos americanos tem pouca ou nenhuma poupança para a aposentadoria, bem como sobre a quase falência da Seguridade Social e do Medicare. [5] Meus filhos teriam de financiar a aposentadoria dos 75 milhões de baby boomers? [6] Ficamos imaginando se as pessoas percebem como é arriscado depender de planos de pensão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A principal preocupação de Robert era o hiato crescente entre os que têm e os que não têm, nos Estados Unidos e nos outros países. Empresário autodidata que viajava em torno do mundo para fazer investimentos, Robert tinha conseguido se aposentar aos 47 anos. Ele saiu do conforto da aposentadoria porque tinha a mesma preocupação que eu tinha em relação a meus filhos. Ele sabe que o mundo mudou, mas que a educação não mudou com ele. Na opinião de Robert, as crianças passam anos em um sistema educacional ultrapassado, estudando matérias que jamais usarão, preparando-se para um mundo que não existe mais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Hoje, o conselho mais perigoso que se pode dar a um garoto é Vá para a escola, tire boas notas e procure um emprego seguro”, ele gosta de dizer. “Este velho conselho é um mau conselho. Se você pudesse ver o que está acontecendo na Ásia, na Europa, na América do Sul estaria tão preocupado quanto eu.” É um mau conselho, acredita ele, “porque se você quer que seu filho tenha um futuro financeiro seguro, ele não pode jogar pelas velhas regras. É arriscado demais”. Perguntei então o que ele entendia por “velhas regras”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— As pessoas como eu jogam por regras diferentes das suas — disse. — O que acontece quando uma grande empresa anuncia um downsizing?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Às pessoas são demitidas — respondi. — As famílias sofrem. O desemprego aumenta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, mas o que acontece com a empresa, em especial com uma empresa de capital aberto que tem ações na bolsa?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Em geral o preço das ações aumenta quando se anuncia o downsizing' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— respondi. — O mercado gosta quando uma empresa reduz seus custos salariais, seja mediante a automação, seja apenas racionalizando o uso da mão de obra.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Certo — respondeu ele. — E quando o preço das ações aumenta, as pessoas como eu, os acionistas, ficam mais ricas. Isso é o que quero dizer sobre regras diferentes. Os empregados perdem; os proprietários e os investidores ganham.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Robert estava descrevendo não apenas a diferença entre empregado e empregador mas também entre controlar seu próprio destino e entregar esse controle a alguém.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas para a maioria das pessoas é difícil entender por que isso acontece — disse eu. — Elas só pensam que isso não é justo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É por isso que é uma besteira falar para uma criança simplesmente “Tenha uma boa instrução” — disse. — É besteira imaginar que a formação oferecida pelo sistema de ensino preparará seus filhos para o mundo que eles encontrarão depois de formados. As crianças precisam de mais educação. Uma instrução diferente. E elas precisam conhecer as regras. As regras diferentes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Robert continuou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Há as regras seguidas pelos ricos e há as regras seguidas pelos outros' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '95% da população — disse. — E os 95% aprendem essas regras em casa e na escola. É por isso que hoje é tão arriscado dizer a uma criança, simplesmente, “Estude bastante e procure um emprego”. Hoje uma criança precisa de uma formação mais sofisticada e o sistema corrente não está atendendo a essa necessidade. Não estou preocupado com quantos computadores há na sala de aula ou com quanto as escolas gastam. Como o sistema educacional pode ensinar o que não conhece? E como os pais podem ensinar a seus filhos o que a escola não ensina? Como você pode ensinar contabilidade para uma criança? Ela não achará aborrecido? E como os pais podem ensinar a investir se eles próprios são avessos ao risco? Em vez de ensinar a meus filhos a buscar a segurança, decidi que o melhor era ensiná-los a ficar espertos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então como é que você ensinaria a uma criança sobre tudo isso de que estamos falando? — perguntei a Robert. — Como podemos facilitar a tarefa dos pais, especialmente quando eles próprios não sabem do que se trata?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Escrevi um livro sobre o assunto — foi sua resposta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E onde está?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Em meu computador. Está lá há anos, em pedaços. De vez em quando acrescento algo mas nunca consegui organizar o material. Comecei a escrevêlo depois que meu outro livro virou best-seller, mas nunca acabei o livro novo. Só tenho pedaços.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E estava em pedaços mesmo. Depois de ler os capítulos, achei que o livro tinha méritos e que devia ser publicado, sobretudo nestes tempos em transformação. Concordei em ser coautora do livro de Robert.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Perguntei-lhe de quanta informação financeira ele achava que uma criança precisaria. Ele falou que dependeria da criança. Ele sabia que desde garoto queria ser rico e teve a felicidade de encontrar uma figura paterna que era rica e que quis orientá-lo. “A educação é o fundamento do sucesso”, disse Robert. Da mesma forma que as habilidades acadêmicas são importantes, as habilidades financeiras e de comunicação também o são.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que se segue é a história dos dois pais de Robert, um rico e outro pobre, mostrando as habilidades que ele desenvolveu ao longo de uma vida. O contraste entre os dois pais oferece uma perspectiva importante. Apoiei, editei e compilei este livro. Para os contadores que o lerem, peço que suspendam seus conhecimentos acadêmicos e abram suas mentes às teorias apresentadas por Robert. Embora muitas delas contestem os próprios princípios contábeis geralmente aceitos, elas oferecem uma valiosa percepção da forma como os verdadeiros investidores analisam suas decisões de investimento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando nós, como pais, aconselhamos nossos filhos a “ir para a escola, estudar muito e obter um bom emprego”, fazemos isso muitas vezes em decorrência de um hábito cultural. Sempre foi certo fazer isso. Quando encontrei Robert, suas ideias de início me espantaram. Tendo sido criado por dois pais, ele foi ensinado a procurar dois objetivos diferentes. Seu pai instruído o aconselhava a trabalhar para uma grande empresa. Seu pai rico o aconselhava a ser dono de uma grande empresa. Ambas as trajetórias de vida exigiam instrução, mas os objetos de estudo eram completamente diferentes. Seu pai instruído o incentivava a ser uma pessoa instruída. Seu pai rico o incentivava a contratar pessoas instruídas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ter dois pais causou muitos problemas. O pai verdadeiro de Robert era superintendente de educação no estado do Havaí. Quando Robert estava com 16 anos, a ameaça de “Se você não tirar boas notas, você não vai conseguir um bom emprego” tinha pouco efeito. Ele já sabia que sua trajetória era ser dono de empresas, não trabalhar para elas. De fato, se ele não houvesse tido no curso secundário um orientador escolar sábio e persistente, poderia não ter continuado os estudos. Ele admite isso. Estava ansioso para começar a acumular seus ativos, mas finalmente concordou que uma educação superior também lhe seria útil.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na verdade, as ideias deste livro são provavelmente muito extremas e radicais para a maioria dos pais. Alguns estão tendo dificuldades até para manter seus filhos na escola. Mas à luz de nossos tempos em transformação, como pais, precisamos estar abertos a ideias novas e ousadas. Incentivar filhos a ser empregados é aconselhar nossos filhos a pagar mais do que a justa parcela em impostos ao longo da vida, com pouca ou nenhuma esperança de uma aposentadoria. De fato, a maioria das famílias trabalha de janeiro a meados de maio para o governo, apenas para cobrir seus impostos. São necessárias novas ideias e este livro as oferece.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Robert afirma que os ricos educam seus filhos de forma diferente. Eles ensinam aos filhos em casa, em volta da mesa de jantar. Essas ideias podem não ser aquelas que você escolheria para discutir com seus filhos, mas obrigada por olhar para elas. E eu o aconselho a continuar buscando. Em minha opinião, como mãe e auditora independente, o conceito de simplesmente ter boas notas e achar um bom emprego é uma ideia velha. Precisamos de novas ideias e de uma educação diferente. Talvez falar para seus filhos sobre lutar para serem bons funcionários e criarem sua própria empresa de investimentos não seja uma ideia tão má.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Espero como mãe que este livro auxilie outros pais. Robert espera poder informar a outras pessoas que qualquer um pode alcançar a prosperidade se decidir fazê-lo. Se você for um jardineiro ou um porteiro ou até um desempregado, você tem a capacidade de instruirse e de ensinar a quem você ama a cuidar de si próprio financeiramente. Lembre que a inteligência financeira é o processo mental pelo qual resolvemos nossos problemas financeiros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Hoje estamos enfrentando mudanças globais e tecnológicas iguais ou até maiores que as ocorridas anteriormente. Ninguém tem uma bola de cristal, mas um fato é certo: à nossa frente descortinam-se mudanças que estão além de nossa realidade. Quem sabe o que o futuro nos trará? Mas aconteça o que acontecer, temos duas escolhas fundamentais: a segurança ou a inteligência, preparando-nos, instruindo-nos e despertando nosso gênio financeiro e o de nossas crianças. — Sharon Lechter' },

      { tipo: 'br', texto: '' },



      //Capítulo 1
      { tipo: 'h3', texto: 'CAPÍTULO UM' },
      { tipo: 'h2', texto: 'Pai rico, Pai pobre' },
      { tipo: 'small', texto: 'por Robert Kiyosaki' },
      { tipo: 'p', texto: 'Tive dois pais, um rico e outro pobre. Um era muito instruído e inteligente; tinha o Ph.D. e fizera um curso universitário de graduação, com duração de quatro anos, em menos de dois. Foi então para a Universidade de Stanford, para a Universidade de Chicago e para a Northwestern University, sempre com bolsa de estudos. O outro pai nunca concluiu o segundo grau.' },

{ tipo: 'big', texto: 'Ambos foram homens bem-sucedidos em suas carreiras e trabalharam arduamente durante toda a vida. Ambos auferiam rendas consideráveis. Contudo, um sempre enfrentou dificuldades financeiras. O outro se tornou o homem mais rico do Havaí. Um morreu deixando milhões de dólares para sua família, para instituições de caridade e para sua igreja. O outro deixou contas a pagar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ambos eram homens fortes, carismáticos e influentes. Ambos me ofereceram conselhos, mas não aconselharam as mesmas coisas. Ambos acreditavam firmemente na instrução mas não sugeriram os mesmos estudos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se eu tivesse tido um único pai, teria tido de aceitar ou rejeitar seus conselhos. Tendo dois, tive a escolha entre pontos de vista contrastantes; a visão de um homem rico e a visão de um homem pobre.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em vez de aceitar ou rejeitar simplesmente um desses pontos de vista, me descobri pensando mais, comparando-os e escolhendo por mim mesmo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O problema é que o homem rico ainda não era rico e o homem pobre ainda não era pobre. Ambos estavam no início de suas carreiras e lutavam por dinheiro e pela família. Mas tinham ideias muito diferentes sobre o dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por exemplo, um dos pais dizia: “O amor ao dinheiro é a raiz de todo mal.” O outro: “A falta de dinheiro é a raiz de todo mal.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando garoto, a influência de dois pais, ambos homens fortes, era uma situação complicada. Eu queria ser um bom filho e ouvia, mas os dois pais não falavam a mesma língua. O contraste entre suas ideias, especialmente no que se referia ao dinheiro, era tão extremo que eu ficava curioso e intrigado. Comecei a pensar profundamente sobre o que cada um deles dizia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muito do meu tempo era gasto refletindo, fazendo-me perguntas como “Por que ele fala isso?”, a respeito das afirmações dos pais. Teria sido muito mais simples falar “Sim, ele está certo. Concordo com isso”. Ou simplesmente rejeitar o ponto de vista dizendo “O velho não sabe do que está falando”. Porém, tendo dois pais que eu amava, fui forçado a pensar e a escolher um dos caminhos por mim mesmo. Esse processo de escolher por mim mesmo se mostrou muito valioso no longo prazo, não se tratou simplesmente da aceitação ou da rejeição de um único ponto de vista.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma das razões pelas quais os ricos ficam mais ricos, os pobres, mais pobres e a classe média luta com as dívidas é que o assunto dinheiro não é ensinado nem em casa nem na escola. Muitos de nós aprendemos sobre o dinheiro com nossos pais. O que pode dizer um pai pobre a respeito do dinheiro para seu filho? Ele diz simplesmente: “Fique na escola e estude muito.” O filho pode se formar com ótimas notas; mas com uma programação financeira e uma mentalidade de pessoa pobre. Isso foi aprendido pelo filho em sua tenra idade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O dinheiro não é ensinado nas escolas. As escolas se concentram nas habilidades acadêmicas e profissionais mas não nas habilidades financeiras. Isso explica por que médicos, gerentes de banco e contadores inteligentes que tiveram ótimas notas quando estudantes terão problemas financeiros durante toda a sua vida. Nossa impressionante dívida nacional se deve em boa medida a políticos e funcionários públicos muito instruídos que tomam decisões financeiras com pouco ou nenhum treinamento na área do dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas vezes penso no novo milênio e imagino o que acontecerá quando houver milhões de pessoas precisando de assistência financeira e médica. Eles se tornarão dependentes do apoio financeiro de suas famílias ou do governo. O que acontecerá quando o Medicare e a Seguridade Social ficarem sem dinheiro? Como uma nação sobreviverá se ensinar sobre dinheiro continuar sendo tarefa dos pais — cuja maioria será ou já é pobre?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como tive dois pais a me influenciar, aprendi com ambos. Tive que refletir sobre os conselhos de cada um deles e ao fazê-lo percebi o poder e o impacto dos nossos pensamentos sobre nossa própria vida. Por exemplo, um pai costumava falar “Não dá para comprar isso”. O outro proibia o uso dessas palavras. Insistia em que eu falasse: “O que posso fazer para comprar isso?” Num caso temos uma afirmação, no outro uma pergunta. Um deixa você sem alternativa, o outro obriga você a refletir. Meu pai-que-logo-ficaria-rico explicava que ao falar automaticamente “Não dá para comprar isso” seu cérebro para de trabalhar. Ao perguntar “O que posso fazer para comprar isso?”, você mantém seu cérebro trabalhando. Ele não estava dizendo que comprasse tudo o que desejasse. Ele incentivava fanaticamente que exercitasse minha mente, o computador mais poderoso do mundo. “Meu cérebro fica mais forte a cada dia porque eu o exercito. Quanto mais forte fica, mais dinheiro ganho.” Ele acreditava que repetir mecanicamente “Não dá para comprar isso” era um sinal de preguiça mental.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora ambos os pais trabalhassem com afinco, observei que um deles tinha o hábito de pôr seu cérebro a dormir quando o assunto era dinheiro e o outro tinha o costume de exercitar seu cérebro. O resultado era que, ao longo do tempo, um dos pais ficava mais forte financeiramente, e o outro enfraquecia. Isso não é muito diferente do que ocorre quando uma pessoa faz exercícios físicos regulares enquanto a outra senta no sofá e fica assistindo à televisão. O exercício físico adequado aumenta suas chances de ter boa saúde, e o exercício mental adequado aumenta suas chances de ficar rico. A preguiça reduz tanto a saúde quanto a riqueza.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meus dois pais tinham atitudes mentais diferentes. Um acreditava que os ricos deviam pagar mais impostos para atender os menos afortunados. O outro dizia: “Os impostos punem os que produzem e recompensam os que não produzem.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dos pais recomendava: “Estude arduamente para poder trabalhar em uma boa empresa.” O outro falava: “Estude arduamente para poder comprar uma boa empresa.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dos pais dizia: “Não sou rico porque tenho filhos.” O outro: “Tenho que ser rico por causa de vocês, meus filhos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um incentivava as conversas sobre dinheiro e negócios na hora do jantar. O outro proibia que se falasse do assunto durante as refeições.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dizia: “Em questões de dinheiro seja cuidadoso, não se arrisque.” O outro: “Aprenda a administrar o risco.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um recomendava: “Nossa casa é nosso maior investimento e nosso maior patrimônio.” O outro: “Minha casa é uma dívida e se sua casa for seu maior investimento, você terá problemas.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ambos os pais pagavam suas contas no prazo, mas um deles pagava suas contas em primeiro lugar enquanto o outro as deixava para a última hora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um deles acreditava que a empresa ou o governo deveria cuidar de você e de suas necessidades. Estava sempre preocupado com aumentos salariais, planos de aposentadoria, benefícios médicos, licenças de saúde, férias e outros benefícios. Ele ficava impressionado com dois de seus tios que foram para o exército e se aposentaram com vários benefícios após vinte anos de serviço ativo. Ele adorava a ideia de assistência médica e serviços de reembolso de alimentos que os militares ofereciam a seus aposentados. Ele também se empolgava com as cátedras vitalícias do sistema universitário. A ideia de estabilidade no emprego e benefícios trabalhistas lhe parecia às vezes mais importante do que o próprio emprego. Dizia frequentemente: “Trabalhei muito para o governo, mereço essas mordomias.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O outro pai acreditava na total autossuficiência financeira. Ele sempre se manifestava contra a mentalidade dos “direitos” e falava que isso estava criando pessoas fracas e financeiramente necessitadas. Ele dava muita ênfase à competência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dos pais lutava para poupar alguns poucos dólares. O outro simplesmente criava investimentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um pai me ensinou a escrever um currículo impressionante para que eu pudesse encontrar um bom emprego. O outro me ensinou a fazer sólidos planos financeiros e de negócios de modo que eu pudesse criar empregos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ter dois pais fortes me proporcionou o luxo de observar o impacto de diferentes formas de pensar sobre a própria vida. Observei que as pessoas moldam suas vidas por meio de seus pensamentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por exemplo, meu pai pobre sempre me dizia: “Nunca vou ficar rico.” E isso acabou acontecendo. Meu pai rico, por outro lado, sempre se referia a si próprio como sendo rico. Ele dizia coisas como: “Sou um homem rico e pessoas ricas não fazem isto.” Mesmo que estivesse totalmente quebrado após um revés financeiro, ele continuava a se considerar um homem rico. Ele se justificava dizendo: “Há uma diferença entre ser pobre e estar quebrado. Estar quebrado é algo temporário, ser pobre é algo eterno.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai pobre dizia: “Não ligo para dinheiro” ou “O dinheiro não é importante.” Meu pai rico sempre dizia: “Dinheiro é poder.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O poder de nossos pensamentos nunca poderá ser medido ou avaliado, mas desde jovem se tornou óbvio para mim a tomada de consciência de meus pensamentos e da forma como me expressava. Observei que meu pai pobre não era pobre por causa do dinheiro que ganhava, que era bastante, mas por causa de seus pensamentos e ações. Quando garoto, tendo dois pais, me tornei consciente de que deveria ser cuidadoso com os pensamentos que decidisse adotar como meus. A quem ouviria — a meu pai rico ou a meu pai pobre?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora ambos tivessem um enorme respeito pela educação e pelo aprendizado, eles discordavam quanto ao que era importante aprender. Um queria que eu estudasse arduamente, me formasse e conseguisse um bom emprego para trabalhar pelo dinheiro. Ele queria que eu estudasse para me tornar um profissional, um advogado ou um contador, ou que fosse para uma faculdade de administração para obter um MBA. O outro me incentivava a estudar para ficar rico, para entender como funciona o dinheiro e para aprender como fazêlo trabalhar para mim. “Não trabalho por dinheiro”, costumava repetir uma e outra vez. “O dinheiro trabalha para mim.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Com 9 anos resolvi ouvir e aprender com meu pai rico tudo sobre dinheiro. Optei por não dar ouvidos a meu pai pobre, mesmo que fosse ele quem possuísse todos os títulos universitários.' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'h3', texto: 'Uma lição de Robert Frost' },
      
      { tipo: 'big', texto: 'Robert Frost é meu poeta favorito. Embora goste de muitas de suas poesias, a minha preferida é The Road Not Taken. Quase todos os dias recorro a suas lições:' },
      
      { tipo: 'h6', texto: 'The road not taken[7]' },
      
      { tipo: 'i', texto: 'Two roads diverged in a yellow wood,' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'And sorry I could not travel both' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'And be one traveler, long I stood' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'And looked down one as far as I could' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'To where it bent in the undergrowth;' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'Then took the other, as just as fair, And' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'having perhaps the better claim, Because' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'it was grassy and wanted wear Though as' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'for that the passing there Had worn them' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'really about the same,' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'And both that morning equally lay' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'In leaves no step had trodden black. Oh, I' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'kept the first for another day! Yet knowing' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'how way leads onto way, I doubted if I' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'should ever come back.' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'I shall be telling this with a sigh' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'Somewhere ages and ages hence;' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'Two roads diverged in a wood, andI— I' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'took the one less traveled by,' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'i', texto: 'And that has made all the difference.' },

      { tipo: 'blockquote', texto: 'ROBERT FROST, 1916' },
      
      { tipo: 'big', texto: 'E isso fez toda a diferença.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No correr dos anos pensei muitas vezes no poema de Robert Frost. Ao escolher não dar atenção aos conselhos e atitudes quanto a dinheiro de meu pai muito instruído, tomei uma decisão dolorosa, mas foi uma decisão que determinou o resto de minha vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Com a decisão de quanto a quem dar ouvidos, teve início minha educação sobre dinheiro. Meu pai rico me deu lições ao longo de um período de trinta anos, até que cheguei aos 39 anos de idade. Suas lições pararam quando ele percebeu que eu conhecia e entendia plenamente o que ele estava tentando martelar na minha cabeça, às vezes, bastante dura.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O dinheiro é uma forma de poder. Mais poderosa ainda, entretanto, é a instrução financeira. O dinheiro vem e vai, mas se você tiver sido educado quanto ao funcionamento do dinheiro, você adquire poder sobre ele e pode começar a construir riqueza. O motivo pelo qual o simples pensamento positivo não funciona é porque a maioria das pessoas foi à escola e nunca aprendeu como o dinheiro funciona, e assim passam suas vidas trabalhando pelo dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como comecei com apenas 9 anos, as lições que meu pai rico me ensinou foram simples. E quando tudo foi dito e tudo foi feito, encontramos apenas seis lições, repetidas ao longo de trinta anos. Este livro trata dessas seis lições, expostas da maneira mais simples possível, da forma como meu pai rico as passou para mim. Estas lições não pretendem ser respostas e sim marcos. Marcos que ajudarão você e seus filhos a enriquecerem, não importa o que aconteça em um mundo de crescente mudança e incerteza.' },

      //Capítulo 2
      { tipo: 'h3', texto: 'CAPÍTULO DOIS:' },
      { tipo: 'h3', texto: ' Lição 1:' },
      { tipo: 'h2', texto: 'Os ricos não trabalham pelo dinheiro' },
      
{ tipo: 'big', texto: '— ' },

{ tipo: 'em', texto: 'P' },

{ tipo: 'small', texto: 'ai, como é que a gente fica rico?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai largou o jornal.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Por que você quer ficar rico, filho?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Porque a mãe do Jimmy chegou hoje num Cadillac novo e eles iam passar o fim de semana na praia. Ele chamou três amiguinhos, mas o Mike e eu não fomos convidados. Eles disseram que não chamavam a gente porque éramos “garotos pobres”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Falaram isso mesmo? — perguntou meu pai, incrédulo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Falaram mesmo — respondi magoado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai balançou a cabeça em silêncio, ajeitou os óculos e voltou para a leitura do jornal. Fiquei esperando a resposta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Era o ano de 1956. Eu tinha 9 anos. Por algum golpe de sorte, eu frequentava a mesma escola pública onde estudavam os filhos dos ricos. A cidade vivia especialmente em função das usinas de açúcar. Os gerentes das usinas e outras pessoas influentes da cidade, como médicos, proprietários de estabelecimentos comerciais e gerentes de bancos, matriculavam seus filhos nessa escola. Terminado o primeiro grau, estes iam em geral para colégios particulares. Eu fazia parte desta escola porque minha família morava num lado da rua. Se morasse do outro lado, eu teria ido para uma escola diferente e meus colegas seriam de famílias mais parecidas com a minha. Concluído o primeiro grau, estes garotos e eu faríamos o segundo grau também em escolas públicas. Não havia colégios particulares para eles ou para mim. Meu pai finalmente largou o jornal. Senti que estava pensando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Filho — começou lentamente. — Se você quiser ficar rico, você tem que aprender a ganhar dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como ganho dinheiro? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Use sua cabeça, filho — respondeu sorrindo. O que na verdade queria dizer: “Isso é tudo o que vou lhe dizer” ou “Não sei a resposta, de modo que não me perturbe”.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

      { tipo: 'b', texto: 'Forma-se uma parceria' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na manhã seguinte, contei para meu melhor amigo, Mike, o que meu pai tinha falado. Tenho a impressão de que Mike e eu éramos os únicos garotos pobres da escola. Também Mike estava nesta escola por um golpe de sorte. Alguém tinha traçado aleatoriamente a linha divisória dos distritos escolares e nós acabamos na escola dos garotos ricos. Não éramos pobres de verdade, mas sentíamos como se fôssemos porque os demais garotos tinham luvas de beisebol novas, bicicletas novas, tudo novo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mãe e pai nos davam o básico, comida, teto e roupa. Mas isso era tudo. Meu pai costumava falar: “Se você quiser alguma coisa, trabalhe para obtêla.” Queríamos muitas coisas, mas não havia muito trabalho disponível para garotos de 9 anos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E então, como ganhamos dinheiro? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não sei — respondi. — Mas você quer ser meu sócio?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele concordou e, naquele sábado de manhã, Mike se tornou meu primeiro sócio nos negócios. Gastamos toda a manhã imaginando formas de ganhar dinheiro. De vez em quando falávamos dos “caras legais” que estavam se divertindo na casa de praia de Jimmy. Sentíamos uma certa mágoa, mas era uma mágoa boa, pois nos inspirou a ficar pensando em como ganhar dinheiro. Finalmente, nessa tarde, um lampejo surgiu em nossas mentes. Era uma ideia que Mike havia tirado de um livro de ciências que lera. Empolgados, demos um aperto de mão e a sociedade agora tinha um objetivo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Durante as semanas seguintes, Mike e eu percorremos a vizinhança pedindo aos vizinhos que guardassem para nós os tubos vazios de pasta de dentes. Intrigados, muitos adultos concordavam sorrindo. Alguns perguntavam o que estávamos fazendo. Respondíamos: “Não dá para contar, é um segredo de negócios.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Conforme as semanas passavam, mamãe ficava nervosa. Tínhamos escolhido um lugar perto da máquina de lavar roupas para estocar nossa matériaprima. Numa caixa de papelão, que contivera vidros de molho de tomate, acumulava-se nossa pilha de tubos de pasta de dentes usados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Finalmente, mamãe deu uma bronca. Não aguentava mais ver aquele monte de tubos espremidos na maior confusão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que vocês estão fazendo, garotos? — perguntou. — E não me venham novamente com a desculpa de que é um segredo de negócios. Deem um jeito nesta bagunça ou jogo tudo fora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu argumentamos, explicamos que em breve teríamos o suficiente para começar a produção. Dissemos que estávamos esperando que alguns vizinhos acabassem de usar suas pastas para que pudéssemos recolher os tubos. Mamãe nos deu uma semana de prazo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Antecipamos a data do início da produção. A pressão aumentava.' },


      { tipo: 'br', texto: '' },

      { tipo: 'small', texto: 'Minha primeira sociedade já estava sendo ameaçada por uma notificação de despejo do nosso armazém, feita por minha própria mãe. Mike se encarregou de apressar o consumo das pastas, informando que os dentistas recomendavam escovação mais frequente dos dentes. Comecei a instalar a linha de produção.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Um dia meu pai chegou em casa com um amigo para mostrar como “os garotos” operavam a linha de produção a todo vapor, perto da garagem. Por todo o lugar havia uma fina poeira branca. Numa mesa comprida se alinhavam embalagens de leite trazidas da escola e no forno japonês da família as brasas do carvão brilhavam gerando o máximo de calor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Papai caminhava com cuidado, o carro fora estacionado próximo ao portão da rua porque a linha de produção estava na frente da porta da garagem. Quando ele e seu amigo se aproximaram, viram uma vasilha de aço em cima das brasas, e dentro dela os tubos de pasta de dentes derretiam. Naquela época não havia tubos de pasta de dentes de plástico, eles eram de chumbo. Por isso, depois que a pintura queimava, os tubos dentro da vasilha derretiam até ficarem líquidos. Com a ajuda do pegador de panela da mamãe, nós despejávamos o chumbo derretido através de um pequeno furo nas embalagens de leite, que estavam recheadas de gesso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O pó branco do gesso que ainda não fora misturado à água estava por toda parte. Com a pressa tínhamos derrubado o saco de gesso e parecia que toda a área fora atingida por uma nevasca. As embalagens de leite vazias serviam para fazer moldes de gesso. Meu pai e seu amigo nos observavam enquanto vertíamos o chumbo derretido num pequeno buraco no topo de um cubo de gesso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Cuidado — disse meu pai.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fiz que sim com a cabeça, sem olhar para cima.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando terminei de colocar o chumbo derretido, larguei a vasilha e sorri para meu pai.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que vocês estão fazendo? — perguntou com um sorriso cauteloso. — Estamos fazendo o que você me mandou fazer. Estamos nos' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'tornando ricos — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Somos sócios — disse Mike sorrindo e balançando a cabeça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o que há nesses moldes de gesso? — perguntou papai.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Veja — falei. — Esta vai ser uma boa fornada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Com um pequeno martelo, bati no selo que dividia o cubo em dois. Com cuidado, puxei a parte de cima do molde de gesso e uma moedinha de chumbo caiu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Minha nossa! — falou papai. Vocês estão cunhando moedinhas de chumbo!' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Certo — falou Mike. — Estamos fazendo o que o senhor disse.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'small', texto: 'Estamos fazendo[8] dinheiro.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'O amigo de meu pai se virou e caiu na gargalhada. Meu pai sorriu e balançou a cabeça. À sua frente estavam, além do fogo e da caixa de tubos de pasta de dentes vazios, dois garotos cobertos por uma poeira branca rindo de orelha a orelha.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai pediu que largássemos tudo e nos sentássemos com ele no degrau da frente de casa. Sorrindo nos explicou carinhosamente o que significava a palavra “falsificação”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nossos sonhos estavam desfeitos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você quer dizer que isto é ilegal? — perguntou Mike com um soluço na voz.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Deixe eles — disse o amigo de meu pai. — Eles podem estar desenvolvendo um talento natural.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai olhou para ele, furioso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, é ilegal — falou papai calmamente. — Mas vocês demonstraram muita criatividade e ideias originais. Continuem, estou orgulhoso de vocês!' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Desapontados, Mike e eu ficamos sentados uns vinte minutos antes de começarmos a arrumar a bagunça. O negócio fora encerrado no próprio dia da inauguração. Varrendo a poeira, olhei para Mike e falei:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Acho que Jimmy e os amigos dele estavam certos. Somos pobres. Quando falei isso meu pai já estava saindo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Garotos — falou —, vocês só serão pobres se desistirem. O mais importante é que fizeram alguma coisa. Muitas pessoas falam e sonham em ficar ricas. Vocês fizeram alguma coisa. Estou muito orgulhoso de vocês. Repito. Continuem. Não desistam.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu ficamos quietos, calados. Eram palavras simpáticas, mas nós ainda não sabíamos o que fazer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então por que você não é rico, papai? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Porque resolvi ser professor. Os professores não estão muito preocupados em ficar ricos. Nós gostamos de ensinar. Gostaria de poder ajudar vocês, mas na verdade não sei como ganhar dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu voltamos à arrumação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É — falou meu pai —, se vocês querem aprender como enriquecer, não perguntem para mim. Falem com seu pai, Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Meu pai? — perguntou Mike surpreso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, seu pai — repetiu papai com um sorriso. — Seu pai e eu temos conta no mesmo banco e o gerente está encantado com seu pai. Ele me disse várias vezes que seu pai é brilhante quando se trata de ganhar dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Meu pai? — repetiu Mike, incrédulo. — Então por que não temos uma casa bonita, um carrão como os garotos ricos da escola?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Um carrão e uma casa bonita não querem necessariamente dizer que você é rico ou que tem muito dinheiro — respondeu papai. — O pai de Jimmy trabalha na usina. Ele não é muito diferente de mim. Ele trabalha para uma empresa e eu trabalho para o governo. A empresa compra o carro para ele. Se a usina tiver problemas financeiros, o pai de Jimmy pode acabar sem nada. Seu pai é diferente, Mike. Ele parece estar construindo um império e desconfio que em alguns anos ele será um homem muito rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao ouvir isso, Mike e eu nos empolgamos novamente. Mais dispostos, limpamos a confusão provocada por nosso defunto negócio. Enquanto limpávamos, fazíamos planos sobre quando e onde falar com o pai de Mike. O problema é que o pai de Mike trabalhava muito e, às vezes, chegava muito tarde em casa. Ele era dono de armazéns, de uma empresa de construção, de uma cadeia de lojas e de três restaurantes. Eram os restaurantes que o faziam voltar para casa tarde.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Acabada a limpeza, Mike se despediu. Ele iria falar com seu pai à noite e perguntar se este queria nos ensinar a ficar ricos. Mike prometeu me ligar assim que tivesse uma resposta, mesmo que fosse tarde.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Às 20:30 tocou o telefone.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK — falei. — Sábado que vem — e desliguei. O pai de Mike concordara em conversar conosco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Às 7:30 de sábado, peguei o ônibus para o lado pobre da cidade.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Começam as lições' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Vou pagar a vocês 10 centavos por hora.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mesmo pelos padrões de remuneração vigentes em 1956, era pouco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Michael e eu encontramos seu pai às 8:00 daquela manhã. Ele estava ocupado e trabalhando há mais de uma hora. Seu supervisor de construções já estava saindo na caminhonete quando entrei naquele lar simples, pequeno, arrumado. Mike me esperava na porta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Papai está no telefone, e ele falou para esperar na varanda dos fundos' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— disse Mike ao abrir a porta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O antigo assoalho de madeira chiou quando passei pela soleira da velha casa. Do lado de fora havia um capacho simples escondendo os muitos anos de uso e os incontáveis passos que suportara. Apesar de limpo, precisava ser substituído.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando entrei na sala estreita senti claustrofobia. O cômodo estava mobiliado com móveis que hoje seriam objeto de colecionadores. Duas mulheres estavam sentadas no sofá, eram um pouco mais velhas do que a minha mãe. Em frente às mulheres estava um homem em trajes de trabalhador. Ele vestia calça e camisa cáquis, bem passados mas não engomados, e calçava botas de trabalho bem engraxadas. Deveria ser uns dez anos mais velho que papai; diria que tinha uns' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '45 anos. Eles sorriram quando Mike e eu passamos em direção à cozinha, de onde se saía para um pátio nos fundos. Timidamente devolvi o sorriso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quem são eles? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ah, eles trabalham para papai. O mais velho dirige seus armazéns e as mulheres são gerentes dos restaurantes. E você já viu o supervisor das construções, que está trabalhando em um projeto rodoviário, a uns 80 quilômetros daqui. O outro supervisor, que cuida da construção das casas, saiu antes de você chegar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isso acontece o tempo todo? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Nem sempre, mas muitas vezes — disse Mike sorrindo enquanto puxava uma cadeira para sentar perto de mim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Perguntei ao papai se ele vai nos ensinar a ganhar dinheiro — disse Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o que ele respondeu? — perguntei com cautelosa curiosidade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom, primeiro me encarou com uma expressão engraçada, e então falou que iria nos fazer uma oferta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Oh — respondi balançando a cadeira para trás em direção à parede; a cadeira em que sentava se sustentava nos pés de trás.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike fazia o mesmo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você sabe o que ele vai nos oferecer? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não, mas a gente já vai descobrir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De repente o pai de Mike passou pela porta de tela e pisou no alpendre. Mike e eu pulamos, ficando em pé não por respeito mas pelo susto que levamos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Prontos, garotos? — perguntou o pai de Mike, puxando uma cadeira para sentar perto de nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fizemos que sim com a cabeça e aproximamos as cadeiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele era um homem grande, com cerca de 1,80 metro e 100 quilos. Meu pai era mais alto, pesava mais ou menos o mesmo e era cinco anos mais velho que o pai de Mike. Eles eram de certo modo parecidos, embora de origens étnicas diferentes. Talvez tivessem energias semelhantes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mike falou que você quer aprender a ganhar dinheiro? É isso mesmo, Robert?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Rapidamente assenti com a cabeça, não sem uma pequena sensação de intimidação. Senti muito poder por trás de suas palavras e de seu sorriso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Muito bem, eis a minha oferta. Vou ensinar a vocês, mas não como em uma sala de aula. Vocês trabalham para mim, eu ensino a vocês. Vocês não trabalham para mim, eu não ensino a vocês. Posso ensinar mais rápido se trabalharem, e não fico perdendo tempo se só ficarem sentados escutando, como fazem na escola. Esta é minha oferta. É pegar ou largar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Posso fazer uma pergunta... antes? — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não. É pegar ou largar. Tenho trabalho demais para perder tempo. De qualquer modo, se você não puder se decidir logo, não vai aprender nunca a ganhar dinheiro. As oportunidades vêm e vão. Ser capaz de tomar decisões rápidas é uma habilidade importante. Você tem a oportunidade que pediu. As aulas começam em dez segundos — respondeu o pai de Mike com um sorriso incentivador.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Topo — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Topo — respondeu Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom — falou o pai de Mike —, a senhora Martin vai chegar daqui a dez minutos. Depois que eu conversar com ela, vocês a acompanham até minha lojinha e já podem começar. Vou lhes pagar 10 centavos por hora e vocês terão de trabalhar três horas todo sábado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas hoje tenho jogo de beisebol — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O pai de Mike abaixou a voz e falou com seriedade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É pegar ou largar — disse.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Topo — respondi, decidindo trabalhar em lugar de jogar beisebol.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: '30 centavos depois' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Às 9:00 de uma bela manhã de sábado, Mike e eu estávamos trabalhando para a senhora Martin. Ela era uma mulher bondosa e paciente. Sempre dizia que eu e Mike a lembrávamos de seus dois filhos que já estavam crescidos e não moravam com ela. Apesar de bondosa, ela acreditava no trabalho árduo e nos fazia trabalhar. Era uma chefe rigorosa. Passávamos três horas pegando latas das prateleiras e espanando-as para depois recolocá-las no lugar. Era uma tarefa incrivelmente monótona.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O pai de Mike, que eu chamo de meu pai rico, era dono de nove dessas lojinhas com amplos estacionamentos. Eram as primeiras versões das lojas de conveniência. Nesses pequenos armazéns de bairro as pessoas compravam artigos como leite, pão, manteiga e cigarros. O problema é que no Havaí, e isto aconteceu antes do arcondicionado, não se podia fechar a porta das lojas por causa do calor. Nestas havia duas amplas portas que davam para a rua e para o estacionamento. Cada vez que um carro passava ou estacionava, levantava poeira que se acumulava nas prateleiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Portanto, tínhamos um emprego que duraria enquanto não houvesse arcondicionado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Durante três semanas Mike e eu comparecemos aos sábados à loja da senhora Martin e trabalhamos durante três horas. Ao meio-dia terminava nosso trabalho e ela nos dava três pratinhas de 10 centavos. Mas nem aos 9 anos, em meados da década de 1950, 30 centavos eram algo muito empolgante. Na época um gibi custava 10 centavos, de modo que em geral eu gastava meu dinheiro com revistas em quadrinhos e voltava para casa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na quarta-feira da quarta semana, eu já estava a fim de largar. Tinha concordado em trabalhar só porque eu queria aprender a ganhar dinheiro com o pai do Mike, mas agora era um escravo por 10 centavos a hora. E, ainda por cima, não tinha voltado a ver o pai do Mike desde aquele sábado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Desisto — falei para Mike na hora do almoço. O almoço da escola era horrível. A escola era monótona e agora já nem podia esperar pelos sábados. Mas o que estava me perturbando eram os 30 centavos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Desta vez Mike sorriu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— De que é que você está rindo? — perguntei zangado e frustrado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Papai falou que isso ia acontecer. Ele disse para você procurálo quando estivesse a fim de largar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O quê? — disse indignado. — Ele está esperando que eu fique saturado?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Por aí — falou Mike. — O papai é meio diferente, ele ensina de modo diferente do seu pai. Seu pai e sua mãe falam muito. Meu pai é tranquilo e caladão. Espere até sábado. Vou falar para ele que você está a fim de largar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você está dizendo que eu fui enrolado?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não, não é isso, mas pode ser. Papai vai explicar no sábado.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Fazendo fila no sábado' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Estava pronto e preparado para enfrentá-lo. Até meu pai de verdade estava furioso com ele. Meu verdadeiro pai, aquele que chamo de pai pobre, pensou que meu pai rico estava infringindo a legislação sobre trabalho de menores e deveria ser investigado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu instruído pai pobre me falou que eu deveria exigir o que merecia. Pelo menos 25 centavos por hora. Falou ainda que se não conseguisse o aumento deveria me demitir imediatamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— De qualquer maneira você não precisa dessa droga de emprego — falou meu pai pobre indignado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Às 8:00 da manhã de sábado eu estava entrando pela velha porta da casa de Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sente e espere na fila — falou o pai de Mike quando entrei. Ele então se virou e foi para o pequeno escritório que ficava junto de um quarto de dormir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Olhei em volta e não vi Mike em lugar algum. Achando tudo meio esquisito, sentei perto daquelas duas mulheres, as mesmas que lá estavam três semanas antes. Elas sorriram e me deram um lugar no sofá.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Passaram-se 45 minutos e eu estava possesso. As duas mulheres já tinham falado com ele e saído há meia hora. Um senhor mais velho ficou lá vinte minutos e foi embora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A casa estava vazia e eu sentado na sala antiquada, escura, numa bela manhã do Havaí, esperando para falar com um avarento explorador de menores. Podia ouvi-lo se movimentando no escritório, falando ao telefone e me ignorando. Queria sair dali, mas por alguma razão fiquei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Finalmente, quinze minutos depois, exatamente às 9:00, o pai rico apareceu sem dizer palavra e me fez sinal com a mão para entrar no modesto escritório.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Parece que você está querendo um aumento ou vai largar — falou pai rico rodando a cadeira giratória.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, o senhor não está cumprindo sua parte do acordo — falei quase em prantos. Para um garoto de 9 anos era de fato apavorante confrontar um adulto. — O senhor falou que, se eu trabalhasse para o senhor, o senhor ia me ensinar. Eu trabalhei. Dei duro. Larguei meus jogos de beisebol para trabalhar. E o senhor não cumpriu sua palavra. Não me ensinou nada. O senhor é um desonesto, como todo o mundo fala. O senhor é ganancioso. O senhor só quer todo o dinheiro e não se preocupa com seus empregados. O senhor me deixou esperando e não me respeita. Eu sou apenas um garoto e mereço ser tratado melhor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De sua cadeira giratória, as mãos no queixo, o pai rico me fitava. Parecia que estava me estudando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É, nada mau — falou. — Em menos de um mês você já se parece com a maioria dos meus empregados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O quê? — exclamei. Como não entendia o que ele estava falando continuei reclamando. — Pensei que o senhor ia cumprir sua parte do acordo e me ensinar. Em lugar disso o senhor quer me torturar? Isso é cruel. Muito cruel.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Estou lhe ensinando — falou calmamente o pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que o senhor me ensinou? Nada! — repliquei furioso. — Nem falou comigo depois que eu aceitei trabalhar por uma merreca. Dez centavos por hora. Eu devia denunciar o senhor ao governo. Existem leis sobre o trabalho infantil, o senhor sabe disso. Meu pai trabalha para o governo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Uau! — disse pai rico. — Agora você parece com a maioria das pessoas que trabalharam para mim. Pessoas que eu mandei embora ou que se demitiram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que o senhor tem a me dizer? — questionei, sentindo-me muito corajoso para um moleque. — O senhor mentiu para mim. Trabalhei e o senhor não manteve sua palavra. Não me ensinou nada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como você sabe que não lhe ensinei nada? — perguntou calmamente pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom, o senhor nunca falou comigo. Trabalhei três semanas e o senhor não me ensinou nada — disse com cara de zangado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ensinar que dizer falar ou dar uma aula? — perguntou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, lógico — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É assim que a escola ensina — ele disse sorrindo. — Mas não é assim que a vida ensina você e eu diria que a vida é o melhor dos mestres. Na maioria das vezes a vida não fala com você. É mais como se ela lhe desse um empurrão. Cada empurrão é a vida dizendo “Acorde. Quero que aprenda alguma coisa”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Do que este cara está falando?”, pensei com meus botões. “A vida me empurrando era a vida falando comigo?” Agora tinha certeza que deveria largar o emprego. Eu estava falando com alguém que não regulava bem.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se você aprender as lições da vida, você vai se dar bem. Se não, a vida vai continuar dando trancos em você. Alguns apenas deixam a vida continuar batendo neles. Outros ficam zangados e batem de volta. Mas eles batem no patrão ou no emprego, no marido ou na mulher. Eles não sabem que é a vida que está batendo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu não tinha a menor ideia do que ele estava falando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A vida bate em todos nós. Alguns desistem. Outros lutam. Alguns aprendem a lição e seguem em frente. Eles recebem satisfeitos os trancos da vida. Para estes, isto quer dizer que precisam e querem aprender alguma coisa. Eles aprendem e prosseguem em frente. A maioria desiste e uns poucos, como você, lutam.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico ficou em pé e fechou a velha janela de madeira que precisava de conserto. Continuou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se você aprender esta lição, você se tornará um jovem sábio, rico e feliz. Se você não aprender, passará a vida culpando um emprego, um baixo salário ou seu chefe pelos seus problemas. Passará sua vida esperando por um golpe de sorte que resolva seus problemas de dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico olhou para mim a fim de verificar se eu ainda estava ouvindo. Seus olhos encontraram os meus. Estabeleceu-se uma comunicação entre nossos olhares. Finalmente, me afastei ao perceber que tinha assimilado esta última mensagem. Sabia que ele estava certo. Eu o estava culpando e eu tinha pedido para aprender. Eu estava lutando.' },      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Pai rico continuou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se for o tipo de pessoa que não tem garra, desistirá toda vez que a vida bater em você. Se for uma pessoa assim, passará sua vida buscando segurança, fazendo as coisas certas, esperando por algo que nunca vai acontecer. E, então, morrerá como um velho rabugento. Terá um monte de amigos que gostam de você, porque é um cara trabalhador. Você passa a vida na rotina, fazendo as coisas certas. Mas a verdade é que a vida o leva à submissão. No fundo, no fundo, você tem pavor de se arriscar. Queria, na verdade, vencer, mas o medo de perder é maior do que o entusiasmo da vitória. No íntimo, só você saberá que não foi atrás disso. Você escolheu a segurança.' },

      { tipo: 'br', texto: '' },
