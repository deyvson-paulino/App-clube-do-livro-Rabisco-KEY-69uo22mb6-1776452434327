{ tipo: 'big', texto: 'Se é do tipo que não gosta de pressão financeira, então descubra uma fórmula que funcione para você. Uma boa fórmula é cortar despesas, pôr o dinheiro no banco e pagar mais do que o necessário em imposto de renda, aplicar em fundos mútuos seguros e esperar sempre resultados médios. Mas isto viola a regra do “pague a si mesmo em primeiro lugar”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Este princípio não estimula o autossacrifício ou a abstinência financeira. Não significa pagar a você mesmo primeiro e passar fome. A vida foi feita para ser desfrutada. Se você conjura seu gênio financeiro, pode ter todas as coisas boas da vida, enriquecer e pagar contas, sem se sacrificar. E isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '6. PAGUE BEM A SEUS CORRETORES. O poder do bom conselho. Muitas vezes vejo pessoas colocando um cartaz na frente de casa: “Proprietário vende”. Ou vejo na televisão muita gente se anunciando como “Corretor de Desconto”.[27]' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico me ensinou a fazer exatamente o contrário. Ele acreditava que os profissionais deviam ser bem pagos e eu adotei a mesma política. Hoje, tenho a meu serviço advogados, contadores, corretores de imóveis e de ações caros. Por quê? Porque se, e destaco o se, as pessoas são profissionais, seus serviços devem render dinheiro para você. E quanto mais dinheiro ganharem, mais eu ganho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Vivemos na Era da Informação. A informação não tem preço. Um bom corretor deve lhe oferecer informação e dedicar tempo para instruir você. Tenho vários corretores dispostos a fazer isso por mim. Alguns me ensinaram quando eu tinha pouco ou nenhum dinheiro e até hoje trabalho com eles.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que pago a um corretor é pouco em comparação com o dinheiro que posso ganhar em consequência das informações que eles me trazem. Adoro quando meu corretor de imóveis ou o de ações ganha muito dinheiro. Em geral isso significa que ganhei muito dinheiro também.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um bom corretor, além de ganhar dinheiro para mim, me poupa tempo' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— como quando comprei um lote vazio por US$9 mil e o vendi logo a seguir por US$25 mil, de modo que pude comprar mais depressa meu Porsche.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um corretor é seus olhos e ouvidos no mercado. Eles estão lá todos os dias enquanto eu não preciso estar. Prefiro jogar golfe.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Também as pessoas que vendem sua casa por conta própria não dão muito valor ao seu tempo. Por que eu iria querer deixar de gastar alguns dólares quando posso empregar esse tempo para ganhar mais dinheiro ou para estar com aqueles que amo? O que acho engraçado é como tantas pessoas pobres e de classe média insistem em dar gorjetas de 15% a 20% nos restaurantes por um mau serviço e reclamam de pagar a um corretor algo entre 3 e 7%. Elas gostam de dar gorjeta a pessoas que figuram na coluna da despesa e maltratam as que estão na coluna dos ativos. Isso não é inteligente do ponto de vista financeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nem todos os corretores são iguais. Infelizmente, em sua maioria, são apenas vendedores. E diria que os vendedores de imóveis são os piores. Eles vendem, mas têm poucos ou nenhum imóvel próprio. Há grande diferença entre um corretor que vende casas e um corretor que vende investimentos. E o mesmo se aplica a corretores de ações, títulos, fundos mútuos e seguros que se autodenominam de consultores financeiros. Como no conto de fadas, você tem de beijar um monte de sapos para achar um príncipe. Lembre o velho adágio: “Nunca chame um vendedor de enciclopédias se você precisa de uma enciclopédia.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando entrevisto algum profissional pago, procuro primeiro descobrir quantos imóveis ou ações possuem pessoalmente e qual a alíquota de imposto que pagam. E isso se aplica a meus advogados tributaristas bem como a meu contador. Uma de minhas contadoras tem seu próprio negócio. Sua profissão é a contabilidade, mas seu negócio são os imóveis. Eu tinha um contador que tinha uma pequena empresa de contabilidade, mas não tinha nenhum imóvel. Mudei porque nós não gostávamos do mesmo negócio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Descubra um corretor que leve a sério seus interesses. Muitos corretores dedicarão seu tempo a instruí-lo e eles podem ser o melhor ativo que você pode encontrar. Seja apenas justo e a maioria deles será justa com você. Se você se preocupar em cortar suas comissões, então por que eles quererão estar com você? É uma lógica simples.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse anteriormente, uma das habilidades gerenciais é a administração de pessoas. Muitas pessoas só conseguem gerenciar pessoas que consideram inferiores a si próprias e sobre quem podem ter um poder, como subordinados em uma relação de trabalho. Muitos gerentes médios continuam nessa posição e não são promovidos porque sabem como trabalhar com pessoas que estão abaixo deles mas não com pessoas que estão acima. A verdadeira habilidade é administrar e pagar bem pessoas que são mais inteligentes do que você em alguma área técnica. É por isso que as grandes empresas têm conselhos administrativos. Você também precisa de um. E isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '7. SEJA UM “DOADOR ÍNDIO”. Este é o poder de obter alguma coisa a troco de nada. Quando os primeiros colonizadores brancos chegaram aos Estados Unidos, eles ficaram espantados com a prática cultural de alguns índios americanos. Por exemplo, se um colono estava com frio, o índio lhe dava um cobertor. Achando que fosse um presente, o colono frequentemente ficava ofendido quando o índio o pedia de volta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os índios também ficavam perturbados quando constatavam que os colonos não queriam devolver o cobertor. É daí que se origina a expressão “doador índio”. Um simples desentendimento cultural.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No mundo da “coluna de ativos” é vital para a riqueza ser um doador índio. A primeira pergunta do investidor sofisticado é: “Com que rapidez posso ter meu dinheiro de volta?” Ele também quer saber o que poderá obter de graça, ou o que se chama uma participação nos lucros. É por isso que o retorno sobre o investimento é tão importante.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por exemplo, descobri um pequeno imóvel, a alguns quarteirões de onde moro, que estava sendo executado judicialmente. O banco estava pedindo US$60 mil, e eu apresentei uma oferta de US$50 mil, que foi aceita, simplesmente porque estava acompanhada de um cheque à vista no valor de US$50 mil. Verificaram que eu era sério. Muitos investidores perguntarão se eu não estava imobilizando muito dinheiro de uma vez. Não seria melhor hipotecá-lo? A resposta neste caso é não. Minha empresa de investimentos o aluga por temporada nos meses de inverno e obtém US$2.500 ao mês durante quatro meses, quando os “pássaros-da-neve“ procuram o Arizona. Fora da temporada de férias, seu aluguel é de apenas US$1 mil mensais. Em cerca de três anos consegui meu dinheiro de volta. Agora sou proprietário desse ativo, que gera dinheiro para mim todos os meses.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O mesmo se aplica às ações. Frequentemente, meu corretor liga e sugere que eu aplique uma considerável quantia em ações de alguma empresa que, segundo ele, está a ponto de fazer alguma coisa que aumentará o valor delas, como lançar um produto novo. Então, durante uma semana ou um mês, aplico meu dinheiro nessas ações, enquanto seus preços sobem. Depois, tiro aquela soma inicial e paro de me preocupar com as flutuações do mercado, porque tenho de volta meu dinheiro inicial e agora sou dono de um ativo que, tecnicamente, me saiu de graça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sem dúvida, em muitas ocasiões perdi dinheiro. Mas somente jogo com dinheiro que posso perder. Diria que na média de dez investimentos faço uns dois ou três gols de placa, cinco ou seis não são lá essas coisas e perco em dois ou três. Mas limito minhas perdas ao dinheiro que apliquei neles naquele momento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As pessoas que odeiam o risco põem seu dinheiro no banco. E, a longo prazo, qualquer poupança é melhor do que nenhuma poupança. Mas leva muito tempo para você recuperar seu dinheiro e, em muitos casos, você não leva nada de graça. Eles costumavam dar torradeiras, [28] mas atualmente isso está ficando mais caro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em todos os meus investimentos precisa haver algo mais, algo de graça. Um imóvel, um lote de terreno, uma casa, ações, escritórios. E o risco deve ser limitado ou deve ser uma ideia de baixo risco. Há livros inteiros que tratam deste assunto de modo que não me estenderei aqui. Ray Kroc, do McDonald'+"'s"+', vendia franquias de hambúrgueres não porque gostasse do sanduíche, mas porque queria os terrenos das franquias de graça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Investidores sábios devem dar mais atenção ao retorno sobre o investimento: são os ativos que você obtém de graça depois que você recebe seu dinheiro de volta. Isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '8. ATIVOS COMPRAM SUPÉRFLUOS. O poder do foco. O filho de um amigo estava desenvolvendo um hábito desagradável de gastar demais. Aos 16 anos naturalmente desejava ter seu carro. A desculpa: os pais de todos os seus amigos tinham comprado um carro para o filho. O garoto queria pegar suas poupanças e dar a entrada para o carro. Foi aí que o pai me procurou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você acha que devo fazer o que ele quer ou deveria fazer como os outros pais e dar um carro para ele?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Minha resposta:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A curto prazo pode ser bom, mas o que você lhe terá ensinado a longo prazo? Você não pode usar seu desejo de ter um carro e incentivar seu filho a aprender alguma coisa?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De repente se acendeu uma luz e ele foi correndo para casa. Dois meses depois voltei a encontrar meu amigo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Seu filho já está com o carro? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não. Mas lhe dei US$3 mil para comprar o carro. Falei para ele usar meu dinheiro em lugar do seu dinheiro, reservado para a universidade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você foi bastante generoso — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Nem tanto. O dinheiro veio acompanhado de uma condição. Segui sua orientação para usar seu desejo por um carro como incentivo para que aprendesse alguma coisa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E qual foi a condição? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom, primeiro voltamos a jogar seu CASHFLOW. Jogamos e tivemos uma longa discussão sobre o uso sábio do dinheiro. Fiz para ele uma assinatura do Wall Street Journal e comprei alguns livros sobre mercado de ações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E daí? — indaguei. — O que fez?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Falei que os US$3 mil eram dele, mas que ele não poderia comprar o carro direto. Ele deveria usar o dinheiro para comprar e vender ações, achar seu próprio corretor, e quando tivesse ganho US $6 mil, metade ele poderia usar para comprar o carro e o resto devia colocar na poupança para pagar a faculdade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o resultado? — continuei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, teve sorte nos primeiros negócios, mas daí a pouco perdeu tudo. Então começou a ficar interessado de verdade. Hoje, ainda lhe faltam uns US$2 mil e está mais interessado ainda. Leu todos os livros que dei e pegou outros na biblioteca. Lê avidamente o Wall Street Journal, acompanhando os indicadores, e assiste à CNBC em vez da MTV e está aprendendo muito. Ele sabe que se perder dinheiro vai ter de andar a pé mais uns dois anos. Mas não está preocupado. Já nem liga tanto para o carro porque encontrou algo mais divertido para fazer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E se ele perder todo o dinheiro? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Aí vamos ver. Prefiro que ele perca tudo agora do que ter de esperar chegar à nossa idade para arriscar a perder tudo. E, além do mais, esses são os melhores US$3 mil que gastei com sua educação. O que está aprendendo vai lhe servir por toda a vida e ele parece ter adquirido mais respeito pelo poder do dinheiro. Acho que parou de torrá-lo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como já falei na seção “Pague a si mesmo em primeiro lugar” se uma pessoa não domina o poder da autodisciplina, é melhor nem tentar ficar rico. Embora o processo de gerar fluxo de caixa a partir da coluna de ativos seja fácil, é a fortaleza mental de direcionar o dinheiro que é difícil. Devido às tentações externas é mais cômodo neste mundo de consumismo torrar o dinheiro na coluna das despesas. A falta de fortaleza mental leva a permitir que o dinheiro flua pelos caminhos de menor resistência.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Darei um exemplo numérico de inteligência financeira, especialmente a capacidade de usar dinheiro para ganhar mais dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se eu der a 100 pessoas US$10 mil no início do ano, acho que ao fim do ano:' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '* 80 não terão mais nada. De fato, elas terão aumentado seu endividamento usando o dinheiro para dar entrada na compra de carro novo, geladeira, televisor, gravador de vídeo ou em viagem de férias.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '* 16 terão aumentado esses US$10 mil em torno de 5% e 10%.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '* 4 terão aumentado a soma para US$20 mil ou para alguns milhões.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Estudamos para aprender uma profissão de modo a poder trabalhar pelo dinheiro. Na minha opinião é também importante aprender a fazer o dinheiro trabalhar para nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Gosto de meus supérfluos tanto quanto qualquer outro ser humano. A diferença é que algumas pessoas compram seus supérfluos em prestações. É a armadilha de querer imitar o vizinho. Quando eu quis comprar um Porsche, o caminho mais fácil foi procurar o gerente do banco e conseguir um financiamento. Em lugar de me preocupar com a coluna do passivo, decidi me concentrar na coluna dos ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como de hábito, empreguei meu desejo de consumir para me inspirar e motivar meu gênio financeiro a investir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Constantemente nos preocupamos em obter as coisas que desejamos em vez de nos concentrarmos em criar dinheiro. É mais fácil a curto prazo, porém mais duro a longo prazo. É um mau hábito em que incorremos como indivíduos e como nação. Lembre, o caminho mais fácil muitas vezes se transforma no mais áspero e o caminho árduo muitas vezes se torna suave.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quanto mais cedo você se disciplinar e àqueles que ama para dominar o dinheiro, tanto melhor. O dinheiro é uma força poderosa. Infelizmente, as pessoas usam esse poder contra elas mesmas. Se sua inteligência financeira for pouca, o dinheiro escorrerá de suas mãos, será mais esperto que você. Se o dinheiro for mais esperto, você trabalhará toda sua vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para ser o senhor do dinheiro, você precisa ser mais esperto do que ele. Então o dinheiro fará o que você mandar. Ele lhe obedecerá. Em vez de ser escravo, você será o senhor. Isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '9. A NECESSIDADE DE HERÓIS. O poder do mito. Quando eu era garoto, admirava profundamente Willie Mays, Hank Aaron, Yogi Berra. Eles eram meus heróis. Quando garoto, jogando no beisebol infantil, queria ser como eles. Seus cartões de beisebol eram meu tesouro. Queria saber tudo a respeito deles. Conhecia suas estatísticas, suas jogadas, quanto ganhavam e como tinham ascendido aos times profissionais. Queria saber tudo porque queria ser como eles.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando, aos 9, 10 anos, pulava para arremessar ou apanhar a bola, não era eu: era Yogi ou Hank. É uma das formas mais poderosas de aprender que frequentemente esquecemos ao chegar à idade adulta. Perdemos nossos heróis. Perdemos nossa ingenuidade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Hoje, observo os garotos jogando beisebol perto de casa. Na quadra não é o Joãozinho, é Michael Jordan, Sir Charles ou Clyde. Copiar ou emular heróis é um aprendizado poderoso. E é por isso que quando alguém como O. J. Simpson cai em desgraça, há um clamor tão grande.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É mais do que um simples julgamento. É a perda de um herói. Alguém com quem crescemos, que observamos e quisemos imitar. De repente precisamos nos livrar dessa pessoa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando cresci encontrei novos heróis. Tenho heróis como Peter Jacobsen, Fred Couples e Tiger Woods. Imito suas jogadas no golfe e faço o possível para ler tudo a respeito deles. Também tenho heróis como Donald Trump, Warren Buffett, Peter Lynch, George Soros e Jim Rogers. Em minha maturidade acompanho suas estatísticas como o fazia com meus heróis do beisebol. Acompanho os investimentos de Warren Buffett e leio tudo sobre suas opiniões a respeito do mercado. Leio o livro de Peter Lynch para entender como ele escolhe suas ações. E leio sobre Donald Trump tentando descobrir como ele negocia e monta operações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Da mesma maneira que não era eu no campo de beisebol, quando estou no mercado ou fechando um negócio, estou agindo subconscientemente com a ousadia de Trump. Ou ao analisar uma tendência, procuro pensar em como Peter Lynch o faria. Tendo heróis, me aproprio de uma fonte imensa de gênio em estado puro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas heróis fazem mais do que simplesmente inspirá-lo. Heróis fazem com que as situações pareçam fáceis. Ao fazer parecerem fáceis nos convencem a querer ser como eles. “Se eles conseguiram, eu também posso.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando se trata de investimentos, há gente demais para complicar. Procure heróis que façam as situações parecerem fáceis.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '10. ENSINA E RECEBERÁS. O poder da doação. Ambos os meus pais eram mestres. Pai rico me ensinou uma lição que me acompanha toda a vida, e essa foi a necessidade de ser caridoso ou de doar. Meu pai instruído doava muito na forma de tempo ou conhecimento, mas quase nunca doava dinheiro. Como já mencionei, ele costumava dizer que doaria quando tivesse algum dinheiro sobrando. Só que raramente sobrava algum dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico doava tanto dinheiro quanto ensinamentos. Ele acreditava firmemente na troca. “Se você deseja algo, primeiro você precisa dar”, dizia sempre. Quando tinha pouco dinheiro, ele simplesmente doava dinheiro à igreja ou a alguma instituição de caridade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se eu tivesse de passar apenas uma única ideia para o leitor, seria esta. Sempre que você sentir “falta” ou “escassez” de alguma coisa, doe, antes, o que você quer e isso retornará para você aos montes. Isso é verdadeiro para dinheiro, sorrisos, amor, amizade. Sei que muitas vezes isso é a última coisa que se deseja fazer, mas, para mim, sempre funcionou. Apenas confio em que o princípio da reciprocidade funciona e doo o que desejo. Se quero dinheiro, dou dinheiro e ele volta multiplicado. Se desejo vendas, ajudo alguém a vender e as vendas aparecem para mim. Se desejo contatos, ajudo alguém a obter contatos e, como num passe de mágica, os contatos vêm para mim. Há muitos anos ouvi algo assim: “Deus não precisa receber, mas os homens precisam doar.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico dizia com frequência: “Os pobres são mais gananciosos do que os ricos.” Ele então explicava que, se uma pessoa era rica, essa pessoa oferecia algo que os outros desejavam. Ao longo de minha vida, em todos estes anos, sempre que senti necessidade de dinheiro ou de auxílio, procurava no fundo de meu coração o que eu queria e decidia doá-lo antes. Ao fazê-lo, o que eu doava sempre retornava para mim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Isso me lembra a história do cara sentado com lenha nos braços numa noite gelada. E ele gritava para a lareira à sua frente: “Quando você me esquentar um pouco, eu ponho um pouco de lenha dentro de você.” Quando se trata de dinheiro, amor, felicidade, vendas e contatos, tudo o que a gente precisa lembrar é doar primeiramente o que se deseja e isso retornará aos montes para nós. Muitas vezes apenas o processo de refletir sobre o que você deseja e como você o poderia doar para alguém desencadeia uma torrente de generosidade. Sempre que sinto que as pessoas não estão sorrindo para mim, simplesmente começo a sorrir e a cumprimentar e, como por milagre, de repente há mais gente sorrindo à minha volta. É verdade que seu mundo é apenas um espelho de você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por isso, digo: “Ensina e receberás.” Descobri que quanto mais sinceramente ensino aos que estão desejosos de aprender, tanto mais aprendo. Se você quer aprender sobre dinheiro, ensine a alguém. Uma torrente de novas ideias e distinções mais sutis surgirá.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Houve momentos em que doei e nada retornou ou em que o que recebi não era o que eu desejava. Mas depois de refletir e examinar minha alma, concluí que em vez de doar por doar, eu estava doando para receber.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai ensinava professores e se tornou mestre dos mestres. Pai rico sempre ensinava aos jovens seu jeito de fazer negócios. Em retrospecto, foi a generosidade deles com o que eles sabiam que os fez melhores. Há neste mundo poderes muito mais fortes do que nós. Você pode chegar lá por si mesmo, mas chegará mais rápido com o auxílio dos poderes superiores. Tudo de que precisa é ser generoso com o que você tem e os poderes superiores serão generosos com você.' },

      //CAPÍTULO DEZ
      { tipo: 'h3', texto: 'CAPÍTULO DEZ' },
      { tipo: 'h2', texto: 'Ainda quer mais?' },
      
      { tipo: 'em', texto: 'M' },
      
      { tipo: 'small', texto: 'uitos podem não achar suficientes meus dez passos. Eles os veem mais como filosofias do que como ações. Penso que entender a filosofia é tão importante quanto a ação. Há muita gente que quer fazer, em lugar de pensar, e há gente que pensa mas não faz. Eu diria que sou ambos. Adoro ideias e adoro agir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para aqueles que querem “coisas a fazer” para começar, irei compartilhar, resumidamente, um pouco do que faço.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: '* Pare de fazer o que está fazendo. Em outras palavras, pare e avalie o que está funcionando e o que não está funcionando. A definição de insanidade é fazer a mesma coisa e esperar resultado diferente. Pare de fazer o que não funciona e' },

{ tipo: 'blockquote', texto: 'procure algo novo para fazer. Procure novas ideias. Para novas ideias de investimento, vou às livrarias e procuro livros sobre assuntos diferentes e originais. Chamo-os de fórmulas. São livros que ensinam como aplicar de uma forma que não conheço. Por exemplo, em uma livraria encontrei o livro The 16% percent solution, de Joel Moskowitz.' },

{ tipo: 'big', texto: '' },

{ tipo: 'b', texto: 'Ação!' },

{ tipo: 'small', texto: ' Na quinta-feira seguinte fiz exatamente o que o livro dizia. Passo a passo. Também fiz isso ao procurar pechinchas em imóveis nos escritórios de advogados e bancos. Muitas pessoas não agem, ou se deixam convencer por qualquer pessoa a desistir da fórmula que estão estudando. Meu vizinho me disse por que os 16% não funcionariam. Não dei ouvidos, porque ele nunca tinha experimentado isso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: '* Descubra alguém que já tenha feito o que você quer fazer. Convide-o para almoçar. Peça dicas, macetes do negócio. No caso dos certificados de gravames de impostos de 16%, fui à repartição de impostos municipais e procurei a funcionária que trabalhava na respectiva seção. Descobri que ela também aplicava em gravames de imposto. Imediatamente a convidei para o almoço. Ela ficou encantada de me contar tudo o que sabia e como fazer. Depois do almoço ela passou a tarde me mostrando tudo. No dia seguinte, com seu auxílio encontrei dois ótimos imóveis e desde então estou recebendo os juros de 16%. Levei um dia para ler o livro, um dia para agir, uma hora para almoçar e um dia para fechar dois bons negócios.' },

{ tipo: 'blockquote', texto: '* Faça cursos e compre fitas. Procuro nos jornais cursos novos e interessantes. Muitos são de graça ou baratos. Também pago seminários caros sobre o que quero aprender. Sou rico e não preciso de um emprego devido ao que aprendi. Tenho amigos que não fizeram esses cursos e me dizem que estou perdendo dinheiro enquanto continuam no mesmo emprego.' },

{ tipo: 'blockquote', texto: '* Faça muitas ofertas. Quando quero um imóvel, procuro muito e em geral faço uma oferta por escrito. Se você não sabe exatamente “quanto oferecer”, eu também não. Isso é tarefa do corretor imobiliário. Eles fazem as ofertas. Eu procuro trabalhar o mínimo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma amiga queria que eu lhe mostrasse como comprar apartamentos. Num sábado, ela, seu corretor e eu visitamos seis edifícios. Quatro eram uma droga, mas dois eram interessantes. Aconselhei que ela enviasse por escrito uma oferta para cada um deles, mas oferecendo metade do que os proprietários pediram. Ela e o corretor quase sofreram um enfarte. Eles pensaram que não seria educado, que os proprietários poderiam sentir-se ofendidos. Acho mesmo que o corretor não queria tanto trabalho assim, de modo que não fizeram nada e continuaram procurando um negócio melhor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não fizeram ofertas e a pessoa ainda está procurando o negócio “certo” pelo preço certo. Bom, você não saberá qual é o preço certo até que você encontre outra parte que deseja fechar o negócio. É raro que um vendedor peça um preço inferior ao valor do objeto de venda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Moral da história: faça ofertas. As pessoas que não são investidores não têm ideia do que é tentar vender alguma coisa. Tive um imóvel que procurei vender durante meses. Teria ficado contente com qualquer proposta. Não estava preocupado com o quão baixo fosse o preço. Eles poderiam ter-me oferecido dez porcos e eu teria ficado feliz. Não pela oferta, mas porque alguém estava interessado. Eu teria feito uma contraproposta, talvez aceitasse uma criação de porcos. Mas é assim que o jogo funciona. O jogo de compra e venda é divertido. Não se esqueça disso. É divertido e é só um jogo. Faça ofertas. Alguém pode dizer “sim”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu sempre faço ofertas com ressalvas. Em imóveis, faço ofertas com a ressalva de que está “sujeita a aprovação do sócio no negócio”. Nunca especifico quem é o sócio no negócio. A maioria das pessoas não sabe que o sócio é meu gato. Se eles aceitam a oferta e eu não estou disposto a fechar o negócio, ligo para casa e falo com o gato. Faço esta declaração absurda para ilustrar como o jogo é incrivelmente fácil e simples. Gente demais o dificulta e o leva demasiado a sério.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Descobrir um bom negócio, o negócio certo, os investidores certos ou o que quer que seja é como namorar. Você precisa ir ao mercado e falar com um monte de gente, fazer um monte de ofertas, contrapropostas, negociar, rejeitar e aceitar. Conheço solteiros que ficam em casa e esperam que o telefone toque, mas a menos que você seja Cindy Crawford ou Tom Cruise, penso que é melhor ir ao mercado, mesmo que seja apenas o supermercado. Procurar, oferecer, rejeitar, negociar e aceitar são partes do processo de quase tudo na vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: '* Corra, ande ou dirija por certa área, uma vez por mês, durante dez minutos. Descobri alguns de meus melhores negócios imobiliários enquanto corria em certa área ao longo de um ano. O que procuro é mudança. Para que um negócio seja lucrativo são necessários dois elementos: pechincha e mudança. Há montes de pechinchas, mas é a mudança que transforma a pechincha em oportunidade lucrativa. Assim, corro numa área na qual gostaria de investir. É a repetição que me permite observar pequenas diferenças. Observo avisos de venda de imóveis que estão lá há muito tempo. Isso significa que o vendedor estará mais disposto a negociar. Observo caminhões de mudança indo e vindo. Paro e converso com os motoristas. Falo com os entregadores de encomendas postais. É impressionante quanta informação têm sobre uma área.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Descubro uma área ruim, especialmente uma área da qual todo mundo foi afastado pelo noticiário. Às vezes a percorro por um ano à espera de sinais de que algo está mudando para melhor. Falo com os varejistas, especialmente os novos, e descubro por que estão se mudando. Isso leva de alguns minutos a um ano e o faço enquanto estou ocupado com outra coisa como correr ou ir a uma loja.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: '* No caso de ações, gosto do livro de Peter Lynch, Beating the street, por sua fórmula de selecionar ações que estão aumentando de valor. Descobri que os princípios de achar valor são os mesmos, quer se trate de imóveis, estoques, fundos mútuos, novas empresas, um novo animal de estimação, uma nova residência, um novo cônjuge ou um detergente em oferta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O processo é sempre o mesmo, você precisa saber o que está procurando e então correr atrás.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: '* Por que os consumidores serão sempre pobres? Quando um supermercado faz uma promoção de, digamos, papel higiênico, o consumidor corre e faz estoque. Quando o mercado de ações faz promoção, muitas vezes chamada de crash ou correção, o consumidor foge. Quando o supermercado aumenta os preços, o consumidor compra em outro lugar. Quando o preço das ações sobe, o consumidor começa a comprá-las.' },

{ tipo: 'blockquote', texto: '* Procure nos lugares certos. Um vizinho comprou um apartamento por US$100 mil; comprei o apartamento contíguo ao seu por US$50 mil. Ele me disse que estava esperando que os preços subissem. Eu lhe mostrei que o lucro ocorre quando se compra não quando se vende. Ele comprou um imóvel de uma corretora que não possuía imóveis próprios. Eu comprei o meu no departamento de execuções judiciais de um banco. Paguei US$500 por um curso que me ensinou a fazer isso. Meu vizinho acreditava que pagar essa quantia por um curso sobre investimentos em imóveis era muito caro. Ele disse que não tinha dinheiro para isso, nem tempo, de modo que está esperando o preço aumentar.' },

{ tipo: 'blockquote', texto: '* Primeiro, procuro alguém que queira comprar, então busco o vendedor. Um amigo estava querendo um terreno. Tinha o dinheiro mas não tinha tempo. Descobri um terreno maior do que o desejado por meu amigo, reservei e liguei para ele que decidiu ficar com uma parte do terreno. Então vendi para ele e comprei o terreno. Assim o restante do terreno me saiu de graça. Moral da história: compre o bolo e corte em fatias. A maior parte das pessoas busca o que está dentro de seu orçamento, tem uma visão limitada. Compram apenas uma fatia do bolo e acabam pagando mais por pouco. Pessoas que pensam pequeno não conseguem grandes oportunidades. Se você quer enriquecer, comece pensando grande.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os varejistas gostam de dar descontos para grandes quantidades, simplesmente porque a maioria dos homens de negócios adora gente que gasta muito. Assim, mesmo se você for pequeno, sempre é possível pensar grande. Quando minha empresa precisou comprar computadores, liguei para vários amigos perguntando se eles também estariam dispostos a comprar. Então fomos a diversos vendedores e acabamos fechando um bom negócio porque estávamos comprando várias unidades. Já fiz o mesmo com ações. Pessoas pequenas permanecem pequenas porque pensam pequeno, agem sozinhas ou não fazem nada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '* Aprenda com a história. Todas as grandes empresas listadas na bolsa começaram como pequenas empresas. O coronel Sanders não ficou rico até ter perdido tudo aos sessenta anos. Bill Gates era um dos homens mais ricos do mundo antes dos trinta anos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '* Agir é sempre melhor que ficar parado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Estas são apenas algumas das coisas que fiz e continuo fazendo para reconhecer as oportunidades. As palavras importantes são “fiz” e “faço”. Conforme repeti inúmeras vezes ao longo do livro, você precisa agir antes de poder receber recompensas financeiras. Aja agora!' },

      //CONCLUSÃO
      { tipo: 'h3', texto: 'CONCLUSÃO' },
      { tipo: 'h2', texto: 'Como pagar a faculdade dos filhos com apenas US$7.000' },
      
      { tipo: 'em', texto: 'E' },
      
      { tipo: 'small', texto: 'nquanto o livro chega a seu fim e se aproxima da publicação, gostaria de dividir um último pensamento com o leitor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A principal razão que me fez escrever este livro foi a de partilhar percepções quanto à maneira como uma maior inteligência financeira pode ser empregada para resolver muitos dos problemas comuns da vida. Sem treinamento financeiro, frequentemente recorremos a fórmulas padronizadas para levar a vida, como trabalhar com afinco, poupar, fazer empréstimos e pagar impostos demais. Hoje precisamos de melhor informação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Recorrerei à seguinte história como um exemplo de um problema financeiro com que se deparam tantas famílias em nossos dias. Como você pode proporcionar boa formação para seus filhos e preparar-se para sua própria aposentadoria? É um exemplo do uso da inteligência financeira em vez de trabalho árduo para atingir o mesmo objetivo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um amigo meu estava reclamando de como era difícil poupar para garantir o pagamento da faculdade de seus filhos. Ele estava aplicando todo mês US$300 em um fundo mútuo e já tinha acumulado US$12 mil. Ele calculava que precisaria de US$400 mil para financiar a faculdade dos quatro filhos. Ele tinha doze anos para conseguir isso, pois o mais velho dos filhos estava então com seis anos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O ano era 1991 e o mercado de imóveis de Phoenix estava péssimo. As pessoas estavam se desfazendo de suas casas. Sugeri a meu colega que comprasse uma casa com parte do dinheiro acumulado em seu fundo mútuo. A ideia o deixou intrigado e começamos a discutir a possibilidade. Sua grande preocupação era que não tinha crédito no banco para comprar outra casa, já que estava muito endividado. Eu lhe assegurei que havia outras formas de financiar imóveis sem recorrer ao banco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Durante duas semanas procuramos uma casa que se encaixasse nos critérios que estabelecêramos. Havia muitas a escolher, de modo que foi bastante divertido. Finalmente encontramos uma casa de três quartos e dois banheiros em um bom bairro. O proprietário tinha sido demitido da empresa e precisava vender naquele dia pois ele e a família estavam de mudança para a Califórnia onde outro emprego o aguardava.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O proprietário queria US$102 mil, mas oferecemos apenas US$79 mil. Ele aceitou imediatamente. A casa estava comprometida com um financiamento chamado de não qualificado, o que significa que até um vagabundo desempregado poderia comprá-la sem aprovação de qualquer banco. O proprietário estava devendo US$72 mil, e tudo o que meu amigo precisou desembolsar foi US$7 mil, a diferença entre o preço de venda e o financiamento pendente. Logo que o antigo proprietário se mudou, meu amigo alugou a casa. Depois de pagas todas as despesas, incluindo a hipoteca, meu amigo ficava com US $125 mensais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Seu plano era ficar com a casa por doze anos, acelerando o pagamento da hipoteca com aqueles US$125 mensais. Imaginamos que ao fim desse tempo a maior parte da hipoteca estaria paga e ele obteria uns US$800 líquidos mensais na época em que o primeiro filho entrasse na faculdade. Se a casa se valorizasse também seria possível vendê-la.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1994, o mercado de imóveis de Phoenix registrou uma súbita recuperação e o inquilino que morava na casa e gostava muito dela lhe ofereceu US$156 mil pela mesma. Novamente o amigo me perguntou o que eu achava e eu o aconselhei a vender, recorrendo ao mecanismo de deferimento de imposto da seção 1031.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora meu amigo tinha cerca de US$80 mil para fazer alguma coisa. Liguei para uma amiga em Austin, Texas, que pegou esse dinheiro e o aplicou em uma sociedade limitada de uma empresa que estava montando. Dentro de três meses meu amigo passou a receber mensalmente cerca de US$1 mil que ele imediatamente aplicava no fundo mútuo. Em 1996, minha amiga vendeu sua pequena empresa e meu amigo recebeu cerca de US$330 mil por sua parte, os quais foram reinvestidos em um novo projeto de minha amiga, rendendo agora cerca de US$3 mil mensais, que eram novamente aplicados no fundo mútuo. Assim, meu amigo está agora confiante que seu objetivo de juntar US$400 mil será alcançado facilmente, para o que bastaram os US$7 mil iniciais e um pouco de inteligência financeira. Seus filhos poderão ter a instrução que desejam e ele poderá usar o ativo remanescente, mediante sua Sociedade Anônima C,[29] para financiar sua aposentadoria. Em decorrência de sua bem-sucedida estratégia de investimento, ele poderá aposentar-se cedo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Obrigado por ler este livro. Espero que lhe tenha oferecido algumas percepções quanto à utilização do poder de o dinheiro trabalhar para você. Hoje precisamos de mais inteligência financeira simplesmente para sobreviver. A ideia de que é preciso dinheiro para ganhar dinheiro é o pensamento das pessoas sem sofisticação financeira. Não quer dizer que não sejam inteligentes. Elas simplesmente não aprenderam a ciência de ganhar dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O dinheiro é apenas uma ideia. Se você quer mais dinheiro, mude simplesmente sua forma de pensar. Toda pessoa que se fez por si própria começou com uma ideia pequena que transformou em algo grande. O mesmo ocorre com o investimento. São necessários apenas alguns dólares para começar e crescer até atingir algo grande. Já encontrei tanta gente que passa a vida buscando o grande negócio ou tentando acumular dinheiro para entrar em um grande negócio, mas isso me parece tolice. Vi muitos investidores sem sofisticação pôr grandes poupanças num negócio e perder quase tudo rapidamente. Eles podem ter sido bons trabalhadores mas não foram bons investidores.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Instrução e conhecimento sobre dinheiro são importantes. Comece cedo. Compre um livro. Participe de um seminário. Pratique. Comece em pequena escala. Transformei US$5 mil em dinheiro em um ativo de US$1 milhão que gerou um fluxo de caixa de US$5 mil mensais em menos de seis anos. Mas comecei a aprender desde garoto. Incentivo você a aprender porque não é tão difícil assim. De fato é até fácil, uma vez que se pega o jeito da coisa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Penso que minha mensagem ficou clara. É o que está em sua cabeça que determina o que está em suas mãos. O dinheiro é só uma ideia. Há um livro chamado Pense e enriqueça (Editora Record). O título do livro não é Trabalhe arduamente e enriqueça. Aprenda a fazer o dinheiro trabalhar com afinco para você e sua vida será mais fácil e mais feliz. Nos dias de hoje, não procure segurança, seja esperto.' },

      //Aja
      { tipo: 'h2', texto: 'Aja!' },
      
      { tipo: 'em', texto: 'T' },
      
      { tipo: 'small', texto: 'odos receberam dois grandes dons: sua mente e seu tempo. Cabe a você fazer o que quiser com ambos. Você e só você tem o poder de determinar o destino de cada nota de dólar que chega às suas mãos. Gaste-a tolamente, você escolheu ser pobre. Gaste-a com passivos, você fará parte da classe média. Invista-a em sua mente e aprenda a adquirir ativos e você estará escolhendo a riqueza como seu objetivo e seu futuro. A escolha é sua e apenas sua. A cada dia, a cada dólar, você decide ser rico, pobre ou classe média. Escolha dividir este conhecimento com seus filhos e você os estará preparando para o mundo que os aguarda. Ninguém mais o fará. O seu futuro e o de seus filhos serão determinados pelas escolhas que você faz hoje, não amanhã. Desejamos para você muita riqueza e muita felicidade com este fabuloso dom chamado vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: 'Robert Kiyosaki' },

{ tipo: 'blockquote', texto: 'Sharon Lechter' },

      //Os Autores
      { tipo: 'h2', texto: 'Os Autores' },

      { tipo: 'b', texto: 'Robert T. Kiyosaki' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'em', texto: '"A' },
      
      { tipo: 'small', texto: ' principal razão que leva as pessoas a enfrentar dificuldades financeiras é que passam anos na escola sem aprender nada sobre dinheiro. O resultado são pessoas que precisam trabalhar pelo dinheiro... mas nunca aprenderam a fazer o dinheiro trabalhar para elas”, diz Robert.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nascido e criado no Havaí, Robert faz parte da quarta geração de uma família nipo-americana. Provém de uma destacada família de educadores. Seu pai foi diretor de ensino do estado do Havaí. Concluído o segundo grau, Robert prosseguiu sua formação em Nova York e depois de formado entrou para a Marinha dos Estados Unidos, indo para o Vietnã como oficial e piloto de helicóptero de combate.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Voltando da guerra, teve início sua carreira de negócios. Em 1977, fundou uma empresa que colocou no mercado a primeira carteira “para surfistas” de náilon e velcro, que se transformou em um sucesso multimilionário sendo vendida em todo o mundo. Ele e seus produtos foram matérias em Runner'+"'s"+' World, Gentleman'+"'s"+' Quarterly, Success Magazine, Newsweek e até Playboy.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Abandonou o mundo dos negócios, em 1985, para ser o cofundador de uma empresa internacional de material educativo que opera em sete países, tendo ensinado negócios e investimentos a milhares de graduados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Aposentado aos 47 anos, Robert faz o que mais gosta... investir. Preocupado com o crescente hiato entre os que têm e os que não têm, Robert criou um jogo chamado CASHFLOW, que ensina o jogo do dinheiro, até então só conhecido pelos ricos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora o negócio de Robert sejam imóveis e desenvolvimento de pequenas empresas, sua verdadeira paixão é o ensino. Já dividiu o palco com palestrantes destacados como Og Mandino, Zig Ziglar e Anthony Robbins. A mensagem de Robert Kiyosaki é clara: “Assuma a responsabilidade por suas finanças ou receba ordens por toda a sua vida. Você é senhor do dinheiro, ou seu escravo.” Robert dá aulas que duram de uma hora a três dias, ensinando às pessoas os segredos dos ricos. Seus temas vão do investimento com altos retornos e baixo risco a como ensinar seus filhos a serem ricos e a como iniciar empresas e vendê-las, mas sua mensagem é sólida e impressionante. E essa mensagem é Desperte o gênio financeiro que está dentro de você. Seu gênio espera revelar-se.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eis o que diz do trabalho de Robert o mundialmente famoso palestrante e autor Anthony Robbins:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“O trabalho de Robert Kiyosaki na educação é poderoso, profundo e altera vidas. Saúdo seus esforços e o recomendo sinceramente.” Nestes tempos de grandes mudanças econômicas, a mensagem de Robert não tem preço.' },

{ tipo: 'b', texto: ' Sharon L. Lechter' },

      { tipo: 'br', texto: '' },

{ tipo: 'em', texto: 'E' },

{ tipo: 'small', texto: 'sposa e mãe de três filhos, formada em contabilidade, gestora e consultora profissional de editoras e fabricantes de brinquedos, Sharon Lechter dedicou seus esforços profissionais à educação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Diplomou-se Summa Cum Laude em contabilidade na Florida State University. Foi uma das primeiras mulheres a entrar em uma das então oito maiores empresas de contabilidade, foi diretora financeira de uma empresa de computadores, diretora tributária de uma empresa de seguros nacional e fundadora e editora associada da primeira revista regional feminina do Wisconsin, enquanto prosseguia suas atividades de auditora pública.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Enquanto via seus filhos crescerem, seu interesse foi se voltando cada vez mais para as questões educacionais. Lutava para incentivá-los a ler. Eles preferiam assistir à televisão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Juntou-se ao inventor do primeiro “livro falante” eletrônico e ajudou a expandir o ramo dos livros eletrônicos que atualmente é uma atividade internacional geradora de milhões de dólares. Continua sendo pioneira no desenvolvimento de novas tecnologias que visam trazer o livro de volta à vida das crianças.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Esteve profundamente envolvida com a educação de seus filhos. Tornouse uma ativista incansável da educação nas áreas de matemática, informática, leitura e escrita.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Nosso sistema de ensino não tem conseguido acompanhar o ritmo das mudanças globais e tecnológicas do mundo atual. Temos de ensinar aos jovens as habilidades acadêmicas e financeiras de que precisarão não só para sobreviver mas para desenvolver-se no mundo com que se deparam.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como colaborador de Pai Rico, Pai Pobre e CASHFLOW Quadrant, ela agora concentra seus esforços no auxílio à criação de instrumentos educacionais para os interessados em melhorar sua educação financeira.' },

      { tipo: 'em', texto: 'P' },
      
      { tipo: 'small', texto: 'assaram-se mais de dez anos desde a publicação de Pai Rico, Pai Pobre — originalmente um “folheto” de marketing para nosso jogo de tabuleiro, CASHFLOW — nos Estados Unidos, e sete anos desde que nossos amigos e editores da Campus/Elsevier levaram minhas mensagens e as lições do Pai Rico aos brasileiros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O mundo em que vivemos atualmente nos impõe desafios financeiros para os quais poucos estavam preparados, e estamos descobrindo que habilidades e informações relacionadas ao dinheiro e aos investimentos são ainda mais importantes.' },

    function salvarProgresso(indice) {
      localStorage.setItem('indiceLeitura', indice);
    }

    function lerFraseAtual(callback) {
      sintetizador.cancel();
      if (indiceAtual >= frases.length) return;

      const texto = frases[indiceAtual].textContent;
      utterance = new SpeechSynthesisUtterance(texto);
      utterance.lang = 'pt-BR';

      utterance.onstart = () => {
        lendo = true;
        destacarFrase(indiceAtual);
        salvarProgresso(indiceAtual);
      };

      utterance.onend = () => {
        lendo = false;
        if (callback) callback();
      };

      sintetizador.speak(utterance);
    }

    function iniciarLeitura() {
      if (lendo || indiceAtual >= frases.length) return;
      lerFraseAtual(() => {
        indiceAtual++;
        if (indiceAtual < frases.length) {
          iniciarLeitura();
        } else {
          salvarProgresso(0);
          indiceAtual = 0;
          frases.forEach(f => f.classList.remove('highlight'));
          atualizarStatus();
        }
      });
    }

    function pausarLeitura() {
      if (sintetizador.speaking) {
        sintetizador.pause();
        lendo = false;
      }
    }

    function continuarLeitura() {
      if (sintetizador.paused) {
        sintetizador.resume();
        lendo = true;
      } else {
        iniciarLeitura();
      }
    }

    function pararLeitura() {
      sintetizador.cancel();
      lendo = false;
      indiceAtual = 0;
      salvarProgresso(0);
      frases.forEach(f => f.classList.remove('highlight'));
      atualizarStatus();
    }

      if (indiceAtual > 1) {
        indiceAtual--;
        salvarProgresso(indiceAtual);
        iniciarLeitura();
      }

      if (indiceAtual < frases.length - 1) {

      /*localStorage.setItem("comments", JSON.stringify(Array.from({length: 50}, (_, i) => `Comentário ${i + 1}`)));
location.reload();*/

localStorage.setItem('comments', JSON.stringify(comments));

    function renderComments() {
      commentsContainer.innerHTML = '';
      comments.forEach((text, index) => {
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `
          <div class="comment-text">${text}</div>
          <button class="delete-btn" onclick="deleteComment(${index})">Excluir</button>
        `;
        commentsContainer.appendChild(div);
      });
    }

    function addComment() {
      const input = document.getElementById('newComment');
      const text = input.value.trim();
      if (text) {
        comments.push(text);
        saveComments();
        renderComments();
        input.value = '';
        input.focus();
      }
    }

    function deleteComment(index) {
      comments.splice(index, 1);
      saveComments();
      renderComments();
    }

    function toggleComments() {
      commentBox.classList.add('open');
      renderComments();
    }

    function closeComments() {
      commentBox.classList.remove('open');
    }

    dragHandle.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      isDragging = true;
    });

    dragHandle.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const currentY = e.touches[0].clientY;
      const diff = currentY - startY;
      if (diff > 60) {
        closeComments();
        isDragging = false;
      }
    });

    dragHandle.addEventListener('touchend', () => {
      isDragging = false;
    });

    // Fecha se clicar fora da caixa
    window.addEventListener('click', (e) => {
      if (!commentBox.contains(e.target) && !e.target.classList.contains('comment-btn')) {
        closeComments();
      }
    });

    // Renderizar ao carregar
    renderComments();
  </script>
  
  
  <script>
    const controlBar = document.getElementById('control-bar');
    let hideTimeout;

    // Ativa a exibição quando clicar na barra
    controlBar.addEventListener('click', () => {
      controlBar.classList.add('show');

      // Reinicia o timeout
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        controlBar.classList.remove('show');
      }, 3000); // 3 segundos
    });

    // Também mostra se tocar perto da borda inferior da tela
    document.addEventListener('click', (e) => {
      const windowHeight = window.innerHeight;
      const clickY = e.clientY;

      if (clickY > windowHeight - 100) { // área inferior
        controlBar.classList.add('show');
        clearTimeout(hideTimeout);
        hideTimeout = setTimeout(() => {
          controlBar.classList.remove('show');
        }, 3000);
      }
    });
  </script>

   <script>
  function verificarLogin() {
    const logado = localStorage.getItem("logado");
    const tipo = localStorage.getItem("tipo");
    const usuario = localStorage.getItem("pai_rico_pai_pobre");

    console.log("Usuário logado:", logado);
    console.log("Usuário:", usuario);
    console.log("Tipo:", tipo);

    // Verificação geral de login
    if (logado !== "true") {
      window.location.href = "login.html";
      return;
    }

    // Verificação de tipo (ajuste conforme o tipo esperado para esta página)
    if (tipo !== "pai_rico_pai_pobre") {
      alert("Acesso negado. Esta página é apenas para usuários do tipo 'normal'.");
      window.location.href = "login.html";
      return;
    }

    // Se passou nas verificações, exibe o nome
    const nomeElemento = document.getElementById("nomeUsuario");
    if (nomeElemento) {
      nomeElemento.textContent = usuario;
    }
  }

  function logout() {
    localStorage.removeItem("logado");
    localStorage.removeItem("usuario");
    localStorage.removeItem("tipo");
    window.location.href = "login.html";
  }

  // Executa verificação assim que o script carrega
  verificarLogin();
</script>
