{ tipo: 'big', texto: 'As principais habilidades administrativas necessárias para o sucesso são:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1.1. Gestão do fluxo de caixa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2.2. Gestão de sistemas (incluindo você e o tempo dedicado à família).' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. 3. Gestão de pessoal.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As habilidades especializadas mais importantes são vendas e compreensão da comercialização. É a habilidade de vender — portanto, de comunicarse com outro ser humano, seja cliente, funcionário, chefe, cônjuge ou filho' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— a base para o sucesso pessoal. São habilidades de comunicação como redigir, falar e negociar que são cruciais para uma vida de sucesso. São habilidades que exercito constantemente, fazendo cursos ou comprando fitas educativas para expandir meu conhecimento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como já mencionei, meu pai instruído trabalhava cada vez mais arduamente quanto mais competente se tornava. Ele também se via cada vez mais encurralado quanto mais se especializava. Embora seu salário aumentasse, suas escolhas diminuíam. Pouco depois de ter sido mandado embora do trabalho no governo, descobriu como era vulnerável profissionalmente. É semelhante ao que ocorre com os atletas profissionais que de repente sofrem uma lesão ou ficam velhos demais para o esporte. Sua posição bem remunerada é perdida e eles têm habilidades limitadas às quais recorrer. Penso que é por isso que meu pai instruído se envolveu tanto com os sindicatos a partir daí. Ele percebeu o quanto o sindicato poderia tê-lo favorecido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atualmente, encontro ex-professores ganhando centenas de milhares de dólares ao ano. Eles ganham tanto porque têm, alem das habilidades especializadas de sua área, outras habilidades. Eles podem tanto ensinar quanto vender e comercializar. As habilidades de venda e marketing são difíceis para muitas pessoas sobretudo em decorrência de seu medo da rejeição. Quanto melhor você se comunicar, negociar e lidar com esse medo da rejeição, tanto mais fácil será a vida. Da mesma maneira que aconselhei àquela jornalista que queria tornar-se “autora de best-sellers”, repito isso para todos: ter uma especialização técnica tem seus pontos fortes e fracos. Tenho amigos que são gênios, mas não conseguem comunicar-se efetivamente e, em consequência, seus ganhos são lamentáveis. Eu os aconselho a passar um ano aprendendo a vender. Mesmo se não ganharem nada, sua capacidade de comunicação melhorará. E isso não tem preço.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Além de sermos bons aprendizes e vendedores e de entendermos de marketing, devemos ser tanto bons professores quanto bons alunos. Para sermos verdadeiramente ricos, devemos ser capazes tanto de dar quanto de receber. Em casos de dificuldades financeiras, frequentemente, o que falta é dar e receber. Sei de muita gente que é pobre porque não é nem bom estudante nem bom mestre.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ambos os meus pais eram homens generosos. Ambos tinham como regra primeira o dar. A educação era uma de suas formas de doação. Quanto mais davam mais recebiam. Uma diferença evidente estava na doação de dinheiro. Meu pai rico doava altos montantes. Doava para a igreja, para instituições de caridade, para sua fundação. Ele sabia que para receber dinheiro, você deve dar dinheiro. A doação de dinheiro é o segredo da maioria das grandes famílias ricas. É por isso que existem instituições como a Fundação Rockfeller e a Fundação Ford. São organizações destinadas a tomar a própria riqueza e aumentá-la, bem como a distribuí-la perpetuamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído costumava dizer sempre: “Quando tiver algum dinheiro extra, vou doá-lo.” O problema é que nunca havia um extra. Trabalhava sempre mais para conseguir mais dinheiro em lugar de concentrar-se na principal lei do dinheiro: “Dai e recebereis.” Ele acreditava no contrário: “Recebe e darás.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Concluindo, tornei-me ambos os pais. Uma parte de mim é um capitalista convicto que adora o jogo do dinheiro fazendo dinheiro. A outra é o do mestre socialmente responsável que está profundamente preocupado com o crescente hiato que separa os que têm dos que não têm. Acredito que o principal responsável por esse hiato crescente é o sistema de ensino arcaico.' },

      //CAPÍTULO OITO
      { tipo: 'h2', texto: 'Inicio' },
      { tipo: 'h3', texto: 'CAPÍTULO OITO' },
      { tipo: 'h2', texto: 'Como superar obstáculos' },
      
      { tipo: 'em', texto: 'M' },
      
      { tipo: 'small', texto: 'esmo que as pessoas tenham estudado e se alfabetizado do ponto de vista financeiro, elas ainda podem enfrentar obstáculos para se tornar financeiramente independentes. Há cinco razões principais que levam pessoas financeiramente alfabetizadas a não desenvolver uma coluna de ativos significativa, que poderia render grandes montantes de fluxo de caixa. Colunas de ativos que as poderiam libertar para viver a vida sonhada em lugar de trabalhar em tempo integral apenas para pagar as contas. Essas cinco razões são:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Medo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Ceticismo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Preguiça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4. Maus hábitos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '5. Arrogância.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Razão nº 1. Superar o medo de perder dinheiro. Nunca encontrei alguém que gostasse realmente de perder dinheiro. E em toda a minha vida nunca encontrei uma pessoa rica que nunca tivesse perdido dinheiro. Mas encontrei uma porção de gente pobre que nunca perdeu um tostão... investindo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O medo de perder dinheiro é real. Todo mundo tem. Mesmos os ricos. Mas o problema não está no medo, está na maneira de lidar com as perdas. É a maneira de lidar com o fracasso que faz a diferença na vida da gente. Isso serve para qualquer coisa, não apenas para o dinheiro. A principal diferença entre uma pessoa rica e outra pobre está em como elas lidam com esse medo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não há nada errado em ter medo. É aceitável ser um covarde quando se trata de dinheiro. Você ainda pode ser rico. Somos todos heróis em algumas circunstâncias e covardes em outras. Uma amiga de minha esposa é enfermeira de um pronto-socorro. Quando vê sangue, entra em ação. Quando falo em investir, ela sai correndo. Quando eu vejo sangue, não fujo, desmaio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai rico entendia as fobias relativas ao dinheiro. “Algumas pessoas têm pavor de cobra. Algumas pessoas têm pavor de perder dinheiro. Ambas são fobias”, dizia. Sua solução para a fobia de perder dinheiro era um pequeno verso:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Se você odeia risco e preocupação... comece cedo.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É por isso que os bancos aconselham iniciar o hábito da poupança desde a juventude. Se você começar jovem, será fácil ser rico. Não vou me estender sobre isso mas há uma grande diferença entre pessoas que começam a poupar aos 20 anos e as que começam aos 30. Uma diferença apreciável.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Diz-se que um dos assombros do mundo é o poder dos juros compostos. A aquisição da Ilha de Manhattan é considerada uma das maiores pechinchas de todos os tempos. Nova York foi comprada por US$24 em badulaques e contas de vidro. Contudo, se esses US$24 tivessem sido investidos a juros de 8% ao ano, esses US$24 estariam valendo mais de US$28 trilhões em 1995. Manhattan poderia ser recomprada e ainda sobraria dinheiro para comprar boa parte de Los Angeles, especialmente com os preços de imóveis vigentes em 1995.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu vizinho trabalha para uma grande empresa de computadores. Está lá há 25 anos. Em cinco anos ele deixará a empresa com US$4 milhões em seu fundo de pensão privado. O dinheiro está aplicado em fundos mútuos altamente rentáveis, que ele converterá em títulos e papéis do governo. Ao aposentar-se ele estará com 55 anos e terá um fluxo de caixa de cerca de US$300 mil ao ano, mais do que o seu salário atual. Isto quer dizer que é possível fazer, mesmo se você não quer perder ou odeia riscos. Mas precisa começar cedo e fazer um plano de pensão; além disso, você deveria contratar um consultor financeiro em que confie antes de investir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas se não tiver muito tempo pela frente ou se quiser aposentarse mais cedo? Como você lida com o medo de perder dinheiro?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai pobre não fez nada. Ele simplesmente evitava o assunto, recusando-se a discuti-lo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico por outro lado recomendava que eu pensasse como um texano. “Gosto do Texas e dos texanos”, falava. “No Texas tudo é maior. Quando os texanos ganham, eles ganham muito. E quando perdem, é espetacular.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Eles gostam de perder? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não estou dizendo isso. Ninguém gosta de perder. Mostre-me um perdedor feliz e eu lhe mostro um fracassado — respondeu pai rico. — É da atitude dos texanos em face do risco, da recompensa e do fracasso que estou falando. É como eles encaram a vida. Eles vivem grande. Não como a maioria do pessoal daqui, que vive como baratas quando se trata de dinheiro. Baratas com medo que alguém jogue um facho de luz em cima delas. Gente que se lamuria quando o empregado do armazém erra o troco por vinte centavos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico continuou explicando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que eu mais gosto é da atitude dos texanos. Eles se orgulham de ganhar e se gabam quando perdem. Os texanos têm um ditado: “Se você for quebrar, quebre em grande estilo.” Você não vai querer admitir que quebrou por uma ninharia. A maioria das pessoas aqui tem tanto medo de perder que não tem sequer uma ninharia para perder.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele falava constantemente com Mike e comigo que a maior razão da falta de sucesso financeiro era que a maioria das pessoas buscava segurança demais. “As pessoas têm tanto medo de perder que elas perdem”, costumava dizer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fran Tarkenton, que foi um grande zagueiro do futebol americano, dizia isso de outra forma: “Vencer significa não ter medo de perder.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao longo de minha vida, observei que os ganhos em geral se seguem às perdas. Antes de aprender a andar de bicicleta, levei muitas quedas. Nunca encontrei um jogador de golfe que não tivesse perdido alguma vez uma bola. Nunca encontrei alguém apaixonado que nunca tivesse tido o coração despedaçado. E nunca encontrei ninguém rico que não tivesse perdido dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maioria das pessoas não obtém ganhos financeiros porque a dor de perder dinheiro é maior do que a alegria de ficar rico. Outro ditado do Texas é: “Todos querem ir para o céu, mas ninguém quer morrer.” Todos sonham em ser ricos, mas têm pavor de perder dinheiro. Então nunca se chegará ao céu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico costumava contar para Mike e para mim histórias de suas viagens ao Texas. “Se você quer realmente aprender como lidar com o risco, com as perdas e com os fracassos, vá para San Antonio e visite o Álamo. O Álamo é uma grande história de gente corajosa que optou por lutar, sabendo que não havia esperança de sucesso contra a superioridade do inimigo. Eles preferiram morrer a render-se. É uma história inspiradora que merece ser estudada; contudo, não deixa de ser uma trágica derrota militar. Eles levaram um chute no traseiro. Um fracasso, se quiserem. Perderam. Então, como é que os texanos lidam com o fracasso? Eles ainda gritam: Lembre-se do Álamo!”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu ouvimos esta história muitas vezes. Pai rico sempre as repetia quando estava entrando em um grande negócio e ficava nervoso. Depois que tinha estudado tudo e era pegar ou largar, ele nos contava a história. Toda vez que sentia medo de cometer um erro, ou de perder dinheiro, ele nos contava a história. Ela lhe dava força, lembrava-lhe que sempre é possível transformar uma perda financeira em um ganho financeiro. Pai rico sabia que esse fracasso o tornaria mais forte e mais esperto. Não é que ele quisesse perder; apenas sabia quem ele era e como ele aceitaria a perda. Ele pegaria uma perda e a transformaria em um ganho. Isso é que o tornava um vencedor e os outros, perdedores. A história lhe dava coragem para avançar quando outros recuavam. “É por isso que gosto tanto dos texanos. Eles pegaram um grande fracasso e o transformaram em uma grande atração turística que lhes rende milhões.” Provavelmente, as palavras que mais significam para mim nos dias de hoje são estas: “Os texanos não escondem seus fracassos. São inspirados por eles. Pegam seus fracassos e os transformam em gritos de guerra. O fracasso inspira os texanos a se tornarem vencedores. Mas isso não é apenas uma fórmula para os texanos. É uma fórmula para todos os vencedores.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É como andar de bicicleta: as quedas foram parte do meu aprendizado. Lembro que elas aumentavam minha determinação de aprender. Não a diminuíam. Também disse que nunca encontrei um jogador de golfe que nunca tivesse perdido uma bola. Perder uma bola ou um torneio serve de inspiração aos jogadores de golfe para serem melhores, praticarem mais, estudarem mais. Isso é o que os aperfeiçoa. Para os vencedores, os fracassos são uma inspiração. Para os perdedores, o fracasso é uma derrota.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Citando John D. Rockefeller: “Sempre tentei transformar cada fracasso em uma oportunidade.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sendo nipo-americano, posso falar o seguinte. Muitas pessoas dizem que Pearl Harbor foi um erro americano. Eu digo que foi um erro japonês. No filme Tora, Tora, Tora, um sombrio almirante japonês diz a seus subordinados: “Receio que tenhamos acordado um gigante adormecido.” “Lembre-se de Pearl Harbor” tornou-se um grito de guerra. Transformou uma das maiores derrotas dos Estados Unidos em uma razão para vencer. Esta grande derrota deu força aos Estados Unidos, que logo se transformaram em uma potência mundial.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O fracasso inspira os vencedores. E o fracasso derrota os perdedores. É o maior segredo dos ganhadores. É o segredo que os perdedores não conhecem. O maior segredo dos vencedores é que o fracasso inspira a vitória; por isso eles não têm medo de perder. Repetindo Fran Tarkenton: “Vencer significa não ter medo de perder.” Pessoas como Tarkenton não têm medo de perder porque sabem quem são. Odeiam perder, de modo que sabem que o fracasso apenas as incentivará a se tornarem melhores. Há uma grande diferença entre detestar perder e ter medo de perder. A maioria das pessoas tem tanto medo de perder dinheiro que acaba perdendo. Elas quebram por uma ninharia. Financeiramente desejam segurança demais e têm um horizonte estreito. Compram casas grandes e carros grandes, mas não fazem grandes investimentos. A principal razão que leva 90% dos americanos a ter problemas financeiros é que eles jogam para não perder. Não jogam para ganhar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eles procuram seus consultores financeiros ou seus contadores ou seus corretores e adquirem um portfólio equilibrado. Muitos aplicam altas somas em Certificados de Depósito, em títulos de baixo rendimento, em fundos mútuos e em poucas ações. É um portfólio seguro e inteligente. Mas não é um portfólio vencedor. É o portfólio de quem não quer perder.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não me entenda mal. É provavelmente um portfólio melhor do que o da média da população, mas isso é apavorante. Um portfólio seguro é melhor do que nenhum portfólio. É um grande portfólio para quem adora a segurança. Mas buscar a segurança e o “equilíbrio” em seu portfólio de aplicações não é a forma como jogam os investidores bem-sucedidos. Se você tem pouco dinheiro e quer ficar rico, você deve estar “focado”, não “equilibrado”. Se você observar qualquer pessoa bem-sucedida, verá que no início elas não estavam equilibradas. Pessoas equilibradas não vão a lugar algum. Ficam em um lugar. Para progredir é preciso, no início, de um desequilíbrio. Veja como você progride quando anda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Thomas Edison não estava equilibrado. Estava focado. Bill Gates não estava equilibrado. Estava focado. Donald Trump está focado. George Soros está focado. George Patton não distribuiu seus tanques por uma área ampla. Ele os focou e arrasou os pontos fracos da linha alemã. Os franceses se espalharam pela Linha Maginot e você sabe o que aconteceu com eles.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você tem algum desejo de ser rico, você deve focar. Pôr uma porção de ovos em umas poucas cestas. Não fazer o que fazem os pobres e a classe média: pôem poucos ovos em muitas cestas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você odeia perder, procure a segurança. Se perder o enfraquece, procure a segurança. Procure aplicações equilibradas. Se você tem mais de 25 anos e está apavorado em assumir riscos, não mude. Procure a segurança, mas comece cedo. Comece a formar suas poupanças cedo porque vai levar tempo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas se você tem sonhos de liberdade, a primeira coisa a perguntar-se é: “Qual a minha reação ante o fracasso?” Se o fracasso o inspirar a ganhar, talvez você deva seguir adiante — mas só talvez. Se o fracasso o enfraquece ou o leva ao desespero — como os garotos mimados que correm ao advogado para processar alguém toda vez que as coisas não saem do seu jeito — então procure a segurança. Fique com seu emprego. Ou compre títulos ou fundos mútuos. Mas lembre que esses instrumentos financeiros também têm seus riscos mesmo sendo mais seguros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Digo tudo isso, citando os texanos e Fran Tarkenton, porque aumentar a coluna de ativos é fácil. É realmente um jogo que não exige grandes atitudes. Não exige muita instrução. A matemática do primeiro grau resolve. Mas aumentar a coluna de ativos é um jogo de atitude. Exige garra, paciência e resistência ante o fracasso. Os perdedores evitam o fracasso. E o fracasso transforma perdedores em vencedores, lembre-se do Álamo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Razão no 2. Superar o ceticismo. “O céu está caindo. O céu está caindo.” Todos nós conhecemos a história da galinha pessimista, que corria em torno do terreiro anunciando o fim do mundo. Todos conhecemos gente assim. Mas todos temos uma “galinha pessimista” dentro de nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como já disse em outra ocasião, o cético é verdadeiramente uma galinha pessimista. Todos nós parecemos com a galinha pessimista quando o medo e a dúvida toldam nossos pensamentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Todos nós temos dúvidas. “Não sou inteligente.” “Não sou tão bom assim.” “Fulano é melhor do que eu.” Nossas dúvidas muitas vezes nos paralisam. Jogamos o jogo do “E se?”. “E se a economia entrar em colapso logo depois de eu fazer o investimento?” “E se eu me descontrolar e não conseguir pagar as dívidas?” “E se as coisas não funcionarem como planejado?” Ou temos amigos ou pessoas amadas que nos lembram sempre nossas falhas. Eles dizem frequentemente: “O que o faz pensar que você pode fazer isso?” “Se fosse uma ideia tão boa, então como foi que ninguém se lembrou disso antes?” “Isso nunca vai dar certo. Você não sabe do que está falando.” Essas palavras de dúvida muitas vezes calam tão profundamente que deixamos de agir. Um sentimento horrível aperta nosso estômago. Às vezes não conseguimos dormir. Não andamos para a frente, de modo que ficamos com a segurança e abandonamos as oportunidades. Observamos a vida passando por nós enquanto sentamos imobilizados com um frio no corpo. Todos já passamos por isso na vida, alguns mais do que outros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Peter Lynch, do Fidelity Magellan, um conhecido fundo mútuo, faz advertências sobre o céu que despenca como um “ruído” e todos nós o ouvimos. O “ruído” pode ser criado dentro da nossa cabeça ou vir de fora. Muitas vezes de amigos, familiares, colegas ou da mídia. Lynch lembra o tempo, na década de 1950, em que a ameaça de uma guerra nuclear era tão comum no noticiário que as pessoas começaram a construir abrigos antinucleares e a estocar alimentos e água. Se elas investissem esse dinheiro sabiamente no mercado, em lugar de construir os abrigos, provavelmente teriam atingido a independência financeira nos dias de hoje.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando explodiram os motins em Los Angeles há alguns anos, as vendas de armas aumentaram em todo o país. Uma pessoa morreu depois de ter ingerido um hambúrguer malpassado no estado de Washington e o Departamento de Saúde do Arizona determinou que os restaurantes preparassem somente carne bem-passada. Uma empresa farmacêutica divulgou nacionalmente um anúncio de televisão mostrando pessoas gripadas. O anúncio foi divulgado em fevereiro. Os casos de gripe aumentaram bem como as vendas do medicamento anunciado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maioria das pessoas é pobre porque quando se trata de investir, o mundo está cheio de “pessimistas” que correm gritando “O céu está caindo”. “O céu está caindo.” E os pessimistas atingem seus objetivos porque todos somos um pouco pessimistas. Muitas vezes é necessário coragem para não permitir que rumores e anúncios de desastres afetem nossas dúvidas e medos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1992, um amigo chamado Richard foi de Boston a Phoenix para visitar minha mulher e eu. Ele estava impressionado com o que tínhamos feito por meio de ações e imóveis. Os preços dos imóveis em Phoenix estavam deprimidos. Passamos dois dias mostrando-lhe o que considerávamos excelentes oportunidades de geração de fluxo de caixa e de valorização de capital.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Minha mulher e eu não somos verdadeiramente corretores imobiliários. Somos apenas investidores. Depois de identificar uma unidade em um condomínio de lazer, chamamos o corretor que a vendeu para Richard naquela mesma tarde. O preço era de apenas US $42 mil para uma casa de dois quartos. Unidades semelhantes estavam sendo vendidas a US$65 mil. Meu amigo achou que era uma pechincha, fechou o negócio e voltou para Boston.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Duas semanas depois o corretor ligou dizendo que meu amigo tinha voltado atrás. Liguei imediatamente para ele a fim de saber o que ocorrera. Tudo o que ele disse foi que falou com um vizinho e este lhe disse que era um mau negócio. O preço era alto demais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Perguntei a Richard se o vizinho era um investidor. Richard respondeu “não”. Quando eu lhe perguntei por que, então, lhe dava ouvidos, meu amigo partiu para a defensiva e simplesmente disse que preferia procurar um pouco mais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O mercado imobiliário de Phoenix se recuperou e, por volta de 1994, aquela pequena unidade estava sendo alugada por US$1 mil mensais — US$2,5 mil nos meses de inverno. Seu valor alcançava, em 1995, US$95 mil. Tudo o que Richard teria precisado era dar uma entrada de US$5 mil e já teria dado o primeiro passo para sair da Corrida dos Ratos. Até hoje ele não fez nada. E as pechinchas de Phoenix ainda estão aí, só que agora é preciso procurar bem mais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O recuo de Richard não me surpreendeu. É o chamado “remorso do comprador” e afeta a todos. São essas dúvidas que atrapalham. O pessimismo ganhou e perdeu-se uma chance de libertação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Outro exemplo. Uma pequena parte de meus ativos está aplicada em Certificados de Gravame de Impostos[24] em lugar de Certificados de Depósitos. Assim, meu dinheiro rende 16% ao ano, o que sem dúvida é melhor do que os 5% que o banco oferece. Esses certificados são garantidos por imóveis e são estabelecidos por leis estaduais, o que também é melhor do que o que a maioria dos bancos oferece. A fórmula em que estão embasados os torna seguros. Eles só não têm liquidez. De modo que eu os considero Certificados de Depósito com prazo de dois a sete anos. Sempre que menciono para alguém, especialmente para aqueles que aplicam em Certificados de Depósito, que também aplico daquela forma, ouço dizer que se trata de uma opção arriscada. Dizem que eu não deveria aplicar nesses títulos. Quando pergunto como obtiveram essa informação, mencionam um amigo ou uma revista de negócios. Eles nunca aplicaram nisso e falam para quem o faz que é um equívoco fazê-lo. O rendimento mais baixo que procuro é 16%, mas pessoas cheias de dúvidas se conformam com 5%. A dúvida é cara.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quero ressaltar que são essas dúvidas e esse ceticismo que mantêm muitas pessoas na pobreza, correndo atrás da segurança. O mundo real está aí esperando que você enriqueça. Só as dúvidas mantêm as pessoas na pobreza. E, como já disse, sair da Corrida dos Ratos é tecnicamente fácil. Não requer muita instrução, mas as dúvidas são um obstáculo para muita gente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Os céticos nunca ganham”, dizia pai rico. “A dúvida não esclarecida e o medo criam o cético. Os céticos criticam e os vencedores analisam” era outra de suas frases favoritas. Pai rico explicava que a crítica cegava enquanto a análise abria os olhos. A análise permitia que os vencedores vissem que os críticos eram cegos e que percebessem oportunidades que todos os demais não percebiam. E encontrar o que os outros não veem é a chave para qualquer sucesso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os imóveis são uma poderosa ferramenta de investimento para quem esteja em busca da independência financeira. É um instrumento único. Contudo, sempre que menciono os imóveis como uma aplicação, ouço alguém dizer: “Não quero consertar vasos sanitários.” Isso é o que Peter Lynch chama de “ruído”. É o que pai rico chamava de conversa de cético. Alguém que critica e não analisa. Alguém que deixa que suas dúvidas e medos fechem sua mente em vez de abrir seus olhos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando alguém fala “Não quero consertar vasos sanitários”, tenho vontade de retrucar: “E o que o faz pensar que eu quero?” Eles estão dizendo que um vaso é mais importante do que aquilo que eles querem. Eu falo de liberação da Corrida dos Ratos, e eles pensam em vasos sanitários. Esse é o padrão de pensamento que mantém muita gente na pobreza. Criticam em vez de analisar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“A chave de seu sucesso está nos não quero”, dizia pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu também não estou a fim de consertar vasos sanitários, procuro sempre um bom administrador de imóveis que conserte os vasos. E ao encontrar um bom administrador que cuide bem dos imóveis, meu fluxo de caixa aumenta. Mais importante ainda, um bom administrador de imóveis me permite comprar ainda mais imóveis, pois não preciso me preocupar com o conserto dos vasos sanitários. Um bom administrador de imóveis é a chave para o sucesso com imóveis. Achá-lo é mais importante do que o próprio imóvel. Um bom administrador muitas vezes sabe de bons negócios antes dos corretores, o que os torna ainda mais valiosos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É isso o que o meu pai rico queria dizer quando falava “A chave de seu sucesso está nos não quero”. Como eu também não quero consertar vasos, descobri uma forma de comprar mais imóveis e apressar minha saída da Corrida dos Ratos. As pessoas que continuam falando “Não quero consertar vasos sanitários”, muitas vezes se privam desse poderoso instrumento de investimento. Os vasos são mais importantes que sua liberdade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No mercado de ações ouço muita gente declarar: “Não quero perder dinheiro.” Bom, o que os leva a pensar que eu ou qualquer outra pessoa gostamos de perder dinheiro? Eles não ganham dinheiro porque optam por não perder dinheiro. Em lugar de analisar, fecham suas mentes a outro poderoso meio de investimento, o mercado de ações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em dezembro de 1996, estava passando com um amigo pelo posto de gasolina do bairro. Ele olhou e viu que o preço da gasolina estava aumentando. Meu amigo é um cara encucado, um pessimista. Para ele o céu está sempre a ponto de cair, e em geral cai sobre sua cabeça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando chegamos em casa, ele me expôs todas as estatísticas que mostravam por que o preço do petróleo deveria aumentar nos próximos anos. Estatísticas que eu nunca vira antes, mesmo quando eu já tinha um substancial bloco de ações de uma empresa petrolífera. Com essa informação em mãos comecei a procurar e achei uma nova empresa petrolífera que estava a ponto de descobrir algumas jazidas. Meu corretor ficou entusiasmado com essa nova empresa e eu comprei 15 mil ações por 65 centavos cada uma.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em fevereiro de 1997, enquanto escrevo este livro, o mesmo amigo e eu passamos pelo mesmo posto de gasolina e, de fato, o preço do combustível subira cerca de 15%. Novamente, o pessimista se preocupou e se queixou. Eu sorri porque em janeiro desse mesmo ano, o preço daquelas ações da pequena empresa petrolífera já valiam US $3 cada uma. E o preço da gasolina deverá continuar aumentando, se o que meu amigo diz for verdade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em vez de analisar, os pessimistas fecham suas mentes. Se a maioria das pessoas entendesse como uma ordem de “stop” funciona nos investimentos em ações, haveria mais gente investindo para ganhar do que para não perder. O “stop” é simplesmente um comando de computador que vende automaticamente suas ações se o preço começa a cair, ajudando-o a minimizar as perdas e a maximizar alguns ganhos. É uma grande ferramenta para aqueles que têm pavor de perder.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por isso, sempre que ouço pessoas preocupadas com os “Não quero” em vez de pensar no que querem, sei que o “ruído” de suas cabeças deve ser grande. O pessimista se apoderou delas e grita “O céu caiu e os vasos sanitários estão enguiçando”. Assim elas evitam seus “Não quero” mas pagam um preço alto. Nunca conseguirão o que querem na vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico me mostrou uma maneira de olhar o pessimista. “Faça o que fez o coronel Sanders.” Com 66 anos, ele perdeu seu negócio e começou a viver da aposentadoria da Seguridade Social. Não era o suficiente. Ele começou a percorrer o país tentando vender sua receita de galinha frita. Ela foi recusada 1.009 vezes antes que alguém dissesse “sim”. E ele acabou se tornando um multimilionário em uma idade em que a maioria das pessoas está desistindo. “Ele era um homem corajoso e tenaz”, dizia pai rico a respeito de Harlan Sanders.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Assim, quando você estiver em dúvida e um pouco receoso, faça o que o coronel Sanders fez com sua galinha. Ele a fritou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Razão no 3. Preguiça. Pessoas ocupadas são, com frequência, preguiçosas, todos nós conhecemos histórias do homem de negócios que trabalha arduamente para ganhar dinheiro. Ele dá duro para ser um bom provedor de sua mulher e de seus filhos. Ele passa longas horas no escritório e leva trabalho para casa nos fins de semana. Um dia, ao chegar em casa, encontra-a vazia. Sua esposa foi embora com as crianças. Ele sabia que estava tendo problemas com a esposa, mas em vez de esforçar-se em fortalecer a relação, ele se dedicou ao trabalho. Desiludido, seu desempenho no emprego declina e ele é demitido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Hoje em dia, encontro frequentemente gente muito ocupada para cuidar de sua riqueza. E há pessoas muito ocupadas para cuidar da própria saúde. A causa é a mesma. Estão ocupadas e continuam ocupadas como forma de evitar algo que não desejam enfrentar. Ninguém precisa lhes dizer isso. No seu íntimo elas sabem. De fato, se você falar sobre o assunto com elas, elas respondem muitas vezes com raiva ou irritação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se não estão ocupadas com o trabalho ou com as crianças, muitas vezes estão ocupadas assistindo à televisão, jogando golfe ou fazendo compras. Contudo, lá no fundo sabem que estão fugindo de algo importante. Essa é a forma mais comum de preguiça. A preguiça mantendo-se ocupado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E qual é a cura para a preguiça? A resposta está em um pouco de ambição. Muitos de nós fomos educados pensando que a ambição ou a ganância é algo ruim. “Pessoas gananciosas são más”, dizia minha mãe. Contudo, todos nós temos o desejo de possuir coisas belas, novas ou empolgantes. Para manter essa emoção de desejo sob controle, muitas vezes os pais encontram formas de suprir esse sentimento com culpa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Você só pensa em você mesmo, não sabe que tem irmãos e irmãs?” — era uma das frases favoritas da minha mãe. Ou “Você quer que eu compre o que para você?”, repetia meu pai. “Você pensa que fabricamos dinheiro? Você pensa que o dinheiro dá em árvore? Você sabe que não somos ricos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não eram tanto as palavras, mas o sentimento de culpa que as acompanhava, o que me deixava possesso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O reverso da criação desse sentimento de culpa era: “Sacrifico minha vida para lhe comprar isto. Estou comprando para você porque nunca tive coisas assim quando criança.” Tenho um vizinho que está totalmente falido, mas que não consegue colocar o carro na sua garagem. A garagem está cheia de brinquedos das crianças. Esses garotos mimados têm tudo o que sonham. “Não quero que saibam o que é passar necessidade”, diz o pai. Ele não tem um tostão guardado para mandar os filhos para a universidade ou para ele mesmo se aposentar, mas seus filhos têm todos os brinquedos possíveis. Recentemente recebeu pelo correio um novo cartão de crédito e levou os filhos para conhecer Las Vegas. “Faço isso pelos garotos”, diz com ar de grande sacrifício.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico proibia que se dissesse “Não dá para comprar”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na casa de minha família de verdade, escutava isso a toda hora. Já pai rico queria que seus filhos dissessem: “Como posso comprar isso?” Ele considerava que as palavras “Não dá para comprar” fechavam o cérebro. Você não precisava pensar mais. “Como posso comprar isso?” era uma forma de abrir a mente. Obrigava você a pensar e buscar alternativas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mais importante do que isso, ele considerava que “Não dá para comprar” é uma mentira. E o espírito humano sabe disso. “O espírito humano é poderoso, muito poderoso”, dizia. Quando sua mente preguiçosa repete “Não dá para comprar”, uma guerra se estabelece dentro de você. Seu espírito se enfurece, e sua mente preguiçosa deve defender a mentira dita. O espírito grita: “Vamos. Vamos para a academia fazer exercícios.” E a mente preguiçosa responde: “Estou cansada. Trabalhei muito hoje.” Ou o espírito humano diz: “Estou cansado de ser pobre. Vamos sair daqui e enriquecer.” E a mente preguiçosa fala: “Pessoas ricas são gananciosas. Além disso, dá muito trabalho. Não é seguro. Posso perder dinheiro. Do jeito que está já trabalho muito. Já tenho que fazer coisa demais no emprego. Veja o que tenho de fazer hoje à noite. O chefe quer que eu entregue de manhã.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Não dá para comprar” também traz tristeza. Uma sensação de desamparo que leva ao desânimo e muitas vezes à depressão. “Apatia” é outra palavra que se aplica. “Como posso comprar isso?” abre possibilidades, empolgação e sonhos. Pai rico não estava tão preocupado com o que você queria comprar, mas esse “Como posso comprar isso?” fortalece a mente e dinamiza o espírito.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Assim, raramente ele dava alguma coisa a Mike ou a mim. Em vez disso perguntava “Como você pode comprar isso?”, e isso incluía a mensalidade da universidade que nós tínhamos de pagar com nosso dinheiro. Não era o objetivo, mas o processo de atingir o objetivo que desejávamos o que ele procurava passar para nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O problema é que hoje sinto que milhões de pessoas se sentem culpadas por sua ambição. É um condicionamento que vem da infância. Elas desejam ter melhores condições que a vida oferece. A maioria foi condicionada, entretanto, a dizer subconscientemente “Você não pode ter isso” ou “Você não conseguirá comprar isso nunca”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando decidi sair da Corrida dos Ratos, havia uma questão simples: “Como posso conseguir não voltar a trabalhar mais?” E minha mente começou a disparar respostas e soluções. A parte mais difícil foi romper com os dogmas de minha família de verdade... “Não podemos comprar isso” ou “Pare de pensar só em você” ou “Por que você não pensa nos outros?” e outras expressões parecidas que se destinavam a criar culpa e suprimir minha ambição.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Assim, como combater a preguiça? A resposta está em um pouco de ambição. É como diz aquela estação de rádio, WII-FM, O que há aí para mim?. A pessoa precisa sentar e pensar “O que há aí para mim se sou saudável, sexy e tenho boa aparência?” “Como seria minha vida se eu nunca tivesse de voltar a trabalhar?” “O que seria de mim se eu tivesse todo o dinheiro de que preciso?” Sem esse pouco de ambição, não há o desejo de ter algo melhor, de progredir. Vamos à escola e estudamos muito porque queremos algo melhor. Então sempre que você se flagrar evitando algo que você sabe que deveria realizar, a única coisa a fazer é perguntar-se O que há aí para mim?. Seja um pouco ambicioso. É a melhor cura para a preguiça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Contudo, ambição demais, como todo exagero, não é bom. Mas lembrese do que Michael Douglas falava no filme Wall Street: “A ambição é boa.” Pai rico falava de forma diferente: “A culpa é pior do que a ambição, pois a culpa nos rouba a alma.” E, para mim, quem falou melhor foi Eleanor Roosevelt: “Faça o que seu coração acha certo — de qualquer forma você será criticado. Você estará perdido se fizer e perdido se não fizer.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Razão no 4. Maus hábitos. Nossas vidas são mais um reflexo de nossos hábitos do que de nossa educação. Depois de ver o filme Conan, protagonizado por Arnold Schwarzenegger, um amigo falou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Adoraria ter o corpo de Schwarzenegger — vários caras concordaram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ouvi dizer que antes ele era magro e fraco — acrescentou outro amigo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Também já ouvi isso — acrescentou outro. — Dizem que ele malha todos os dias na academia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Aposto que sim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O quê? — exclamou o cínico do grupo. — Aposto que é assim de nascença. Vamos mudar de assunto e tomar umas cervejas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Este é um exemplo de comportamento controlado pelos hábitos. Lembrome de fazer perguntas a pai rico sobre os hábitos dos ricos. Em vez de dar uma resposta direta, ele tentou ensinar pelo exemplo como costumava fazer:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quando seu pai paga as contas dele? — perguntou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— No início do mês — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E sobra alguma coisa? — prosseguiu pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Pouco — disse eu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É por isso que ele tem dificuldades — falou pai rico. — Ele tem maus hábitos. Seu pai paga primeiro todos os outros. Ele paga a si mesmo por último, mas só se sobrar alguma coisa' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que em geral não acontece — comentei. — Mas ele tem de pagar as contas, não tem? O senhor está dizendo que ele não deveria pagar as contas?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Claro que não — disse pai rico. — Acredito firmemente em pagar minhas contas no prazo. Só que eu pago a mim mesmo em primeiro lugar. Mesmo antes de pagar ao governo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas o que acontece se o senhor não tiver dinheiro que chegue? — retruquei. — O que o senhor faz então?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— À mesma coisa — prosseguiu pai rico. — Primeiro pago a mim mesmo. Mesmo se tiver pouco dinheiro. Minha coluna de ativos é muito mais importante para mim do que o governo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas — continuei — eles não vão atrás do senhor?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, se você não pagar — disse pai rico. — Olhe, não estou falando para não pagar. Só que eu pago a mim mesmo primeiro, mesmo quando tenho pouco dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas como é o que o senhor consegue isso? — disse eu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— À questão não é como. A questão é por quê? — replicou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK, por quê?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Motivação — falou pai rico. — Quem reclamará mais se eu não pagar' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— eu ou meus credores?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sem dúvida os credores gritarão mais alto — respondi à pergunta óbvia. — O senhor não faria nada se pagasse a si próprio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Está vendo, depois de pagar a mim mesmo, a pressão para pagar meus impostos e os demais credores é tão grande que me obriga a buscar outras formas de renda. A pressão para pagar se torna uma motivação. Já tive empregos extras, comecei outros empreendimentos, negociei na bolsa, qualquer coisa para ter certeza de que esses caras não ficassem gritando comigo. Essa pressão me fez trabalhar mais, me obrigou a pensar, e tudo isso me tornou mais esperto e mais ativo no que se refere a dinheiro. Se eu deixasse para me pagar no final, não teria sentido as pressões, e estaria quebrado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quer dizer que é o medo do governo ou de outras pessoas a quem deve dinheiro que o motiva?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Certo — disse pai rico. — Você vê, o pessoal do governo é forte. Os demais credores também. A maioria das pessoas se rende a esses tiranos. Elas pagam a eles e nunca se pagam a si próprias. Você conhece a história do fracote a quem atiram areia na cara?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Abanei a cabeça afirmativamente:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Já vi esse anúncio de aulas de fisiculturismo nos gibis muitas vezes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, grande parte das pessoas deixa que os fortes lhes joguem areia na cara. Eu decidi usar o medo do tirano para me tornar mais forte. Outros ficam mais fracos. Ao me forçar a pensar em como ter mais dinheiro, estou fazendo como quem vai malhar na academia. Quanto mais trabalho os músculos de minha mente, mais forte me torno. Agora não tenho medo desse pessoal.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Gostei do que pai rico estava falando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então se eu pagar a mim mesmo primeiro, ficarei mais forte financeira, mental e fisicamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico concordou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E se eu me pagar por último, ou deixar de me pagar, fico mais fraco. Chefes, administradores, credores e locadores ficarão me perturbando a vida inteira, só porque não tenho bons hábitos quanto ao dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Igualzinho ao fracote do anúncio — disse pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Razão no 5. A arrogância é ego mais ignorância.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“O que eu sei me faz ganhar dinheiro. O que eu não sei me faz perder dinheiro. Toda vez que fui arrogante perdi dinheiro, porque quando sou arrogante, acredito mesmo que o que não sei não é importante”, repetia frequentemente pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Descobri que muita gente usa a arrogância para tentar esconder a própria ignorância. Isso costuma acontecer quando discuto demonstrações financeiras com contadores ou até com outros investidores. Eles tentam forçar caminho na discussão. Para mim, fica claro que não sabem do que estão falando. Não estão mentindo, mas também não estão falando a verdade.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há muita gente no mundo do dinheiro, das finanças e do investimento que não tem nenhuma ideia do que está falando. A maioria das pessoas do setor fica fazendo proposições de venda vazias como as de um vendedor de carros usados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando você for ignorante a respeito de um assunto, comece a instruirse achando um especialista ou um livro sobre o tema.' },

      //CAPÍTULO NOVE
      { tipo: 'h3', texto: 'CAPÍTULO NOVE' },
      { tipo: 'h2', texto: 'Em ação' },
      
      { tipo: 'em', texto: 'G' },
      
      { tipo: 'small', texto: 'ostaria de poder dizer que adquirir riqueza foi fácil, mas não foi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para responder à pergunta “Como começo?”, apresento o processo pelo qual passei dia a dia. É realmente fácil encontrar bons negócios. Garanto isso. É como andar de bicicleta. Depois de algumas peripécias, vira um passeio. Mas quando se trata de dinheiro, a determinação para ultrapassar a fase das peripécias é uma decisão pessoal.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Descobrir “negócios únicos na vida”, de milhões de dólares, exige que convoquemos nosso gênio financeiro. Acredito que em cada um de nós reside um gênio financeiro. O problema é que ele está adormecido, esperando ser despertado. Está adormecido porque nossa cultura nos educa para acreditar que o amor ao dinheiro é a raiz de todos os males. Ela nos incentiva a aprender uma profissão para que possamos trabalhar pelo dinheiro, mas não nos ensina a fazer o dinheiro trabalhar para nós. Ela nos ensina a não nos preocupar com nosso futuro financeiro, que o governo ou a empresa cuidarão de nós quando chegar o dia da aposentadoria. Contudo, são nossos filhos, formados no mesmo sistema de ensino, que acabarão pagando por ela. A mensagem é trabalhar arduamente, ganhar e gastar o dinheiro, e quando ele faltar sempre poderemos tomar emprestado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Infelizmente, 90% do mundo ocidental aceita essa teoria, simplesmente porque é mais fácil encontrar um emprego e trabalhar pelo dinheiro. Se você não faz parte dessa “massa”, eu lhe mostrarei os dez passos para despertar seu gênio financeiro. São simplesmente os passos que eu segui. Se quiser tentar alguns deles, ótimo. Se não, escolha os seus. Seu gênio financeiro é suficientemente esperto para desenvolver sua própria lista.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Falando no Peru com um garimpeiro de 45 anos, eu lhe perguntei por que ele tinha tanta confiança em encontrar uma mina de ouro. Ele respondeu: “Há ouro em todo lugar. A maioria das pessoas não está treinada para vê-lo.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E eu diria que isso é verdade. Quanto a imóveis, posso sair qualquer dia e achar quatro ou cinco bons negócios em potencial, onde uma pessoa comum não encontra nada. Mesmo procurando no seu bairro. A razão é que ela não dedica tempo para desenvolver seu gênio financeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os dez passos a seguir são um processo que pode ajudá-lo desenvolver os poderes que Deus lhe deu. Poderes que só você pode controlar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1 PRECISO DE UMA RAZÃO MAIOR DO QUE A REALIDADE. O poder do espírito. Se você perguntar à maioria das pessoas se elas desejariam ser ricas ou financeiramente independentes, elas responderão “sim”. Mas então caem na realidade. A estrada parece demasiadamente longa, com muitas montanhas a escalar. É mais fácil trabalhar pelo dinheiro e colocar o que sobra nas mãos do corretor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Certa vez conheci uma jovem que sonhava participar da equipe olímpica de natação dos Estados Unidos. Ela acordava todos os dias às 4:00 para treinar durante três horas antes de ir à faculdade. Ela não ia a festas com os amigos nas noites de sábado. Ela tinha de estudar para obter notas altas como todo mundo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando lhe perguntei o que a levava a essa ambição e a esse sacrifício sobre-humano, ela simplesmente respondeu: “Faço isso por mim mesma e pelas pessoas que amo. É o amor que me leva a superar obstáculos e sacrifícios.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma razão ou um propósito é uma combinação de alguns “quero” e alguns “não quero”. Quando as pessoas me perguntam qual a razão que me levou a querer ser rico, digo que foi a combinação profunda e emocional dos “quero” e “não quero”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Listarei alguns. Primeiro os “não quero”, pois são eles que criam os “quero”. Não quero trabalhar a vida inteira. Não quero o que meus pais aspiravam para mim, que era segurança no emprego e uma casa no subúrbio. Não quero ser um empregado. Odiava quando meu pai não assistia a meus jogos de futebol porque estava ocupado com sua carreira. Odiava ver meu pai trabalhando arduamente, e o governo levando boa parte do que ele tinha obtido quando morreu. Ele não pôde nem mesmo deixar para os filhos aquilo pelo qual tinha trabalhado tanto. Os ricos não fazem isso. Eles trabalham arduamente e deixam um legado para seus filhos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora os “quero”. Quero ser livre para viajar por todo o mundo e viver o estilo de vida que gosto. Quero fazer isso ainda jovem. Quero ser simplesmente livre. Quero controlar meu tempo e minha vida. Quero que o dinheiro trabalhe para mim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Essas são minhas razões emocionais profundas. Quais são as suas? Se elas não forem suficientemente fortes, então a realidade da estrada à frente pode ser maior do que suas razões. Perdi dinheiro e tive vários fracassos, mas foram essas razões emocionais que me mantiveram de pé e me fizeram prosseguir. Queria ser livre por volta dos 40 anos, mas precisei esperar até os 47 com muitas experiências de aprendizado ao longo do caminho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse, gostaria de dizer que foi fácil. Mas não foi, mas também não foi duro. Sem uma forte razão ou propósito, aí sim, qualquer coisa na vida é dura.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'SE VOCÊ NÃO TIVER UM FORTE MOTIVO, NÃO FAZ SENTIDO CONTINUAR A LEITURA. PARECERÁ TRABALHO DEMAIS.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. ESCOLHO TODOS OS DIAS. O poder da escolha, esta é a principal razão pela qual as pessoas querem viver em um país livre. Queremos o poder de escolha.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Financeiramente, com cada dólar que temos em nossas mãos, temos o poder de escolher nosso futuro de ricos, pobres ou classe média. Nossos hábitos de despesa refletem quem somos nós. As pessoas pobres têm simplesmente maus hábitos de despesa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma vantagem que eu tive em criança foi a de que gostava de jogar Banco Imobiliário constantemente. Ninguém me disse que Banco Imobiliário era só para crianças, de modo que continuei jogando adulto. Também tinha pai rico que me mostrou a diferença entre um ativo e um passivo. Sendo assim, há muito tempo, quando ainda era garoto, escolhi ser rico e sabia que tudo o que eu tinha a fazer era adquirir ativos, ativos reais. Meu melhor amigo, Mike, tinha uma coluna de ativos que lhe fora dada, mas ele teve que optar por aprender a mantê-la. Muitas famílias ricas perdem os ativos na geração seguinte simplesmente porque não havia ninguém treinado para ser um bom guardião dos ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas pessoas optam por não ser ricas. Para 90% da população, ser rico é “confusão demais”. Então inventam de dizer coisas como “Não estou interessado em dinheiro”, “Nunca serei rico”, “Não preciso me preocupar, ainda sou jovem”, “Quando tiver algum dinheiro vou pensar sobre meu futuro” ou “Meu marido/mulher cuida das finanças”. O problema dessas afirmações é que elas roubam das pessoas que pensam assim duas coisas: uma, tempo, que é nosso ativo mais precioso; e, dois, o aprendizado. Só porque você não tem dinheiro, isso não é desculpa para não aprender. Mas é uma escolha que fazemos a cada dia, a escolha do que fazer com nosso tempo, com nosso dinheiro e com o que colocamos em nossa cabeça. É o poder da escolha. Todos nós temos escolhas. Escolhi ser rico e faço essa opção a cada dia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'INVISTA PRIMEIRO NA INSTRUÇÃO. Na verdade, o único ativo real que você possui é sua mente, o instrumento mais importante que dominamos. Como disse, cada um de nós pode escolher o que põe em sua mente uma vez alcançada idade suficiente. Você pode ficar assistindo à MTV o dia inteiro, ou ler revistas de golfe, ou fazer um curso de cerâmica ou um curso de planejamento financeiro. Você escolhe. A maioria das pessoas simplesmente compra investimentos em lugar de aprender a investir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma de minhas amigas, uma mulher rica, teve recentemente seu apartamento roubado. Os ladrões levaram o aparelho de televisão e o videocassete e deixaram todos os seus livros. Nós todos temos essa escolha. Novamente, 90% da população compra aparelhos de televisão e somente uns 10% compram livros de negócios ou fitas sobre investimento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, o que é que eu faço? Vou a seminários. Gosto quando eles duram pelo menos dois dias porque gosto de me aprofundar em um tema. Em 1973, estava assistindo à televisão e vi o anúncio de um seminário de três dias sobre como comprar imóveis sem precisar dar entrada. Gastei US$385 e o curso me permitiu ganhar pelo menos US $2 milhões, talvez mais. Porém, mais importante, me comprou vida. Não preciso trabalhar pelo resto da vida por causa daquele curso. Faço pelo menos dois desses seminários por ano.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Adoro fitas de áudio. A razão: posso voltar para trás rápido. Estava ouvindo uma fita de Peter Lynch e ele disse algo de que discordei completamente. Em vez de me mostrar arrogante e crítico, simplesmente apertei o botão de “retrocesso” e ouvi aquele trecho da fita umas vinte vezes. Talvez até mais. De repente, mantendo minha mente aberta, entendi por que ele estava falando aquilo. Foi como uma mágica. Senti como se tivesse uma janela para a mente de um dos maiores investidores do nosso tempo. Ganhei uma tremenda profundidade e percepção dos vastos recursos de seu conhecimento e de sua experiência.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Resultado líquido: ainda tenho minha velha maneira de pensar e tenho a forma de Peter de ver o mesmo problema ou situação. Tenho dois pensamentos em vez de um. Mais de uma forma de analisar um problema ou tendência, e isso não tem preço. Hoje me pergunto muitas vezes: “Como Peter Lynch faria isso, ou Donald Trump, ou Warren Buffett ou George Soros?” A única maneira pela qual posso acessar seu vasto poder mental é sendo suficientemente humilde para ler ou ouvir o que eles têm a dizer. Pessoas arrogantes e críticas são muitas vezes pessoas com baixa autoestima que têm medo de assumir riscos. Veja, se você aprende algo novo, terá de errar a fim de entender totalmente o que aprendeu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você leu até aqui, a arrogância não é um de seus problemas. Pessoas arrogantes raramente leem ou compram fitas. Por que elas o fariam? Elas são o centro do universo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há pessoas “inteligentes” que discutem ou se defendem quando uma ideia nova se choca com o que pensam. Neste caso, sua assim chamada “inteligência” combinada com a “arrogância” se torna “ignorância”. Cada um de nós conhece alguém muito instruído, ou que se acredita esperto, mas cujo balanço mostra outra coisa. Uma pessoa verdadeiramente inteligente saúda as novas ideias, porque novas ideias podem aumentar a sinergia de outras ideias acumuladas. Ouvir é mais importante do que falar. Se isso não fosse verdade, Deus não teria nos dado dois ouvidos e apenas uma boca. Gente demais pensa com a boca, em vez de ouvir para assimilar novas ideias e possibilidades. Discute-se em lugar de se perguntar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Penso em minha riqueza a longo prazo. Não sou partidário da mentalidade do “fique rico depressa” de muitos compradores de bilhetes de loteria ou frequentadores de cassinos. Posso comprar e vender ações, mas sempre compro instrução. Se você quer pilotar um avião, aconselho a tomar aulas antes. Sempre fico chocado com gente que compra ações ou imóveis mas nunca investe em seu maior ativo: sua mente. O fato de ter comprado um ou dois imóveis não o torna um especialista em imóveis.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. ESCOLHA OS AMIGOS COM CUIDADO. O poder da associação. Em primeiro lugar, não escolho meus amigos levando em conta suas demonstrações financeiras. Tenho amigos que fizeram, de fato, voto de pobreza, bem como amigos que ganham milhões todo ano. O importante é que aprendo com todos eles e faço um esforço consciente para isso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Admito que há pessoas que procurei porque têm dinheiro. Mas eu não estava atrás de seu dinheiro, queria seu conhecimento. Em alguns casos, essas pessoas de vastas posses se tornaram amigos queridos, mas nem todos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há uma diferença que gostaria de destacar. Observei que meus amigos ricos falam de dinheiro. E não estou querendo dizer que se gabem. Eles se interessam pelo assunto. Já os amigos que sei estarem em dificuldades financeiras não gostam de falar de dinheiro, negócios ou investimentos. Muitas vezes pensam que isso não é educado ou que é anti-intelectual. Ou seja, também aprendo com os amigos que têm dificuldades financeiras: descubro o que não fazer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Tenho vários amigos que obtiveram mais de um bilhão de dólares durante suas breves vidas. Três deles observam o mesmo fenômeno: seus amigos que não têm dinheiro nunca lhes perguntaram como eles o conseguiram. Mas eles pedem duas coisas: dinheiro emprestado e/ou um emprego.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'ADVERTÊNCIA: Não ouça as pessoas pobres ou apavoradas. Tenho amigos assim, e gosto muito deles, mas são pessimistas na vida. Quando se trata de dinheiro, especialmente investimentos, “o céu está sempre caindo”. Eles sempre sabem por que as coisas não funcionam. O problema é que as pessoas as ouvem mas aqueles que aceitam cegamente essas informações pessimistas são também pessimistas. E, como diz o velho ditado, “Galinhas da mesma plumagem concordam entre si”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você assiste à CNBC, uma mina de ouro de informações sobre investimentos, sabe que eles apresentam frequentemente uma mesaredonda dos chamados “especialistas”. Um deles diz que o mercado está a ponto de desabar e outro afirma que está em ascensão. Se você for esperto ouvirá os dois: mantenha sua mente aberta porque ambos têm razões válidas. Infelizmente, a maioria das pessoas ouve apenas os pessimistas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Alguns amigos próximos procuraram me fazer desistir de algum negócio ou investimento. Alguns anos atrás, um amigo me contou que estava empolgado porque descobrira um certificado de depósito que rendia 6% ao ano. Contei então que estava ganhando 16% com títulos do governo estadual. No dia seguinte ele me enviou um artigo que mostrava por que minha aplicação era perigosa. Há anos estou obtendo os 16% e ele continua com os 6%.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Diria que o mais difícil quanto à formação de uma fortuna é ser fiel a si mesmo e estar disposto a não acompanhar a multidão. No mercado é muito comum que seja a manada a chegar tarde a ser abatida. Se um grande negócio está nas manchetes, na maioria dos casos é tarde demais. Procure um negócio novo. Como dizem os surfistas: “Sempre há outra onda.” As pessoas que correm e pegam a onda tarde são em geral as que se dão mal.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Investidores espertos não se afobam. Se perdem uma onda, esperam pela próxima e se preparam. Isto é difícil para a maioria dos investidores porque comprar o que não é popular lhes parece apavorante. Os investidores tímidos gostam de acompanhar a multidão. Sua ganância os leva para as aplicações somente quando os investidores sábios já auferiram seus lucros e se retiraram. Investidores sábios aplicam quando o negócio ainda não é popular. Eles sabem que seus ganhos são gerados quando compram e não quando vendem. Esperam pacientemente. Como já disse, eles não se afobam. Como um surfista, eles se preparam para a próxima onda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Tudo é insider trading.[25] Há formas de insider trading que são ilegais e outras que são legais. Mas de qualquer forma é insider trading. A única distinção é quanto você está distante do “por dentro”? A razão pela qual você quer ter amigos ricos que estão por dentro é porque o dinheiro é ganho aí. É informação fabricada. Você quer saber quando haverá a próxima subida, entrar e sair antes da queda seguinte. Não estou dizendo para fazer nada ilegal, mas quanto mais cedo você souber, maiores são as chances de lucro com risco mínimo. Para isso existem os amigos. E isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4. DOMINE UMA FÓRMULA E ENTÃO APRENDA OUTRA. O poder do aprendizado rápido. Para fazer o pão, todo padeiro segue uma receita, mesmo que esta só exista em sua cabeça. O mesmo se pode dizer quanto a ganhar dinheiro. Por isso, na gíria, o dinheiro é muitas vezes chamado de “massa”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitos de nós já ouvimos a expressão “Você é o que você come”. Eu tenho uma variação “Você se torna o que você estuda”. Em outras palavras, seja cuidadoso com o que você estuda e aprende, porque sua mente é tão poderosa que você se torna aquilo que você põe em sua cabeça. Por exemplo, se você estuda culinária, você tende a ser cozinheiro. Se você não quer continuar sendo cozinheiro, precisará estudar outra coisa. Digamos, um professor. Depois de estudar para o magistério, você muitas vezes se torna professor. E assim por diante. Escolha cuidadosamente o que você estuda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando se trata de dinheiro, as massas têm uma fórmula básica aprendida na escola. E essa é: trabalhe pelo dinheiro. A fórmula que vejo predominar no mundo é que todos os dias milhões de pessoas acordam e vão trabalhar, ganham dinheiro, pagam contas, conferem seus talões de cheque, compram alguns fundos mútuos e voltam ao trabalho. Essa é a fórmula, ou receita, básica.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você está cansado do que está fazendo ou se não ganha o suficiente, é simplesmente o momento de mudar a fórmula com a qual você ganha dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando eu tinha 26 anos, fiz um curso de fim de semana chamado “Como Comprar Imóveis Executados Judicialmente”. Aprendi a fórmula. O passo seguinte foi ter a disciplina para pôr em ação o que eu tinha aprendido. É aí que a maioria das pessoas para. Durante três anos, enquanto eu trabalhava na Xerox, passava minhas horas de folga aprendendo a arte de comprar imóveis executados. Ganhei vários milhões de dólares usando essa fórmula, mas hoje isso é muito lento e há muita gente que faz o mesmo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então depois de ter dominado a fórmula, passei a procurar outras fórmulas. Em muitos dos casos não usei de forma direta a informação que obtive, mas sempre aprendi algo novo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Já fiz cursos destinados a corretores especializados em derivativos, um curso de negociação de opções de commodities e um curso sobre a Ciência do Caos. Neste, estava fora de meu ambiente, em uma sala cheia de gente com doutorado em física nuclear e ciência espacial. Contudo, aprendi uma porção de coisas que tornaram meus investimentos em imóveis e ações mais significativos e lucrativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas instituições comunitárias de ensino superior têm cursos de planejamento financeiro e aquisição de investimentos tradicionais. São lugares ótimos para se começar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sempre procuro a fórmula mais rápida. É por isso que, com bastante regularidade, faço mais em um dia do que muitas pessoas fazem em toda a sua vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Outra observação secundária. No mundo em rápida mudança de nossos dias, a questão não é tanto o que você sabe, porque com frequência o que você sabe já está ultrapassado. É a rapidez com que você aprende. Esta habilidade não tem preço. Não tem preço para encontrar fórmulas — receitas, se preferir — mais rápidas de fazer dinheiro. Trabalhar arduamente pelo dinheiro é uma fórmula velha nascida nos dias do homem das cavernas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '5. PAGUE A SI MESMO PRIMEIRO. O poder da autodisciplina. Se você não pode se controlar, não tente ficar rico. Talvez fosse bom entrar para a Marinha ou alguma ordem religiosa para aprender a se controlar. É a falta de autodisciplina que leva à falência muitos ganhadores de loteria pouco depois de eles terem ganhado milhões. É a falta de autodisciplina que leva pessoas que acabaram de obter um aumento a comprar um carro novo ou fazer um cruzeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É difícil dizer qual dos dez passos é o mais importante. Mas de todos, este é possivelmente o mais difícil de dominar se não for parte de sua personalidade. Eu arriscaria dizer que é a falta de autodisciplina que se constitui no fator número um a separar ricos, pobres e classe média.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Dito de forma simples, pessoas que têm baixa autoestima e reduzida tolerância à pressão financeira não poderão nunca, e quero dizer isso mesmo, nunca, ser ricas. Como já disse, uma lição aprendida com o pai rico foi que o “mundo vai bater em você”. O mundo bate nas pessoas não porque as outras pessoas sejam ruins mas porque os indivíduos não têm controle interno e disciplina. Quem não tem força interior muitas vezes se torna vítima daqueles que têm autodisciplina.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nos cursos para empreendedores onde leciono, lembro constantemente aos participantes que não devem focar seu produto, serviço ou atividade, mas o desenvolvimento de habilidades de gestão. As três habilidades de gestão mais importantes para se iniciar um negócio próprio são:' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Gestão do fluxo de caixa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Gestão de pessoal.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Gestão pessoal do tempo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Diria que essas habilidades de gestão se aplicam a qualquer coisa, não apenas a empreendedores. As três têm importância para a forma como você vive sua vida como indivíduo, ou como parte de uma família, um negócio, uma organização de caridade, uma cidade ou uma nação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Cada uma dessas habilidades é realçada pelo domínio da autodisciplina. Levo a sério o dito “pague-se a si próprio em primeiro lugar”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'The richest man in Babylon,[26] de George Classen, é onde encontrei a expressão “pague-se a si próprio em primeiro lugar”. O livro vendeu milhões de exemplares, mas embora milhões de pessoas repitam livremente essa afirmação poderosa, poucas seguem o conselho. Como disse, a alfabetização financeira nos permite ler os números e estes contam a história. Vendo a demonstração de renda e o balanço de uma pessoa, posso ver facilmente se a pessoa que diz “pague-se a si próprio em primeiro lugar” está praticando o que prega.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma imagem vale mil palavras. Comparemos então as demonstrações financeiras de pessoas que pagam a si mesmo em primeiro lugar e as que não as fazem.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'aside', texto: 'Pessoas que se pagam em primeiro lugar' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0161~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Estude os diagramas e observe se você pode notar algumas diferenças. Repito, tem a ver com o entendimento do fluxo de caixa, que conta a história. Se você pode realmente começar a compreender o poder do fluxo de caixa, perceberá rapidamente o que há de errado com o diagrama a seguir. Ou seja, por que 90% das pessoas trabalham arduamente durante toda a vida e precisam de apoio do governo, a Seguridade Social, quando não podem mais trabalhar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Está vendo? O diagrama anterior reflete as ações de uma pessoa que opta por pagar a si mesma em primeiro lugar. Todo mês ela destina dinheiro para sua coluna de ativos antes de pagar as despesas mensais. Embora milhões de pessoas tenham lido o livro de Classen e entendido a expressão “pague-se a si próprio em primeiro lugar”, na verdade elas o fazem em último lugar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora posso ouvir as reclamações daqueles que acreditam sinceramente em pagar as contas primeiro. E posso ouvir todas as pessoas “responsáveis” que pagam suas contas em dia. Não estou falando para ser irresponsável e deixar de pagar as contas. Digo apenas o que está no livro, e isso é: “pague a si mesmo em primeiro lugar”. O diagrama anterior é a imagem contábil correta dessa ação e não a que se segue.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Minha mulher e eu temos tido muitos guarda-livros, contadores e gerentes de banco que têm problemas com esta forma de considerar o “pague a si próprio em primeiro lugar”. A razão é que estes profissionais fazem de fato o Alguém que paga todos os demais primeiro — frequentemente não lhe sobra nada mesmo que as massas, que é se pagar em último lugar. Eles pagam a todos os demais primeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em certos meses, quando por qualquer razão o fluxo de caixa é bem menor do que minhas contas, eu pago a mim mesmo em primeiro lugar. Meu contador gritou em pânico: “Eles vão pegar o senhor. A receita vai colocar o senhor na cadeia. O senhor vai acabar com sua capacidade de tomar crédito. Vão cortar a eletricidade.” Ainda assim, pago a mim mesmo em primeiro lugar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Por quê?”, perguntará o leitor. Porque esse é todo o sentido da história de The richest man in Babylon. O poder da autodisciplina e o poder da força interior. “Garra”, num linguajar mais popular. E como pai rico me ensinou no primeiro mês em que trabalhei para ele, a maioria das pessoas permite que o mundo bata nelas. O cobrador liga e diz “paga ou então”. Aí você deixa de pagar a si próprio. Um vendedor diz “ponha no cartão”. Seu corretor imobiliário diz para você ir em frente porque “o governo permite dedução no imposto de renda da hipoteca de sua casa”. É disso tudo que o livro trata. Ter a garra para ir contra a maré e enriquecer. Você pode não ser fraco, mas quando se trata de dinheiro muitos balançam.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não estou falando para ser irresponsável. Não dou muito valor aos cartões de crédito e às facilidades de empréstimo porque quero pagar a mim primeiro. A razão pela qual minimizo minha renda é porque não quero entregá-la ao governo. É por isso, como sabem os que assistiram a meu vídeo, The secrets of the rich, que minha renda se origina em minha coluna de ativos por meio de uma sociedade anônima em Nevada. Se eu trabalhar pelo dinheiro, o governo o pega.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora pague minhas contas por último, tenho suficiente astúcia financeira para não me colocar em uma situação enrolada. Não gosto de dívidas de consumo. Na verdade tenho passivos que são mais altos do que os de 99% da população, mas não pago por eles, outros o fazem. Eles são chamados locatários. O principal, então, para se pagar a si próprio em primeiro lugar é começar por não se endividar. Apesar de pagar minhas contas por último, me organizo para ter apenas pequenas contas sem importância, que terei de pagar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando eventualmente estou num aperto, ainda assim pago primeiro a mim mesmo. Deixo que os credores e até o governo gritem. Gosto quando eles ficam zangados. Por quê? Porque eles me fazem um favor. Eles me inspiram a sair e criar mais dinheiro. Continuo pagando a mim mesmo primeiro, invisto o dinheiro e deixo os credores gritarem. Em geral acabo, de qualquer forma, pagando logo. Minha mulher e eu temos excelente crédito. Só que não cedemos à pressão e não gastamos nossa poupança ou liquidamos ações para pagar dívidas de consumo. Isso não é muito inteligente do ponto de vista financeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Portanto, a resposta é:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Não se endivide demais. Mantenha suas despesas reduzidas. Forme seus ativos primeiro. Então compre uma casa maior ou um carro grande. Ficar preso na Corrida dos Ratos não é inteligente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Quando apertado de dinheiro, não se afobe e não gaste suas poupanças ou investimentos. Use a pressão para inspirar seu gênio financeiro a descobrir novas formas de ganhar mais dinheiro e então pague as contas. Você terá aumentado sua habilidade de ganhar mais dinheiro bem como sua inteligência financeira.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Assim, muitas vezes tive problemas financeiros e usei meu cérebro para criar mais renda, enquanto defendia firmemente meus ativos. Meu contador gritava e procurava cobertura, mas eu parecia um bom soldado de cavalaria defendendo o forte, o Forte Ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pessoas pobres têm hábitos pobres. Um mau hábito comum é chamado inocentemente de “meter a mão na poupança”. Os ricos sabem que as poupanças só são usadas para criar mais dinheiro, não para pagar contas. Sei que isso parece cruel mas, como já disse, se não for internamente resistente, o mundo vai sempre bater em você.' },

      { tipo: 'br', texto: '' },
