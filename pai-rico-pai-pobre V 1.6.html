{ tipo: 'big', texto: 'Nossos olhos voltaram a se encontrar. Por dez segundos ficamos nos encarando e só depois que a mensagem foi recebida nossos olhos se afastaram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor estava “me empurrando”? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Algumas pessoas achariam isso — sorriu pai rico. — Eu diria que apenas lhe mostrei o gostinho da vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Que gostinho da vida? — respondi ainda zangado, mas agora curioso. Pronto, até, para aprender.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Vocês dois, garotos, foram as primeiras pessoas na vida que me pediram para lhes ensinar a ganhar dinheiro. Tenho mais de 150 empregados e nenhum deles me perguntou o que eu sei sobre dinheiro. Eles me pedem um emprego e um salário, mas nunca que lhes ensine sobre o dinheiro. De modo que a maioria deles passará os melhores anos de suas vidas trabalhando pelo dinheiro, sem entender realmente para que é que eles estão trabalhando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu estava ouvindo atentamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Assim, quando Mike falou que você queria aprender como ganhar dinheiro, resolvi planejar um curso que se aproximasse da vida real. Eu poderia falar horas, mas você não escutaria nada. Portanto resolvi deixar que a vida batesse um pouco em você para que pudesse me escutar. É por isso que só pago 10 centavos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E qual é a lição que aprendi trabalhando por 10 centavos a hora? —' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'perguntei. — Que você é mesquinho e explora seus empregados?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico se inclinou para trás e soltou uma gargalhada. Finalmente, quando parou de rir, falou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É melhor que você mude seu ponto de vista. Pare de culpar-me pensando que eu sou o problema. Se você pensa que eu sou o problema, então terá que me modificar. Se perceber que você é o problema, então poderá modificar a si mesmo, aprender alguma coisa e tornar-se mais sábio. A maioria das pessoas quer que todos no mundo mudem, menos elas próprias. Mas eu lhe digo: é mais fácil mudar a si próprio que a todos os demais.' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: '— Não entendo — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não me culpe por seus problemas — falou pai rico dando sinais de impaciência.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas o senhor só me paga 10 centavos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E então, o que você está aprendendo? — perguntou pai rico com um sorriso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Que o senhor é mesquinho — respondi com uma risadinha.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Está vendo, você acha que eu sou o problema — retrucou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas o senhor é.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, continue assim e você não aprenderá nada. Pense que sou o problema, então quais são suas escolhas?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, se o senhor não me pagar mais ou não me respeitar mais e me ensinar, eu largo tudo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Muito bem — disse pai rico. — E isso é exatamente o que faz a maioria das pessoas. Elas se demitem e começam a procurar outro emprego, uma oportunidade melhor e um salário mais alto, pensando que um novo emprego ou um salário mais alto resolverão o problema. Não é o que acontece na maioria dos casos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, o que resolve o problema? — perguntei. — Pegar esses miseráveis 10 centavos por hora e sorrir?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico sorriu:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isso é o que fazem as outras pessoas. Apenas aceitam o pagamento sabendo que eles e suas famílias lutarão com dificuldades financeiras. Mas é tudo o que fazem, esperando um aumento na ilusão de que mais dinheiro resolverá o problema. A maioria se conforma e alguns procuram um segundo emprego, trabalhando mais, mas continuam aceitando um contracheque ínfimo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fiquei olhando para o chão, começando a entender a lição que pai rico estava apresentando. Podia sentir que tinha um gosto de vida. Finalmente, olhei para cima e repeti a pergunta:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então, o que é que resolve o problema?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isto — disse ele dando-me um ligeiro tapinha na cabeça. — Essa coisa que está entre suas orelhas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Foi nesse momento que pai rico me mostrou o ponto de vista central que o separava de seus empregados e de meu pai pobre — e que mais tarde o levou a tornar-se um dos homens mais ricos do Havaí, enquanto meu pai, muito instruído mas pobre, lutou com problemas financeiros durante toda sua vida. Era um ponto de vista singular que faz toda a diferença durante uma vida inteira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico repetia de vez em quando esse ponto de vista que eu chamo a' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Lição 1.' },      
      { tipo: 'br', texto: '' },
      
      { tipo: 'b', texto: '“Os pobres e a classe média trabalham pelo dinheiro. Os ricos fazem o dinheiro trabalhar para eles.”' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Naquela bela manhã de sábado eu estava aprendendo um ponto de vista diferente daquele que meu pai pobre me ensinara. Aos 9 anos eu percebia que ambos os pais queriam que eu aprendesse. Ambos me incentivavam a estudar... mas não as mesmas coisas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai muito instruído recomendava que fizesse o que ele fizera: “Filho, quero que você estude muito, que tenha boas notas, para que você possa conseguir um bom emprego, seguro, em uma grande empresa, que lhe traga grandes benefícios.” Meu pai rico queria que eu aprendesse como funciona o dinheiro para que eu pudesse colocálo a trabalhar para mim. Essas lições eu aprenderia ao longo da vida, sob sua orientação e não na sala de aula.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai rico continuou a primeira lição:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Fico contente em ver que você se enfureceu por trabalhar por 10 centavos a hora. Se não tivesse se zangado e tivesse aceitado isso satisfeito, teria de lhe dizer que não poderia ensinar nada. Veja, aprender de verdade exige energia, paixão e um desejo ardente. A raiva é uma grande parte desta fórmula, pois a paixão é uma combinação de raiva e amor. No caso do dinheiro, a maioria das pessoas prefere não arriscar e se sentir seguras. Ou seja, não são conduzidas pela paixão, são conduzidas pelo medo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É por isso que elas aceitam um emprego com salário baixo? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — respondeu pai rico. — Algumas pessoas dizem que eu exploro os empregados porque não pago tanto quanto a usina de açúcar ou o governo. Eu digo que as pessoas se exploram a elas mesmas. O medo é delas, não meu.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas o senhor não acha que deveria pagar mais para elas? — indaguei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não tenho de fazê-lo. E, além disso, mais dinheiro não vai resolver o problema. Veja seu pai. Ele ganha bastante dinheiro e ainda assim não dá conta das despesas. A maioria das pessoas, se receber mais dinheiro, apenas passará a se endividar mais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Daí os 10 centavos por hora — eu disse rindo. — É parte da lição.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Certo — sorriu pai rico. — Você vê, seu pai estudou muito de modo que conseguiu um salário alto. Mas ele ainda tem problemas financeiros porque nunca aprendeu nada sobre dinheiro na escola. E, ainda por cima, ele acredita em trabalhar pelo dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o senhor não acredita? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não, de verdade não — disse pai rico. — Se você quiser aprender a trabalhar pelo dinheiro então fique na escola. É um bom lugar para aprender isso. Mas se você quer aprender como fazer o dinheiro trabalhar para você, então vou lhe ensinar como fazer. Mas só se você quiser aprender.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E todo mundo não quer aprender isso? — indaguei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não — respondeu pai rico. — Simplesmente porque é mais fácil aprender a trabalhar pelo dinheiro, em especial se o medo é a principal emoção quando se trata de discutir dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não estou entendendo — retruquei franzindo as sobrancelhas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não se preocupe com isso, por enquanto. Saiba apenas que é o medo que faz a maioria das pessoas trabalhar num emprego. O medo de não pagar as contas. O medo de ser mandado embora. O medo de não ter dinheiro suficiente. O medo de começar de novo. Esse é o preço de aprender uma profissão ou habilidade e então trabalhar pelo dinheiro. A maioria das pessoas se torna escrava do dinheiro... e fica zangada com o patrão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Aprender a pôr o dinheiro a trabalhar para a gente é um tipo de estudo totalmente diferente? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sem dúvida, sem dúvida — respondeu pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ficamos sentados em silêncio contemplando a bela manhã. Meus amigos deviam estar começando seu jogo de beisebol infantil. E, por alguma razão, agora eu estava feliz de ter decidido trabalhar por 10 centavos a hora. Sentia que estava a ponto de aprender alguma coisa que meus colegas não aprenderiam na escola.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Pronto para aprender? — perguntou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sem dúvida — respondi com um risinho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Estou cumprindo minha promessa. Estive ensinando a você de longe' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— falou pai rico. — Aos 9 anos você teve um gostinho do que é trabalhar pelo dinheiro. Multiplique seu mês passado por quinze anos e você terá uma ideia do que muitas pessoas passam a vida fazendo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não entendo — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Como você se sentiu esperando na fila para falar comigo? Uma vez para ser contratado e outra para pedir um aumento?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Péssimo — disse.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quando se opta por trabalhar pelo dinheiro, essa é a vida que levam muitas pessoas — disse pai rico. — E como se sentiu quando a senhora Martin pôs na sua mão 30 centavos por três horas de trabalho?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Achei que não era suficiente. Parecia que não valia nada. Fiquei desapontado — respondi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É assim que a maioria dos empregados se sente quando recebe seus contracheques. Especialmente com todos os descontos de impostos e outros itens. Pelo menos você recebeu 100%.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor está dizendo que a maioria dos empregados não recebe tudo?' },      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: '— perguntei espantado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Claro que não! — disse pai rico. — O governo sempre tira sua parte antes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como é que ele faz? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Impostos — disse pai rico. — Você paga impostos quando ganha. Você paga impostos quando gasta. Você paga impostos quando poupa. Você paga impostos quando morre.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Por que é que as pessoas deixam que o governo faça isso com elas?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Os ricos não deixam — disse pai rico com um sorriso. — Os pobres e a classe média deixam. Aposto que ganho mais que seu pai e contudo ele paga mais impostos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como pode ser? — perguntei. Aos 9 anos isso não fazia sentido para mim. — Por que alguém deixaria o governo fazer isso com ele?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico ficou sentado em silêncio. Acho que ele queria que eu ouvisse, em lugar de ficar falando besteira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Finalmente me acalmei. Não tinha gostado do que ouvira. Sabia que meu pai vivia reclamando dos impostos que pagava, mas na verdade não tomava nenhuma atitude quanto a isso. A vida estaria batendo nele?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico se balançava em sua cadeira tranquilamente enquanto olhava para mim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Pronto para aprender? — perguntou. Fiz que sim com a cabeça, lentamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Como já falei, há muito a aprender. E aprender como se faz o dinheiro trabalhar para a gente é estudo para uma vida inteira. A maioria das pessoas fica quatro anos numa faculdade e aí termina os estudos. Eu sei que meu estudo sobre o dinheiro vai continuar por toda a minha vida, simplesmente porque quanto mais sei, mais descubro que tenho de aprender ainda. As pessoas em geral nunca estudam o assunto. Trabalha-se, recebe-se o salário, conferem-se os canhotos do talão de cheques e isso é tudo. E ainda se espantam porque têm problemas de dinheiro. Então pensam que mais dinheiro vai resolver a situação. Poucos percebem que lhes falta instrução financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então papai tem dificuldade com os impostos porque ele não entende de dinheiro? — perguntei confuso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Olha — disse pai rico. — Os impostos são apenas uma pequena parte do aprendizado para fazer o dinheiro trabalhar para você. Hoje, eu só queria descobrir se você ainda tem a paixão de aprender sobre dinheiro. A maioria das pessoas não tem. Elas querem ir para a escola, aprender uma profissão, divertir-se no trabalho e ganhar rios de dinheiro. Um dia acordam com sérios problemas financeiros e então não podem parar de trabalhar. Esse é o preço de só saber como trabalhar pelo dinheiro em lugar de estudar para saber como pôr o dinheiro a trabalhar para você. E então, você continua apaixonado por aprender? — perguntou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Acenei afirmativamente com a cabeça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom — disse pai rico. — Agora de volta ao trabalho. Desta vez não vou lhe pagar nada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O quê? — perguntei espantado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você ouviu. Nada. Trabalhará as mesmas três horas no sábado, mas desta vez não receberá os 10 centavos por hora. Você disse que queria aprender a não trabalhar pelo dinheiro, sendo assim não vou pagar nada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu não podia acreditar no que estava ouvindo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Já conversei sobre isso com Mike. Ele já está trabalhando, tirando a poeira e arrumando as latas para mim. Melhor você se apressar e correr para lá.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não é justo — gritei. — O senhor tem de pagar alguma coisa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Você disse que queria aprender. Se não aprender isso agora, será como aquelas duas mulheres e o homem que estavam sentados na minha sala: trabalham pelo dinheiro e esperam que eu não os mande embora. Ou como seu pai, ganhando rios de dinheiro apenas para ficar endividado até o pescoço e esperando que mais dinheiro resolva o problema. Se for isso o que você quer, então volte para aqueles 10 centavos a hora. Ou você pode ainda fazer aquilo que muitas pessoas acabam fazendo: reclamar que o salário não é suficiente, demitir-se e procurar outro emprego.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Que é que eu faço? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico deu um tapinha em minha cabeça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Use isto — falou. — Se você usar bem, logo estará me agradecendo por ter lhe dado uma oportunidade de se tornar um homem rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fiquei parado, sem acreditar que eu estivesse embarcando nessa canoa. Queria conseguir um aumento e acabei sendo convencido a trabalhar de graça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico voltou a dar um tapinha na minha cabeça e disse:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Use isto. Agora fora daqui, de volta ao trabalho.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'LIÇÃO 1: Os ricos não trabalham pelo dinheiro' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não contei para meu pai pobre que não estava mais sendo pago. Ele não teria entendido e eu não queria tentar explicar algo que eu próprio ainda não estava entendendo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Durante três semanas, Mike e eu trabalhamos três horas, todo sábado, sem ganhar nada. O trabalho não me preocupava, e a rotina se tornou mais fácil. O que me deixava danado era perder os jogos de beisebol e não poder comprar os gibis.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na terceira semana, por volta do meio-dia, apareceu pai rico. Ouvimos seu caminhão chegar ao estacionamento e fazer um barulhão quando o motor foi desligado. Ele entrou na loja e cumprimentou a senhora Martin com um abraço. Depois de verificar como a loja estava indo, ele abriu o freezer dos sorvetes, pegou dois picolés, pagou e chamou a mim e a Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Vamos dar uma voltinha, moçada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atravessamos a rua e fomos para um amplo gramado onde alguns adultos estavam jogando beisebol. Sentando em uma mesa de piquenique afastada, ele deu os picolés para mim e para o Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Como as coisas estão indo, garotos?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK — respondeu Mike. Concordei com ele.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Aprenderam alguma coisa? — perguntou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu olhamos um para o outro, levantamos os ombros e balançamos a cabeça em uníssono.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Evitando uma das maiores armadilhas da vida' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bom, garotos, precisam começar a pensar. Vocês estão observando uma das maiores lições de vida. Se aprenderem a lição, terão uma vida de grande liberdade e segurança. Se não aprenderem, acabarão como a senhora Martin e a maioria das pessoas que jogam beisebol aqui no parque. Elas trabalham muito, por um salário baixo, agarrando-se à ilusão da segurança no emprego, esperando pelas três semanas de férias anuais e pela reduzida aposentadoria depois de 45 anos de trabalho. Se isso os empolga, vou dar-lhes um aumento para 25 centavos a hora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas estas pessoas são boas e trabalhadoras. Por que o senhor está debochando delas? — indaguei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico abriu um sorriso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A senhora Martin é como uma mãe para mim. Nunca seria tão cruel. Pode parecer que estou sendo desalmado porque estou tentando chamar a atenção de vocês dois para um fato que a maioria das pessoas não consegue ter a felicidade de enxergar. Graças a uma visão muito estreita, as pessoas não percebem em que armadilha caíram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu ficamos sentados sem captar totalmente a mensagem. Ele parecia cruel, contudo sentímos que ele desejava desesperadamente que percebêssemos algo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sorrindo, pai rico continuou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não estão gostando desses 25 centavos a hora? O coração de vocês não bate um pouquinho mais rápido?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fiz um “não” com a cabeça, mas na realidade meu coração batia mais rápido. Para mim 25 centavos a hora representava uma fortuna.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK, vou pagar 1 dólar a hora — prosseguiu pai rico, com um sorriso malicioso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora meu coração acelerou de verdade. Meu cérebro gritava “Topa. Topa”. Eu não podia acreditar no que estava ouvindo. Ainda assim, fiquei calado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK, 2 dólares a hora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pequeno cérebro e meu pequeno coração de 9 anos quase explodiram. Afinal, estávamos em 1956 e receber 2 dólares a hora teria me tornado o garoto mais rico do mundo. Não me podia imaginar ganhando esse dinheiro todo. Eu queria dizer “sim”. Eu queria fechar o negócio. E podia ver a bicicleta nova, a luva de beisebol nova e a adoração de meus colegas quando eu mostrasse algum dinheiro. E, ainda por cima, Jimmy e seus amigos ricos nunca poderiam voltar a me chamar de pobre. Mas consegui me manter em silêncio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quem sabe tivesse torrado os miolos e queimado um fusível. Mas no fundo do coração eu queria loucamente esses 2 dólares a hora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O sorvete estava se derretendo e escorregando pela minha mão. As formigas se deliciavam com a pasta melada de baunilha e chocolate. Pai rico olhava para dois garotos que o olhavam de volta embasbacados. Ele sabia que estava nos testando e ele sabia que parte de nossas emoções queria topar a parada. Sabia que todo ser humano tem uma parte fraca e necessitada de suas almas que pode ser comprada. E sabia que todo ser humano também tinha uma parte da alma que era forte e que jamais se deixaria comprar. A questão era saber qual prevaleceria. Ele tinha testado milhares de almas ao longo de sua vida. Ele testava almas toda vez que entrevistava um candidato a emprego.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— OK, 5 dólares a hora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De repente fez-se um silêncio dentro de mim. Alguma coisa tinha mudado. A oferta era grande demais e se tornara ridícula. Nem muitos adultos ganhavam 5 dólares por hora em 1956. A tentação se esvaiu e a calma se instalou. Lentamente me virei para a esquerda para olhar Mike. Ele devolveu meu olhar. A parte de minha alma que era fraca e necessitada estava silenciada. A parte que não se vendia estava à frente. Então uma calma e uma certeza sobre o dinheiro invadiram meu cérebro e minha alma. Sabia que Mike também chegara a esse ponto.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Muito bem — disse pai rico suavemente. — A maioria das pessoas tem um preço. E tem um preço por causa de duas emoções humanas, o medo e a ambição. Primeiro, o medo de não ter dinheiro as leva a trabalhar arduamente e, quando recebem o contracheque, a ambição ou o desejo as leva a pensar nas coisas maravilhosas que podem ser compradas. Então se define o padrão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Que padrão? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Acordar, ir para o trabalho, pagar contas, acordar, ir para o trabalho, pagar contas... Suas vidas então são conduzidas sempre por duas emoções: medo e ambição. Ofereça-lhes mais dinheiro e elas continuarão o ciclo, aumentando também as despesas. É isso que chamo de “Corrida dos Ratos”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E há outro jeito? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — disse pai rico. — Mas poucas pessoas o descobrem.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E qual é esse jeito? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É o que espero que vocês descubram enquanto trabalham e estudam comigo. É por isso que acabei com todas as formas de pagamento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Alguma dica? — perguntou Mike. — Estamos um pouco cansados de trabalhar muito, especialmente sem receber.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Bem, o primeiro passo é falar a verdade — disse pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Nós não mentimos — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não disse que estavam mentindo. Disse para falar a verdade — retrucou pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A verdade sobre o quê? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sobre como estão se sentindo — respondeu pai rico. — Vocês não precisam falar para mais ninguém. Só para vocês mesmos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor está dizendo que as pessoas que estão no parque, as pessoas que trabalham para o senhor, a senhora Martin não fazem isso? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Duvido — disse pai rico. — Elas têm medo de ficar sem dinheiro. Em lugar de enfrentar o medo, elas reagem em vez de pensar. Elas reagem emocionalmente em lugar de usar suas cabeças — disse pai rico batendo nas nossas cabeças. — Então, elas se veem com alguns dólares na mão e novamente as emoções da alegria e do desejo e da ambição se apossam delas e novamente reagem em vez de pensar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— São suas emoções que pensam por elas — falou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Certo — falou pai rico. — Em vez de falar a verdade sobre como se sentem, elas reagem a seus sentimentos, e não pensam. Elas sentem o medo, vão para o trabalho esperando que o trabalho acalme esse medo, mas não é isso que acontece. Esse medo antigo as assombra, e elas voltam ao trabalho esperando novamente que o dinheiro acalme seu medo e, novamente, nada. O medo as leva a essa armadilha de trabalhar, ganhar dinheiro, trabalhar, ganhar dinheiro, esperando que o medo vá embora. Mas a cada dia elas acordam, e o velho medo acorda com elas. Para milhões de pessoas, esse velho medo as mantém acordadas de noite, perturbando-as com ansiedade e preocupação. De modo que se levantam e vão para o trabalho esperando que o contracheque mate esse medo que lhes rói a alma. O dinheiro conduz suas vidas e elas se recusam a aceitar essa verdade. O dinheiro controla suas emoções e, consequentemente, suas almas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico ficou sentado, quieto, deixando que assimilássemos suas palavras. Mike e eu havíamos escutado o que ele disse, mas na verdade não entendemos o que ele falou. Eu só sabia que muitas vezes ficava pensando em por que os adultos corriam para o trabalho. Não parecia ser algo muito divertido e eles não aparentavam estar muito felizes, mas alguma coisa os impelia a correr para o trabalho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Percebendo que tínhamos absorvido o que era possível de suas palavras, pai rico falou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E quero que vocês, garotos, evitem essa armadilha. É isso que quero ensinar a vocês. Não apenas a ser rico, porque ser rico não resolve o problema.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não resolve? — perguntei surpreso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não, não resolve. Deixem-me falar desta outra emoção, que é o desejo. Alguns a chamam de ganância mas eu prefiro desejo. É perfeitamente normal querer coisas melhores, mais bonitas, mais divertidas ou empolgantes. Portanto, as pessoas também trabalham por dinheiro por causa do desejo. Elas desejam o dinheiro pela alegria que, acreditam, o dinheiro pode comprar. Mas a alegria que o dinheiro traz muitas vezes tem curta duração e é preciso mais dinheiro para adquirir mais alegria, mais satisfação, mais conforto, mais segurança. Assim, continua-se trabalhando, pensando que o dinheiro um dia acalmará suas almas perturbadas pelo medo e pelo desejo. Mas o dinheiro não pode fazer isso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mesmo para as pessoas ricas? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Incluindo os ricos — respondeu pai rico. — De fato, a razão pela qual muitas pessoas são ricas não é o desejo, mas o medo. Elas pensam que o dinheiro pode acabar com seu medo de ficar sem dinheiro, de serem pobres, de modo que acumulam fortunas para descobrir que o medo fica pior. Agora elas receiam perdê-lo. Tenho amigos que continuam trabalhando mesmo quando já têm muito. Sei de pessoas que têm milhões e estão mais apavoradas do que quando eram pobres. Estão aterrorizadas com a possibilidade de perder todo o seu dinheiro. Os medos que as levaram a se tornarem ricas ficam maiores. Essa parte fraca e necessitada de suas almas na verdade grita ainda mais forte. Não querem perder suas mansões, seus carros, a vida de luxo que o dinheiro pode comprar. Preocupam-se com o que seus amigos dirão se perderem todo o seu dinheiro. Muitos estão emocionalmente desesperados e neuróticos embora pareçam ricos e tenham grandes fortunas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então a pessoa pobre é mais feliz? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não, não acho — replicou pai rico. — Evitar o dinheiro é tão neurótico quanto ser apegado ao dinheiro.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Como se isso tivesse sido uma deixa, o mendigo da cidade passou perto de nossa mesa, parou junto ao cesto de lixo e começou a vasculhar. Nós três observamos com grande interesse, talvez antes o tivéssemos ignorado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico tirou da carteira uma nota de 1 dólar e fez um gesto para o velho. Este ao ver o dinheiro se aproximou imediatamente, pegou a nota, agradeceu profusamente e saiu encantado com sua boa sorte.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ele não é muito diferente da maioria dos meus empregados — disse pai rico. — Já encontrei tanta gente que fala, “Ah, não estou interessado no dinheiro”. Contudo, eles trabalham oito horas por dia nos seus empregos. Isso é uma negação da verdade. Se não estão interessados no dinheiro, então por que é que trabalham? Esse tipo de pensamento é possivelmente mais neurótico do que o de uma pessoa que junta dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Enquanto eu estava ali sentado, ouvindo meu pai rico, minha mente recordava as inúmeras vezes em que meu próprio pai dizia: “Não estou interessado no dinheiro.” Ele falava isso frequentemente. Também se justificava dizendo sempre: “Trabalho porque gosto do que faço.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Então o que temos de fazer? — perguntei. — Não trabalhar pelo dinheiro até perder todos os resquícios de medo e ganância? — Não, isso seria uma perda de tempo — falou pai rico. — As emoções são o que nos torna humanos. Elas nos tornam reais. A palavra “emoção” representa energia em movimento. Seja sincero a respeito de suas emoções e use sua mente e suas emoções a seu favor, não contra você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Nossa! — exclamou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não se preocupe com o que acabei de falar. Daqui a alguns anos você entenderá melhor. Observe suas emoções, não reaja a elas. A maioria das pessoas não percebe que está pensando com suas emoções. Suas emoções são suas emoções, mas você precisa aprender a pensar por si próprio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor poderia dar um exemplo? — pedi.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Lógico — retrucou pai rico. — Quando uma pessoa fala “Preciso procurar um emprego”, o mais provável é que esteja pensando com uma emoção. O medo de não ter dinheiro é que gera esse pensamento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas as pessoas precisam de dinheiro se têm contas a pagar — falei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sem dúvida — disse pai rico sorrindo. — Tudo o que estou dizendo é que na maioria das vezes são as emoções que comandam o pensamento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não estou entendendo — disse Mike. — Por exemplo — continuou pai rico —, se existe o medo de não ter dinheiro suficiente, em vez de sair correndo para procurar um emprego a fim de ganhar algum, as pessoas poderiam se perguntar: “Um emprego seria, no longo prazo, a melhor solução para este medo?” Na minha opinião a resposta é “Não”. Especialmente se levarmos em conta a duração da vida da pessoa. Um emprego é na verdade uma solução de curto prazo para um problema de longo prazo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas meu pai sempre fala, “vá para a escola, tire notas boas para que possa conseguir um emprego bom e seguro” — disse eu, um pouco confuso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, entendo o que ele diz — afirmou pai rico sorrindo. — A maioria das pessoas aconselha isso e costuma considerar uma boa ideia. Mas, em geral, é o medo que leva as pessoas a dar esse conselho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor quer dizer que meu pai fala isso porque tem medo?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — respondeu pai rico. — Seu pai está apavorado com a possibilidade de você não ser capaz de ganhar dinheiro e enquadrar-se na sociedade. Não me entenda mal. Ele o ama e quer o melhor para seu filho. E eu acho que seu receio se justifica. Instrução e emprego são coisas importantes. Mas elas não resolvem a questão do medo. Veja, é esse mesmo medo que o faz levantar todas as manhãs para ganhar alguns dólares e o que o leva a preocupar-se tanto com que você vá para a escola.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o senhor, aconselha o quê? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quero ensinar a vocês o domínio sobre o poder do dinheiro. A não ter medo dele. E isso não é ensinado na escola. Se não aprenderem isso, se tornarão escravos do dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Começava, finalmente, a fazer sentido. Ele queria abrir nossos horizontes. Mostrar-nos o que a senhora Martin não via, o que seus empregados não viam, ou, por falar nisso, o que meu pai não via. Naquele dia minha visão se ampliou e comecei a vislumbrar a armadilha que aguardava tanta gente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Vejam, em última análise, somos todos empregados. Só que trabalhamos em níveis diferentes — disse pai rico. — Eu só quero que vocês tenham a chance de escapar da armadilha. A armadilha criada por essas duas emoções, o medo e o desejo. Usem-nas a seu favor, não contra. Isso é o que quero ensinar a vocês. Não estou interessado em ensinar apenas a ganhar rios de dinheiro. Isso não vai cuidar do medo e do desejo. Se, primeiramente, vocês não cuidarem do medo e do desejo, e ficarem ricos, vocês serão apenas escravos bem pagos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como escapar da armadilha? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A causa principal da pobreza ou das dificuldades financeiras está no medo e na ignorância, não na economia, ou no governo ou nos ricos. É o medo que instalamos em nós mesmos e a ignorância que mantêm as pessoas presas na armadilha. Então vocês, garotos, vão para a escola e se formem. Eu lhes ensinarei como não cair na armadilha.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As peças do quebra-cabeça começavam a se encaixar. Meu pai instruído tinha ótima formação e uma ótima carreira. Mas a escola nunca lhe tinha dito como lidar com o dinheiro ou com seus medos. Tornava-se claro que eu poderia aprender coisas diferentes e importantes com dois pais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor está falando do medo de não ter dinheiro. Como o desejo por dinheiro afeta nosso pensamento? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Como você se sentiu quando eu o tentei com um aumento no pagamento? Você notou que seu desejo crescia?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Balançamos a cabeça afirmativamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ao não ceder a suas emoções, vocês foram capazes de adiar suas reações e pensar. Isso é o mais importante. Sempre sentiremos emoções de medo e ambição. Daqui para frente, o mais importante será que vocês usem essas emoções a seu favor e a longo prazo e não apenas deixem que elas os conduzam e controlem seus pensamentos. A maioria das pessoas usa o medo e a ambição contra si mesmas. Isso é o começo da ignorância. Grande parte das pessoas passa a vida atrás de contracheques, aumentos salariais e segurança no emprego por causa dessas emoções de desejo e medo, sem se questionar realmente para onde esses pensamentos conduzidos pela emoção as estão levando. É como a história do burro que movimenta o carro enquanto seu dono fica balançando uma cenoura à frente de seu nariz. O dono do burro pode estar indo aonde deseja ir, mas o burro está correndo atrás de uma ilusão. Amanhã só haverá outra cenoura para o burro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor quer dizer que no momento em que eu imaginei a nova luva de beisebol, os doces e os brinquedos, isso era como a cenoura para o burro?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isso mesmo! E quando você crescer os brinquedos serão mais caros. Um carro novo, uma lancha e uma casa grande para impressionar seus amigos — disse pai rico com um sorriso. — O medo empurra para fora da porta e o desejo o atrai, fazendo com que vocês vão de encontro ao rochedo. Esta é a armadilha.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E qual é a resposta? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que aumenta o medo e o desejo é a ignorância. É por isso que pessoas ricas com muito dinheiro muitas vezes têm mais medo à medida que ficam mais ricas. O dinheiro é a cenoura, a ilusão. Se o burro pudesse entender todo o contexto, ele poderia pensar duas vezes antes de sair correndo atrás da cenoura.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico passou a explicar que a vida humana é uma luta entre a ignorância e o esclarecimento. Explicou que ao deixarmos de buscar informação e conhecimento sobre nós mesmos, instala-se a ignorância. A luta é uma decisão feita momento a momento — de aprender a abrir ou fechar a própria mente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Veja, a escola é muito, muito importante. Vocês vão à escola para aprender uma habilidade ou uma profissão e poder se tornar um membro útil da sociedade. Cada cultura necessita de professores, médicos, artistas, cozinheiros, homens de negócios, policiais, bombeiros, soldados. A escola os treina de modo que nossa cultura possa florescer — disse pai rico. — Infelizmente para muita gente a escola é o fim e não o início.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fez-se um longo silêncio. Pai rico sorria. Não entendi tudo o que ele disse naquele dia. Mas como ocorre com a maioria dos grandes mestres, cujas palavras continuam repercutindo por muitos anos, muitas vezes até depois que se foram, suas palavras estão comigo até hoje.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Hoje me mostrei um pouco cruel — disse pai rico. — Cruel por um motivo. Queria que vocês sempre se lembrassem desta conversa. Quero que pensem sempre na senhora Martin. Quero que pensem sempre no burro. Não esqueçam nunca, porque as duas emoções, medo e desejo, podem levá-los à maior armadilha da vida, se não tiverem consciência de que elas estão controlando seu pensamento. Passar a vida com medo, não explorando jamais seus sonhos, é cruel. Trabalhar arduamente por dinheiro, pensando que este comprará aquilo que lhes trará felicidade é também cruel. Acordar no meio da noite apavorado com as contas a pagar é uma forma de vida horrível. Viver uma vida determinada pelo montante de seu contracheque não é realmente viver. Pensar que um emprego os fará sentir-se seguros é mentir para vocês mesmos. É cruel e é a armadilha que quero que evitem, se possível. Vi como o dinheiro conduz a vida das pessoas. Não deixem que isso aconteça com vocês. Por favor, não deixem o dinheiro dominar suas vidas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma bola de beisebol rolou para nossa mesa. Pai rico a pegou e a lançou de volta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que a ignorância tem a ver com a ambição e o medo? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É a ignorância sobre o dinheiro que causa tanta ambição e tanto medo' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— disse pai rico. — Vou dar alguns exemplos. Um médico, querendo mais dinheiro para sustentar melhor sua família, aumenta o preço de suas consultas. Isso prejudica principalmente os mais pobres, de modo que estes têm saúde pior do que aqueles que têm dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E continuou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Como os médicos aumentam suas consultas, os advogados também aumentam sua remuneração. Como a remuneração dos advogados aumentou, os professores querem um aumento, o que provoca um aumento dos impostos e assim por diante. Logo, logo, a disparidade entre ricos e pobres será tão grande que surgirá o caos e outra civilização entrará em colapso. As grandes civilizações entraram em colapso porque a distância entre os que têm e os que não têm era grande demais. Os Estados Unidos estão seguindo o mesmo caminho, provando mais uma vez que a história se repete, porque não aprendemos com ela. Só decoramos mecanicamente datas e nomes e não a lição.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E os preços não aumentam? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não numa sociedade instruída, com um bom governo. Os preços na verdade deveriam cair. Naturalmente, isso às vezes só é verdadeiro na teoria. Os preços sobem devido ao medo e à ambição gerados pela ignorância. Se as escolas ensinassem às pessoas sobre o dinheiro, haveria mais dinheiro e preços mais baixos, mas as escolas estão preocupadas em ensinar as pessoas a trabalhar pelo dinheiro e não a controlar o poder do dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Mas não existem faculdades de administração? — perguntou' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike. — O senhor não está incentivando que eu vá fazer meu mestrado em uma faculdade de administração? — Sim — falou pai rico. — Mas na maioria das vezes as faculdades de administração treinam empregados que são profissionais sofisticados. Que os céus não permitam que um contador domine uma empresa! Tudo o que eles fazem é olhar para os números, demitir gente e aniquilar o negócio. Sei disso porque contrato contadores. Tudo o que eles pensam é cortar custos e aumentar preços, o que causa mais problemas. A contabilidade é importante. Gostaria que mais gente a conhecesse, mas, ao mesmo tempo, ela não mostra tudo — acrescentou pai rico furioso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Há uma solução? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — disse pai rico. — Aprenda a usar suas emoções para pensar e não pensar com suas emoções. Quando vocês, garotos, dominaram suas emoções, concordando em trabalhar de graça para mim, eu sabia que havia esperança. Quando novamente vocês resistiram a suas emoções quando os tentei com mais dinheiro, vocês estavam novamente aprendendo a pensar em vez de se renderem às emoções. Este é o primeiro passo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Por que esse primeiro passo é tão importante? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isso vocês terão de descobrir. Quero que vocês aprendam. Vou levá-los pelo caminho dos espinhos. É um lugar que quase todos evitam. Vou levá-los a esse lugar aonde a maioria das pessoas tem medo de ir. Se forem comigo, abandonarão a ideia de trabalhar por dinheiro e aprenderão a fazer o dinheiro trabalhar para vocês.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E o que receberemos se formos com o senhor? O que acontecerá se concordamos em aprender com o senhor? O que obteremos? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O mesmo que Irmão Coelho obteve — disse pai rico. — Libertação da' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Boneca de Piche.[9]' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Há um caminho de espinhos? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — assentiu pai rico. — O caminho de espinhos é nosso medo e nossa ambição. A saída está em pôr de lado o medo e confrontar nossa ambição, nossas fraquezas, nossa carência. E a saída também está na mente, na escolha de nossos pensamentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Escolher nossos pensamentos? — perguntou Mike intrigado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim. Escolher o que pensamos em lugar de reagir a nossas emoções, em lugar de levantar da cama e ir para o trabalho para resolver os problemas, porque estamos assombrados pelo medo de não ter dinheiro para pagar nossas contas. O pensamento o levaria a dedicar tempo a colocar-se a si mesmo a pergunta: “Trabalhar com mais afinco seria a melhor solução para este problema?” A maioria das pessoas está tão apavorada por não encarar a verdade' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— o medo está controlando-as — que não pode pensar e assim corre para sair de casa. A Boneca de Piche está no controle. Isto é o que quero dizer quando falo em escolher os pensamentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— E como fazemos isso? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Isso é o que vou ensinar a vocês. Vou lhes ensinar como escolher seus pensamentos, em lugar de reagir apavorados, tomando o café da manhã afobadamente e disparando porta afora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Lembrem-se do que disse antes: um emprego é apenas uma solução de curto prazo para um problema de longo prazo. A maioria das pessoas só tem um problema em mente e é de curto prazo. São as contas do fim do mês, a Boneca de Piche. O dinheiro passa a conduzir suas vidas. Ou melhor dizendo, o medo e a ignorância em relação ao dinheiro. Da mesma forma que faziam seus pais, elas acordam toda manhã e vão trabalhar por dinheiro. Não têm tempo de se perguntar se há outra maneira. Suas emoções estão no controle do seu pensamento, não a razão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor pode distinguir o pensar com as emoções do pensar com a cabeça? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim, eu ouço isso o tempo todo — respondeu pai rico. — Ouço coisas como “Bem, todo mundo tem de trabalhar”. Ou “Os ricos são desonestos”. Ou “Vou procurar outro emprego. Mereço esse aumento. Eles não vão me passar para trás”. Ou “Gosto deste emprego porque ele é seguro”. Em lugar de perguntas como “O que é que eu estou perdendo aqui?”, o que interromperia o pensamento emocional e daria tempo de pensar com clareza.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Devo admitir que estava recebendo uma grande lição: saber quando alguém estava falando a partir de suas emoções ou de um pensamento claro. Era uma lição que me prestou bons serviços a vida toda. Especialmente quando era eu que estava falando a partir de uma reação e não de um pensamento claro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Enquanto caminhávamos de volta à loja, pai rico explicou que os ricos realmente “faziam dinheiro”. Eles não trabalhavam por ele. Ele continuou explicando que quando Mike e eu estávamos cunhando pratinhas de 5 centavos com o chumbo, pensando que estávamos fazendo dinheiro, nós estávamos pensando quase como os ricos. O problema é que nós estávamos praticando um ato ilegal. Era legal quando o governo e os bancos faziam isso, mas não quando nós o fazíamos. Ele explicou que havia formas legais de fazer dinheiro e formas ilegais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico continuou explicando que os ricos sabiam que o dinheiro era uma ilusão, como a cenoura para o burro. É em virtude do medo e da ambição que milhões de pessoas aceitam a ilusão de que o dinheiro é real. O dinheiro é uma ficção. Somente a ilusão de confiança e a ignorância das massas permitem que o castelo de cartas fique em pé. “De fato”, disse ele, “de várias maneiras a cenoura do burro é mais valiosa do que o dinheiro”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele falou do padrão-ouro que vigorava nos Estados Unidos e que na verdade cada nota de dólar era um certificado de prata. O que o preocupava é que algum dia o país pudesse abandonar o padrão-ouro e os dólares deixassem de ser certificado de prata.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que aconteceria, garotos, seria uma grande confusão. Os pobres, a classe média e os ignorantes teriam suas vidas arruinadas simplesmente porque continuariam acreditando que o dinheiro é real e que a empresa para a qual trabalham, ou o governo, cuidaria deles.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Naquele dia não entendemos do que ele estava falando, mas com o correr dos anos isso passou a fazer cada vez mais sentido.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Vendo o que os outros não veem' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao entrar em sua caminhonete, no estacionamento da pequena loja de conveniência, ele disse:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Continuem trabalhando, garotos, mas quanto mais cedo vocês se esquecerem de que precisam de um contracheque, mais fácil se tornará sua vida adulta. Continuem usando seu cérebro, trabalhem de graça e logo sua mente lhes mostrará formas de ganhar muito mais dinheiro do que eu poderia lhes pagar. Vocês verão o que outras pessoas nunca percebem. Oportunidades que estão à frente de seu nariz. A maioria jamais enxerga essas oportunidades porque estão atrás de dinheiro e segurança, e é isso que elas recebem. No momento em que vislumbrarem uma oportunidade, vocês a reconhecerão pelo resto de suas vidas. Quando conseguirem isso, vou lhes ensinar outra coisa. Aprendam essa lição e evitarão uma das maiores armadilhas da vida. Vocês não tocarão, nunca, jamais, nessa Boneca de Piche.[10]' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu pegamos nossas coisas na loja e nos despedimos da senhora Martin. Voltamos ao parque, ao mesmo banco da área de piquenique, e passamos várias horas pensando e conversando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Passamos a semana seguinte na escola, pensando e conversando. Durante outras duas semanas, pensamos, conversamos e trabalhamos de graça.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No fim do segundo sábado, estava eu, outra vez, me despedindo da senhora Martin e atirando um olhar sonhador para a estante das revistas em quadrinhos. O duro de não ganhar nem mesmo 30 centavos aos sábados era que eu não tinha dinheiro para comprar gibis. De repente, enquanto a senhora Martin se despedia de Mike e de mim, vi que ela estava fazendo algo que eu nunca a vira fazer antes. Ou melhor, vira, mas nunca prestara atenção.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A senhora Martin estava arrancando a metade superior da capa do gibi. Ela guardava essa metade e jogava, numa caixa de papelão, o resto da revistinha. Quando perguntei o que estava fazendo com as revistinhas, ela falou: “Estou jogando fora. Devolvo a parte de cima da capa para o distribuidor das revistas que me dá um crédito quando traz os novos gibis. Ele vai chegar daqui a uma hora.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu esperamos uma hora. Quando ele chegou perguntei se podíamos ficar com os gibis velhos. Ele respondeu: “Vocês podem ficar se vocês trabalharem nesta loja e não os revenderem.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nossa parceria ressuscitou. A mãe de Mike tinha um quarto vazio no porão da casa. Nós o limpamos e começamos a empilhar ali centenas de gibis. Em pouco tempo, nossa biblioteca de gibis estava aberta ao público. Contratamos a irmã caçula de Mike, que adorava estudar, para ser bibliotecária. Ela cobrava de cada criança um ingresso de 10 centavos e a biblioteca permanecia aberta, depois das aulas, das 14:30 às 16:30, todos os dias. Os frequentadores, as crianças da vizinhança, podiam ler quantos gibis conseguissem nessas duas horas. Era uma pechincha pois cada gibi custava 10 centavos e podiam-se ler cinco ou seis nessas duas horas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A irmã de Mike controlava a saída da garotada para assegurar-se de que ninguém estivesse levando uma revista emprestada. Ela também controlava os livros, registrava quantas crianças compareciam diariamente, quem eram elas e os comentários que faziam. Recebia um dólar por semana e deixávamos que lesse de graça quantos gibis desejasse, o que ela fazia raramente porque estava sempre estudando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu mantivemos o acordo de trabalhar todo sábado na loja e arrecadávamos os gibis descartados. Mantivemos nosso acordo com o distribuidor pois não revendíamos nenhum gibi. Quando eles ficavam muito rasgados, os queimávamos. Tentamos abrir uma filial, mas nunca encontramos alguém tão dedicado e confiável quanto a irmã do Mike para cuidar dela.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nessa idade precoce descobrimos como era difícil conseguir bons funcionários.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Três meses depois da inauguração da biblioteca, houve uma briga na sala. Alguns garotos de outro bairro a invadiram e começaram a confusão. O pai de Mike sugeriu que fechássemos o negócio. Nossa biblioteca deixou de existir e paramos de trabalhar aos sábados na loja de conveniência. De qualquer forma, pai rico estava entusiasmado e queria nos ensinar mais. Ele estava feliz porque tivemos muito êxito na primeira lição. Aprendemos a fazer o dinheiro trabalhar para nós. Como não tínhamos recebido pagamento pelo trabalho na loja, forçamos nossa imaginação identificando uma oportunidade de ganhar dinheiro. Ao começar nosso próprio negócio, a biblioteca de gibis, estávamos controlando nossas próprias finanças e não dependendo de um empregador. A melhor parte é que nosso negócio rendia dinheiro para nós, mesmo que nós não estivéssemos fisicamente presentes. Nosso dinheiro trabalhava para nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em lugar de nos pagar em dinheiro, pai rico tinha nos dado muito mais.' },


      //CAPÍTULO TRÊS
      { tipo: 'h3', texto: 'CAPÍTULO TRÊS' },
      { tipo: 'h3', texto: 'Lição 2' },
      { tipo: 'h2', texto: 'Para que alfabetização financeira?' },
      
       { tipo: 'em', texto: 'E' },
      
      { tipo: 'small', texto: 'm 1990, meu melhor amigo, Mike, assumiu o império de seu pai e está fazendo, de fato, um trabalho melhor do que o dele. Encontramonos uma ou duas vezes no ano, no campo de golfe. Ele e sua mulher são muito mais ricos do que você possa imaginar. O império de pai rico está em grandes mãos e Mike está agora preparando seu filho para ocupar seu lugar, tal como seu pai nos preparou.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1994, aposentei-me aos 47 anos e minha mulher, Kim, tinha 37 anos. Aposentadoria não significa deixar de trabalhar. Para minha mulher e para mim, quer dizer que, se não houver mudanças cataclísmicas inesperadas, podemos trabalhar ou não, e nossa riqueza continuará aumentando automaticamente, ficando bem à frente da inflação. Acho que isso representa liberdade. Os ativos são suficientemente grandes para crescerem por si próprios. É como plantar uma árvore. Você a rega durante anos e, então, um dia, ela não precisa mais disso. Suas raízes são suficientemente profundas. Então, a árvore lhe proporciona sombra para seu prazer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike optou por dirigir o império e eu por aposentar-me.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sempre que faço palestras, as pessoas perguntam o que lhes aconselho ou o que elas deveriam fazer: “Como começar?” “Há algum bom livro que eu possa recomendar?” “O que elas deveriam fazer para preparar seus filhos?” “Qual é o segredo do sucesso?” “Como é o segredo do sucesso?” “Como é que eu ganho milhões?” Nessas ocasiões sempre me lembro de um artigo que me deram certa vez. Diz mais ou menos o seguinte:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'OS HOMENS DE NEGÓCIOS MAIS RICOS' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1923 um grupo de nossos maiores líderes e homens de negócios mais ricos participou de um encontro no hotel Edgewater Beach em Chicago. Entre eles estavam Charles Schwab, presidente da maior siderúrgica independente; Samuel Insull, presidente da maior empresa de energia elétrica; Howard Hopson, presidente da maior empresa fornecedora de gás; Ivar Kreuger, presidente da Internacional Match Co., uma das maiores empresas da época; Leon Frazier, presidente do Banco Internacional de Compensações Financeiras; Richard Whitney, presidente da Bolsa de Valores de Nova York; Arthur Cotton e Jesse Livermore, dois dos maiores especuladores de ações, e Albert Fall, um membro do gabinete do Presidente Harding. Vinte e cinco anos depois, nove deles (os listados anteriormente) terminaram como se segue. Schwab morreu sem um centavo, depois de viver cinco anos de empréstimos. Insull morreu falido, em um país estrangeiro. Kreuger e Cotton também morreram falidos. Hopson ficou louco. Whitney e Albert Fall tinham acabado de sair da cadeia. Frazier e Livermore se suicidaram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Duvido que alguém possa dizer o que aconteceu realmente com aqueles homens. Se você olhar a data da reunião, 1923, foi antes do crash da bolsa de' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '1929 e da Grande Depressão, o que, desconfio, deve ter provocado grande impacto sobre esses homens e suas vidas. O interessante é isto: hoje vivemos em tempos de mudanças maiores e mais aceleradas do que esses homens vivenciaram. Imagino que nos próximos 25 anos deverão registrar-se auges e quedas comparáveis aos enfrentados por eles. Estou muito preocupado com o fato de que gente demais se preocupa excessivamente com dinheiro e não com sua maior riqueza, a educação. Se as pessoas estiverem preparadas para ser flexíveis, se mantiverem suas mentes abertas e aprenderem, elas se tornarão cada vez mais ricas ao longo dessas mudanças. Se elas pensarem que o dinheiro resolverá seus problemas, receio que terão dias difíceis. A inteligência resolve problemas e gera dinheiro. O dinheiro sem a inteligência financeira é dinheiro que desaparece depressa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maioria das pessoas não percebe que na vida o que importa não é quanto dinheiro você ganha, mas quanto dinheiro você conserva. Todos ouvimos histórias de ganhadores de prêmios na loteria que eram pobres, enriqueceram subitamente e voltaram a ser pobres. Ganham milhões e logo estão de volta ao ponto de partida. Ou histórias de atletas profissionais que, aos 24 anos, ganham milhões de dólares ao ano e que, aos 34, estão dormindo embaixo da ponte. Hoje de manhã, quando estou escrevendo isto, o jornal conta a história de um jovem jogador de basquete que um ano atrás era milionário. Hoje, ele diz que seus amigos, seu advogado e seu contador levaram todo o seu dinheiro e está trabalhando em um lava-carros por um salário mínimo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ele tem apenas 29 anos. Foi demitido do lava-carros porque se recusou a tirar seu anel de campeão enquanto trabalhava e, por isso, sua história chegou ao jornal. Ele estava lutando por sua reintegração, alegando dificuldades para sobreviver e discriminação, o anel era tudo o que lhe restara. Afirmava que se isso lhe fosse tirado ele desmoronaria.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1997 sei de muitas pessoas que estão se tornando milionários instantâneos. É a volta dos Loucos Anos 1920. E embora fique feliz de ver que pessoas se tornam cada vez mais ricas, só posso advertir que, a longo prazo, não importa tanto o quanto você ganhou mas o quanto você conservou e por quantas gerações isso é conservado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Partindo deste princípio, quando as pessoas perguntam “Como o senhor começou?” ou “Diga-me como ficar rico rapidamente”, elas frequentemente ficam muito desapontadas com minha resposta. Eu simplesmente lhes digo o que meu pai rico me falou quando eu era um moleque: “Se você quiser ficar rico, você precisa de uma alfabetização financeira.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A ideia era martelada na minha cabeça toda vez que nos encontrávamos. Como já disse meu pai instruído destacava a importância da leitura de livros, enquanto meu pai rico destacava a necessidade de dominar os conhecimentos das finanças.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você quer construir um Empire State Building, a primeira coisa a fazer é cavar profundamente o terreno e construir sólidos alicerces. Se você vai construir uma casa no subúrbio,[11] tudo o que tem a fazer é assentá-la numa laje de concreto de 15 cm. A maioria das pessoas, em sua ânsia de enriquecer, tenta construir um Empire State Building sobre uma laje de 15 cm.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nosso sistema escolar, por ter sido criado na época agrária, ainda acredita em casas sem alicerces. Chão de terra batida ainda está na moda. Assim, a garotada sai da escola sem qualquer fundamento financeiro. Um dia, insones e endividados no subúrbio, vivendo o sonho americano, elas decidem que a resposta para seus problemas financeiros está em achar um meio de enriquecer rapidamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Começam a construção do arranha-céu. Sobe rapidamente e, logo, em lugar de um Empire State Building, temos a Torre Inclinada dos Subúrbios. De volta às noites insones.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No meu caso e no de Mike, quando adultos, as nossas escolhas foram possíveis porque fomos ensinados a construir sólidos alicerces quando éramos apenas crianças.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora vejamos, a contabilidade é possivelmente um dos assuntos mais áridos do mundo. E pode também ser o mais confuso. Mas se você quiser ser rico, pode ser o assunto mais importante. A questão é, como pegar um tema entediante e confuso e ensiná-lo a crianças? A resposta é: simplifique. Comece por ensiná-lo por meio de figuras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai rico construiu um sólido alicerce financeiro para Mike e para mim. Já que éramos apenas crianças, ele criou uma forma muito simples de ensinar. Durante anos ele apenas fazia desenhos e usava palavras. Mike e eu entendíamos os desenhos simples, o jargão, o movimento do dinheiro e então, anos mais tarde, pai rico começou a incluir números. Hoje, Mike domina uma análise contábil muito mais complexa e sofisticada porque precisa disso. Ele tem de controlar um império de um bilhão de dólares. Eu não sou tão sofisticado porque meu império é menor; contudo, ambos partimos do mesmo alicerce simplificado. Nas páginas que se seguem apresentarei as mesmas figuras simples que o pai de Mike criou para nós. Embora simples, esses desenhos ajudaram a orientar dois garotos na construção de uma grande riqueza embasada em fundamentos sólidos e profundos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Regra Número Um. Você tem de conhecer a diferença entre um ativo e um passivo e comprar ativos. Se você deseja ser rico, isso é tudo o que você precisa conhecer. É a Regra Número Um e é a única regra. Isto pode parecer absurdamente simples, porque não se tem ideia do quanto é profunda. A maioria das pessoas tem dificuldades financeiras porque não conhece a diferença entre um ativo e um passivo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— As pessoas ricas adquirem ativos. Os pobres e a classe média adquirem obrigações pensando que são ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando pai rico explicou isso para Mike e para mim, pensamos que ele estava brincando. Aí estávamos, quase adolescentes, esperando pelo segredo do enriquecimento e essa era a resposta. Era tão simples que precisamos parar um longo tempo para pensar a respeito.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que é um ativo? — perguntou Mike.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Não se preocupe agora — disse pai rico. — Deixe a ideia amadurecer. Se você puder entender a simplicidade, sua vida terá um rumo e será fácil do ponto de vista financeiro. É simples, por isso é que não se presta atenção.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor quer dizer que tudo o que precisamos conhecer é o que é um ativo, comprá-lo e então ficaremos ricos? — perguntei.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico balançou a cabeça afirmativamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— É simples assim.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se é tão simples, por que é que todos não ficam ricos? — perguntei. Pai rico sorriu:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Porque as pessoas não sabem distinguir um ativo de um passivo. Lembro-me de ter perguntado: “Como é que os adultos podem ser tão ignorantes. Se é tão simples, tão importante, por que todo mundo não procura descobrir a diferença?”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico levou apenas alguns minutos para explicar o que eram ativos e passivos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Já adulto tive dificuldade em explicar isso a outros adultos. Por quê? Porque os adultos são mais espertos. Na maioria dos casos, a simplicidade da ideia escapa aos adultos porque eles foram educados de maneira diferente. Eles foram educados por outros profissionais instruídos, como banqueiros, contadores, agentes imobiliários, planejadores financeiros e assim por diante. A dificuldade está em levar os adultos a desaprender, ou em torná-los outra vez crianças. Um adulto inteligente frequentemente se sente diminuído ao prestar atenção em definições simplistas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico acreditava no princípio SE — “Simplifique, Estúpido” — de modo que ele simplificou as coisas para os dois garotos e deu-lhes uma sólida base financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que provoca a confusão? Ou como algo tão simples pode parecer tão enrolado? Por que alguém compraria um ativo que na verdade era uma obrigação? A resposta está nos conhecimentos básicos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pensamos em “alfabetização” e não em “alfabetização financeira”. O que define se algo é um ativo, ou é um passivo, não são as palavras. De fato, se você quer ficar realmente confuso, procure as palavras “ativo” e “passivo” no dicionário. Sei que um contador pode achar boa a definição, mas para a pessoa média não faz sentido. Mas nós adultos muitas vezes somos orgulhosos demais para admitir que algo não faz sentido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando éramos garotos, pai rico falava: “O que define um ativo não são as palavras, mas os números. E se você não puder ler os números, você não pode distinguir um ativo de um buraco no chão. Na contabilidade”, dizia pai rico, “não importam os números mas o que os números contam. É como as palavras. Não são as palavras. Mas as histórias que elas nos contam.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas pessoas leem, mas não entendem muita coisa. É a chamada compreensão da leitura. E todos temos habilidades diferentes no que se refere à compreensão da leitura. Por exemplo, recentemente comprei um novo aparelho de vídeo. Junto vinha o manual que explicava como fazer gravações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Tudo o que eu queria era gravar meu programa preferido numa sexta-feira à noite. Quase fiquei maluco tentando ler o manual. Nada no meu mundo é tão complexo quanto programar a gravação do vídeo. Eu li as palavras, mas não entendi nada. Eu tiro “10” no reconhecimento das palavras, mas tiro “0” na compreensão. E o mesmo acontece com a maioria das pessoas quando se trata de demonstrações financeiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Se você quer ficar rico, você tem de ler e entender os números.” Ouvi meu pai rico repetir isso mil vezes. E também aprendi: “Os ricos adquirem ativos e os pobres e a classe média adquirem obrigações.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Aqui está a maneira de distinguir ativos de passivos. A maioria dos contadores e profissionais das finanças não concorda com as definições, mas estes desenhos simples foram o início de uma base financeira sólida para dois garotos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para ensinar a pré-adolescentes, pai rico simplificou tudo, durante anos, usando tantos diagramas quanto possível, o menor número de palavras possível e nenhum número.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: '“Este é o padrão do fluxo de caixa de um ativo.”' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0059~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'A caixa de cima é uma Demonstração de Renda, muitas vezes chamada de Demonstração de Lucros e Perdas. Mede renda e despesas. Dinheiro que entra e dinheiro que sai. O diagrama inferior é um Balanço. É chamado de Balanço porque representa o equilíbrio entre ativos e passivos. Muitos novatos nas finanças não conhecem a relação entre a Demonstração de Renda e o Balanço. O entendimento desta relação é vital.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A principal causa da dificuldade financeira está simplesmente no desconhecimento da diferença entre um ativo e um passivo. E a confusão decorre da definição das duas palavras. Se você quer uma lição de confusão busque no dicionário as palavras “ativo” e “passivo”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Isto pode fazer sentido para contadores formados, mas para as pessoas comuns parece que está escrito em mandarim.[12] Você lê as palavras da definição, mas o entendimento verdadeiro é difícil.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse anteriormente, meu pai rico dizia para dois garotos que “ativos pôem dinheiro no seu bolso”. Simpático, simples e útil.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: '“Este é o padrão do fluxo de caixa de um passivo.”' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0061~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Agora que ativos e passivos foram definidos em diagramas, pode ficar mais fácil o entendimento das palavras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um ativo é algo que põe dinheiro no meu bolso. Um passivo é algo que tira dinheiro do meu bolso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Isso é o que você realmente precisa saber. Se quer ser rico, simplesmente passe sua vida comprando ativos. Se quer ser pobre ou pertencer à classe média, passe a vida comprando passivos. É o desconhecimento dessa diferença que provoca a maior parte das dificuldades financeiras na vida real.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Analfabetismo, tanto de palavras quanto de números, é a base das dificuldades financeiras. Se as pessoas têm problemas com as finanças, existem dados que elas não podem ler, sejam palavras, sejam números. Alguma coisa não está sendo compreendida. Os ricos são ricos porque possuem nível de alfabetização superior ao das pessoas com dificuldades financeiras. Se você quer ficar rico e conservar sua fortuna, é importante ser alfabetizado do ponto de vista financeiro, tanto em palavras quanto em números.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As setas nos diagramas representam o movimento do dinheiro ou “fluxo de caixa”. Números dizem pouco. Palavras também dizem pouco. É a história que conta. Nas demonstrações financeiras, a leitura dos números é a busca pelo enredo, pela história. A história de para onde o dinheiro está indo. Em 80% das famílias, a história financeira é um percurso de trabalho árduo na tentativa de progredir. Não porque não ganhem dinheiro. Mas porque passam suas vidas comprando passivos no lugar de ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por exemplo, este é o padrão do fluxo de caixa de uma pessoa pobre, ou de um jovem que ainda mora com os pais:' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0063~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Este é o fluxo de caixa de uma pessoa de classe média:' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0064~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0065~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Este é o fluxo de caixa de uma pessoa rica:' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0066~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0067~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Todos esses diagramas estão obviamente bastante simplificados. Todos têm despesas de subsistência, necessidade de alimentação, moradia e vestimentas.' },     
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Os diagramas mostram o fluxo de caixa na vida de pessoas pobres, da classe média e ricas. É esse fluxo de caixa que conta a história. É a história de como a pessoa lida com o dinheiro e o que faz depois que tem o dinheiro em mãos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Comecei apresentando a história dos homens mais ricos dos Estados Unidos porque quis ilustrar a falha no pensamento de tantas pessoas. A falha é considerar que o dinheiro resolverá todos os problemas. É por isso que me arrepio quando ouço as pessoas perguntando como ficar ricas rapidamente. Ou por onde começar. Muitas vezes ouço “Estou endividado, por isso preciso ganhar mais dinheiro”.' },
