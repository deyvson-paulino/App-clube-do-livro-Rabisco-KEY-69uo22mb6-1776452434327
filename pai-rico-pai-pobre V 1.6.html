      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Porém, mais dinheiro nem sempre resolve o problema; de fato, pode até aumentá-lo. O dinheiro muitas vezes põe a nu nossas trágicas falhas humanas, é como um holofote sobre o que não sabemos. É por isso que, com muita frequência, uma pessoa que tem um ganho súbito de dinheiro — uma herança, um aumento salarial ou um prêmio na loteria — volta rapidamente ao mesmo ponto, ou até pior, ao caos financeiro em que se encontrava antes de receber esse dinheiro. O dinheiro só acentua o padrão de fluxo de caixa que está na sua mente. Se seu padrão for gastar tudo o que ganha, o mais provável é que um aumento de dinheiro disponível apenas resulte em um aumento de despesa. Como se diz popularmente: “Um louco e seu dinheiro fazem uma grande festa.” Repeti inúmeras vezes que vamos à escola para adquirir habilidades acadêmicas e profissionais, ambas muito importantes. Na década de 1970, quando eu frequentava o segundo grau, se alguém fosse bem-sucedido academicamente, quase imediatamente imaginava-se que esse estudante brilhante se tornaria um médico. Muitas vezes nem se perguntava se o jovem desejava ser médico. Era uma pressuposição. Era uma profissão que prometia a maior recompensa financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Hoje, os médicos enfrentam dificuldades financeiras que não desejaria a meus piores inimigos: seguradoras controlando os negócios, cuidados de saúde administrados, intervenção governamental e processos por erro médico, para mencionar algumas. E a garotada quer ser estrela do basquete, jogador de golfe como Tiger Woods, gênio da computação, estrela do cinema, roqueiro, rainha de beleza ou corretor de Wall Street. Isso ocorre, simplesmente, porque é aí que estão a fama, o dinheiro e o prestígio. Eis o motivo por que é tão difícil motivar a garotada na escola. Eles sabem que o sucesso profissional já não depende apenas do sucesso acadêmico como em outros tempos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como os estudantes deixam a escola sem habilidades financeiras, milhões de pessoas instruídas obtêm sucesso em suas profissões mas depois se deparam com dificuldades financeiras. Trabalham muito, mas não progridem. O que falta em sua educação não é saber como ganhar dinheiro, mas como gastá-lo — o que fazer com ele depois de tê-lo ganhado. É o que se chama aptidão financeira — o que você faz com o dinheiro depois que o ganhou, como evitar que as pessoas lhe tirem o dinheiro, quanto tempo você o conserva e o quanto esse dinheiro trabalha para você. A maioria das pessoas não descobre o motivo de suas dificuldades financeiras porque não entende os fluxos de caixa. Uma pessoa pode ser muito instruída, bem-sucedida profissionalmente e ser analfabeta do ponto de vista financeiro. Essas pessoas muitas vezes trabalham mais do que seria necessário porque aprenderam a trabalhar arduamente mas não como fazer o dinheiro trabalhar para elas.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'A história de como a conquista de um sonho financeiro se transforma em um pesadelo financeiro' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A visão cinematográfica de pessoas trabalhadoras tem um padrão definido. Recém-casados, jovens altamente instruídos, felizes, mudamse para um de seus pequenos apartamentos alugados. Imediatamente percebem que estão poupando dinheiro, porque dois podem viver com a mesma despesa de um.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O problema é que o apartamento é apertado. Decidem então poupar para comprar a casa de seus sonhos e ter filhos. Eles têm duas rendas e se concentram em suas carreiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Suas rendas começam a aumentar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E a aumentar...' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0070~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'E suas despesas também.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0071~2.1.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'A despesa no 1, para a maioria, são os impostos. Muitas pessoas pensam que se trata do imposto de renda, mas para grande parte dos americanos o que pesa mais é a Seguridade Social. Para o empregado parece que a contribuição para a Seguridade Social combinada com a do Medicare é de cerca de 7,50%, mas na verdade é de 15%, porque o empregador deve dar uma contrapartida do mesmo montante. Essencialmente, esse é um dinheiro que o empregador não pode pagar a você. Além disso, você ainda paga imposto de renda sobre a quantia deduzida de seus salários para a Seguridade Social,[13] renda essa que você nunca recebeu porque foi transferida na fonte para a Seguridade Social.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E seu passivo também aumenta.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0073~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Isso é visto mais claramente se voltarmos ao caso do jovem casal. Em consequência do aumento de suas rendas, eles resolvem comprar a casa de seus sonhos. Uma vez adquirida, eles pagam um novo imposto, o chamado imposto de propriedade. Então, eles compram um carro novo, novos móveis e novos eletrodomésticos para montar o novo lar. E de repente acordam e a coluna do passivo está atulhada de dívidas hipotecárias e do cartão de crédito.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora eles estão aprisionados na Corrida dos Ratos. Chega o primeiro filho. Eles trabalham ainda mais. Mais dinheiro e mais impostos, a chamada escalada da alíquota. Um cartão de crédito chega pelo correio. Eles o usam. Mais despesa. Uma financeira telefona e diz que seu maior “ativo”, sua casa, teve seu valor aumentado. A empresa oferece um empréstimo de “consolidação”, porque sua ficha é tão boa, e lhes diz que o mais inteligente a fazer é zerar os altos juros ao consumidor liquidando seu débito junto ao cartão de crédito. E, além de tudo, os juros pagos sobre a hipoteca imobiliária podem ser deduzidos do imposto de renda. Eles aceitam e zeram os débitos de seus cartões de crédito onerados pelos elevados juros ao consumidor. Eles suspiram aliviados. A dívida com o cartão de crédito está encerrada. Agora suas dívidas de consumo estão somadas à hipoteca imobiliária de sua casa própria. As prestações mensais são reduzidas porque ampliaram o financiamento para trinta anos. É atitude muito inteligente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O vizinho os convida para irem às compras — afinal está começando a liquidação do Memorial Day.[14] uma chance de poupar algum dinheiro. Eles se dizem: “Não vamos comprar nada. Só vamos olhar.” Mas, para a eventualidade de achar uma boa oferta, pôem aquele novo cartão de crédito na carteira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Encontro este jovem casal a toda hora. Seus nomes mudam, mas seu dilema financeiro é o mesmo. Eles vêm a minhas palestras para ouvir o que eu tenho a dizer. Perguntam-me: “O senhor pode nos dizer como ganhar mais dinheiro?” Seus hábitos de compra os levam a buscar mais renda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eles nem sabem que o problema está na forma que escolheram para gastar o dinheiro que têm. São provocados por seu analfabetismo financeiro e por não entenderem a diferença entre um ativo e um passivo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Raramente os problemas de dinheiro das pessoas são resolvidos com mais dinheiro. A inteligência resolve os problemas. Um amigo meu costuma repetir uma frase para as pessoas endividadas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Se você descobre que se enterrou num buraco... pare de cavar.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando criança, meu pai dizia frequentemente que os japoneses conheciam três poderes: “O poder da espada, o poder da joia e o poder do espelho.” A espada simboliza o poder das armas. Os Estados Unidos têm gastado trilhões de dólares em armamento e, por isso, são a presença militar suprema do mundo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A joia representa o poder do dinheiro. Há uma certa verdade no dito: “Lembre-se da regra de ouro. Quem tem o ouro faz as regras.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O espelho significa o poder do autoconhecimento. Esse autoconhecimento, de acordo com a lenda japonesa, era o mais apreciado dos três.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os pobres e a classe média muitas vezes permitem que o poder do dinheiro os controle. Ao simplesmente acordar e trabalhar mais arduamente, deixando de perguntar-se a si mesmos se o que fazem tem sentido, eles dão um tiro no próprio pé na hora em que saem de casa todos os dias. Por não entendê-lo plenamente, a maioria das pessoas permite que o formidável poder do dinheiro exerça o controle sobre elas. Contudo, o poder do dinheiro é usado contra elas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se usassem o poder do espelho, teriam se perguntado: “Isto tem sentido?” Com muita frequência, em vez de confiar em sua sabedoria íntima, a maioria das pessoas acompanha a multidão. Fazem apenas o que todo mundo faz.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Conformam-se em vez de questionar. Muitas vezes, repetem sem pensar o que lhes foi dito. Ideias como “diversifique” ou “sua casa é um ativo”. “Sua casa é o maior investimento.” “Você terá uma redução nos impostos endividando-se mais.” “Consiga um emprego seguro.” “Não assuma riscos.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Diz-se que, para muitas pessoas, o medo de falar em público é maior do que o medo da morte. De acordo com psiquiatras, o medo de falar em público é provocado pelo medo do ostracismo, o medo de aparecer, o medo das críticas, o medo do ridículo, o medo de se tornar um pária. O medo de ser diferente impede que muitas pessoas busquem novas formas de resolver seus problemas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É por isso que meu pai instruído dizia que os japoneses davam o maior valor ao poder do espelho, porque somente quando nós, como seres humanos, nos olhamos no espelho, encontramos a verdade. E a principal razão pela qual as pessoas dizem “Procure segurança” é o medo. Isso vale para tudo, esporte, relacionamento, carreira ou dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É esse mesmo medo, o medo do ostracismo, que leva as pessoas a se conformarem e a não questionarem opiniões aceitas ou tendências generalizadas. “Sua casa é um ativo.” “Faça um empréstimo consolidando suas dívidas e livre-se delas.” “Trabalhe com mais afinco.” “É uma promoção.” “Algum dia chego a vice-presidente.” “Poupe.” “Quando tiver um aumento, vou comprar uma casa maior.” “Fundos mútuos são seguros.” “Bonecas Tickle Me Elmo estão em falta, mas ainda tenho uma reservada para um cliente que não apareceu.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitos dos grandes problemas financeiros são causados pelo desejo de se acompanhar a maioria e não querer ficar atrás do vizinho. Ocasionalmente, todos nós precisamos nos olhar no espelho e seguir nossa sabedoria interior e não nossos medos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando Mike e eu estávamos com uns 16 anos, começamos a ter problemas na escola. Não éramos maus garotos. Apenas começamos a nos distanciar da maioria. Trabalhávamos para o pai do Mike depois das aulas e nos fins de semana. Muitas vezes, Mike e eu passávamos horas depois do trabalho sentados junto do seu pai enquanto este se reunia com diretores de banco, advogados, contadores, corretores, investidores, gerentes e empregados. Ele era um homem que deixara a escola aos 13 anos, e agora dirigia, instruía, comandava e questionava pessoas com alto nível de escolaridade. Elas acorriam a seu chamado e se preocupavam quando ele não as aprovava.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Esse era um homem que não tinha acompanhado a multidão, um homem que pensava por si próprio e detestava as palavras “Temos de fazer assim, porque todos fazem assim”. Ele também odiava ouvir “Não é possível”. Se você quisesse levá-lo a fazer alguma coisa bastava dizer “Acho que o senhor não consegue isso”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mike e eu aprendemos mais assistindo a essas reuniões do que em anos de escola, incluindo a faculdade. O pai de Mike não tinha uma instrução formal, mas tinha conhecimentos financeiros e, em consequência, era bem-sucedido. Ele costumava repetir para nós: “Uma pessoa inteligente contrata pessoas mais inteligentes do que ela mesma.” Portanto, Mike e eu tínhamos o privilégio de passar horas ouvindo e, no processo, aprendendo com pessoas inteligentes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas, por causa disso, Mike e eu não podíamos acomodar-nos ao dogma padrão que nossos professores pregavam. E isso criava problemas. Sempre que um professor falava “Se vocês não tirarem boas notas, vocês não se sairão bem no mundo real”, Mike e eu franzíamos as sobrancelhas. Quando nos diziam para seguir as normas e não nos desviarmos das regras, víamos por que esse processo de ensino desestimulava de fato a criatividade. Começamos a entender por que pai rico nos dizia que as escolas se destinavam a formar bons empregados em lugar de bons empregadores.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De vez em quando, Mike e eu perguntávamos a nossos professores como se aplicava na prática o que estávamos estudando, ou por que não estudávamos o dinheiro e como ele funcionava. Esta última pergunta era muitas vezes respondida com a afirmação de que o dinheiro não era importante, que se nós tivéssemos uma educação excelente, o dinheiro viria atrás.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quanto mais sabíamos sobre o poder do dinheiro, mais nos distanciávamos de nossos mestres e colegas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído nunca me pressionava em relação às notas. Muitas vezes me perguntei por quê. Ele, porém, começou a discutir sobre dinheiro. Com 16 anos, já tinha provavelmente uma base de conhecimentos sobre dinheiro melhor do que minha mãe e meu pai. Eu sabia escriturar livros contábeis, ouvia especialistas em tributação, advogados especializados em questões empresariais, gerentes de banco, corretores imobiliários e investidores. Meu pai falava com professores.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Certo dia meu pai falou que nossa casa era seu maior investimento. Uma discussão um tanto desagradável teve início quando eu lhe mostrei por que não achava que uma casa fosse um bom investimento.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O diagrama a seguir ilustra a diferença na percepção de meu pai rico e de meu pai pobre no que se referia a casas. Um pensava que sua casa era um ativo, o outro que era um passivo.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0077~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Lembro que tracei o diagrama a seguir para mostrar a meu pai a direção dos fluxos de caixa. Também lhe mostrei as despesas que acompanhavam a posse de uma casa. Uma casa maior representa despesas maiores e o fluxo de caixa sai pela coluna das despesas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atualmente, ainda ouço contestações à ideia de que uma casa não é um ativo. E sei que, para a maioria das pessoas, ela é não só seu maior investimento como também seu sonho. E sermos donos de nossa moradia é melhor do que nada. Eu ofereço simplesmente uma maneira alternativa de encarar esse dogma popular. Se minha mulher e eu fôssemos comprar uma casa maior, mais vistosa, nós a encararíamos não como um ativo mas como um passivo, já que iria tirar dinheiro de nossos bolsos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Aqui vai o argumento que desenvolvo. Na verdade, não espero que a maioria das pessoas concorde com ele, uma vez que um lar agradável é um fator emocional. E, no que se refere a dinheiro, grandes emoções tendem a reduzir a inteligência financeira.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Em relação a casas, destaco que em geral as pessoas passam a vida pagando por uma moradia que nunca será delas. Em outras palavras, compra-se uma casa nova a cada tantos anos, incorrendo, cada vez, em um novo empréstimo de trinta anos sobre a casa anterior' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Apesar de poderem deduzir os juros da hipoteca para fins de imposto de renda, as pessoas pagam todas as demais despesas com o dinheiro que sobra depois de pago o imposto, mesmo depois que liquidam a hipoteca.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Impostos sobre a propriedade. Os pais de minha mulher ficaram chocados quando os impostos sobre a propriedade relativos a sua residência aumentaram para US$1.000 mensais. Isso ocorreu após sua aposentadoria, de modo que o aumento pressionou seu orçamento e eles se viram obrigados a mudar de casa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4. O valor dos imóveis nem sempre aumenta. Em 1997, enquanto escrevo este livro, eu tenho amigos que devem US$1 milhão por imóveis que só conseguiriam vender por US$700 mil.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '5. As maiores perdas são as das oportunidades que não foram aproveitadas. Se todo o seu dinheiro está comprometido com o imóvel onde mora, você pode ser obrigado a trabalhar mais porque todo o seu dinheiro continua saindo na coluna das despesas (o padrão clássico do fluxo de caixa da classe média) em lugar de aumentar a coluna dos ativos. Se um jovem casal destinasse uma soma maior à aquisição de ativos, mais tarde teria maiores facilidades, especialmente estaria preparado para pagar os estudos superiores de seus filhos. Seus ativos teriam aumentado e estariam disponíveis para cobrir despesas. Com excessiva frequência, um imóvel residencial só serve como meio de incorrer em empréstimos hipotecários para pagar despesas crescentes.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'small', texto: 'Em suma, o resultado final de optar por possuir um imóvel residencial caro demais, em lugar de começar a formar um portfólio de ativos mais cedo, prejudica o indivíduo de três formas:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Perda de tempo, porque outros ativos poderiam ter registrado aumento em seu valor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Perda de capital adicional, que poderia ter sido investido em vez de se ter pagado as altas despesas de manutenção relacionadas diretamente ao imóvel residencial.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Perdas na instrução. Com muita frequência, os casais' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'consideram seu imóvel residencial, as poupanças e o plano de aposentadoria como o total de sua coluna de ativos. Como não têm dinheiro para investir, eles simplesmente não investem. Isso lhes custa a experiência do investimento. Quase nunca conseguem tornar-se o que o mundo dos investimentos denomina um “investidor sofisticado”. E os melhores investimentos são em geral oferecidos aos “investidores sofisticados” que, por sua vez, vendem-nos às pessoas que buscam a segurança.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A demonstração financeira de meu pai instruído é a melhor demonstração da vida de alguém que está na Corrida dos Ratos. Suas despesas sempre acompanharam sua renda, de modo que nunca investiu em ativos. Em consequência, seus passivos, como a hipoteca imobiliária e as dívidas do cartão de crédito, eram maiores que seus ativos. A figura a seguir fala mais do que mil palavras.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0080~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'A demonstração financeira pessoal de pai rico, por outro lado, reflete os resultados de uma vida dedicada ao investimento e à minimização do passivo.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0081~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Uma revisão da demonstração financeira de meu pai rico mostra por que os ricos ficam mais ricos. A coluna dos ativos gera renda mais do que suficiente para cobrir as despesas, com o saldo reinvestido na coluna dos ativos. A coluna dos ativos continua crescendo e, portanto, a renda gerada continua crescendo com eles.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O resultado é: os ricos ficam mais ricos!' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0082~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'A classe média se encontra em um estado de constantes dificuldades financeiras. Sua renda principal é gerada por salários e quando seus salários aumentam, os impostos também aumentam. Suas despesas tendem a crescer no mesmo montante de seus salários, daí a expressão “Corrida dos Ratos”. Eles consideram seu imóvel residencial como seu principal ativo, em lugar de investir em ativos geradores de renda.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0083~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'O padrão de se considerar o imóvel residencial como investimento e a filosofia de que um aumento de salário significa que você pode comprar uma casa maior ou gastar mais é a base do atual endividamento da sociedade. Este processo de despesa crescente faz com que as famílias se endividem mais e tenham mais incerteza financeira, mesmo quando progridem no emprego e recebem aumentos salariais regulares. Esta é uma vida muito arriscada decorrente da precária instrução financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maciça perda de empregos de década de 1990 — o downsizing das empresas — trouxe à luz a instabilidade financeira da classe média. De repente, os planos de pensão das empresas estavam sendo substituídos por planos 401k.[15] A Seguridade Social está obviamente com problemas e não pode ser considerada uma alternativa de aposentadoria. O pânico se instalou na classe média. O bom, nestes dias, é que muitas dessas pessoas reconheceram esses problemas e começaram a aplicar em fundos mútuos. Este aumento nos investimentos é responsável em boa medida pela acentuada alta do mercado de ações. Hoje, mais e mais fundos mútuos estão sendo criados em resposta à demanda da classe média.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os fundos mútuos são populares porque representam segurança. Os aplicadores médios dos fundos de pensão estão demasiadamente ocupados trabalhando para pagar impostos e hipotecas imobiliárias, e têm dificuldade em poupar de modo a poder pôr seus filhos na faculdade e liquidar as dívidas do cartão de crédito. Não têm tempo de aprender a investir, de modo que confiam na experiência do administrador do fundo mútuo. Como o fundo mútuo também inclui muitos tipos diferentes de investimento, tem-se uma sensação de segurança porque o fundo é “diversificado”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Este grupo da classe média instruída aceita o dogma da “diversificação” defendido por corretores de fundos mútuos e consultores financeiros. Procure a segurança. Evite o risco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A verdadeira tragédia, contudo, é a falta de instrução financeira precoce, responsável pelo risco enfrentado pela pessoa comum da classe média. A razão é que precisam procurar a segurança porque uma situação financeira é, na melhor das hipóteses, precária. Seus balanços não fecham. Estão atulhados de passivos, sem verdadeiros ativos para gerar renda. Em geral, sua única fonte de renda é o contracheque. Seu modo de vida depende totalmente do empregador.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sendo assim, quando os verdadeiros “negócios de sua vida” aparecem, essas mesmas pessoas não podem aproveitar a oportunidade. Elas devem procurar a segurança, porque estão trabalhando muito, pagando impostos máximos e assoberbadas de dívidas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse no início da seção, a regra mais importante é conhecer a diferença entre um ativo e um passivo. Uma vez que você consiga entender a diferença, concentre seus esforços na compra exclusiva de ativos geradores de renda. Essa é a melhor maneira de dar o primeiro passo para se tornar rico. Continue fazendo isso e sua coluna dos ativos crescerá. Concentre-se em reduzir passivos e despesas. Isso aumentará o dinheiro disponível para continuar aumentando a coluna dos ativos. Logo, a base de ativos será tão profunda que você poderá permitir-se olhar para investimentos mais especulativos. Investimentos que podem ter retornos que variam de 100% ao infinito. Investimentos em que US$5 mil podem se transformar rapidamente em US$1 milhão ou mais. Investimentos que a classe média considera “demasiado arriscados”. O investimento não é arriscado. É a falta de simples inteligência financeira, a começar pela alfabetização financeira, que leva o indivíduo a ser “muito arriscado”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você fizer o que as massas fazem, você estará na seguinte situação.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0085~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Como empregado possuidor da casa própria, seus esforços no trabalho em geral resultam no seguinte:' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Você trabalha para alguém. Os esforços e o sucesso da maioria das pessoas assalariadas ajudarão a garantir o sucesso, O enriquecimento e a aposentadoria do dono da empresa e de seus acionistas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Você trabalha para o governo. O governo fica com uma parte de seu contracheque, antes mesmo que você veja o dinheiro. Ao trabalhar mais, você simplesmente aumenta o montante de impostos que o governo arrecada — a maioria das pessoas trabalha de janeiro a maio apenas para o governo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Você trabalha para o banco. Depois dos impostos, sua maior despesa é, em geral, a hipoteca imobiliária e a conta do cartão de crédito.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O problema decorrente de simplesmente trabalhar mais é que cada uma dessas três parcelas leva consigo uma parte maior de seu esforço. Você precisa aprender a fazer com que seus maiores esforços beneficiem diretamente você e sua família.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma vez que você decidiu cuidar de seus próprios problemas, como determinar seus objetivos? É necessário, em geral, dedicar-se à sua profissão e usar os salários recebidos para financiar a aquisição de ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'À medida que os ativos crescem, como medir a extensão de seu sucesso: quando alguém percebe que está rico, que tem fortuna? Da mesma maneira que tenho minhas definições de ativos e passivos, também tenho minha própria definição para riqueza. Na verdade, eu a tomei emprestada de alguém chamado Buckminster Fuller. Alguns o consideram um charlatão e outros um gênio vivo. Anos atrás ele criou um auê entre os arquitetos ao solicitar a patente para algo chamado um “domo geodésico”. Mas, ao fazer isso, ele também falou algo sobre a riqueza. Parecia à primeira vista muito confuso, mas depois de relêlo algumas vezes começou a fazer sentido: a riqueza é a capacidade de uma pessoa sobreviver tantos dias a mais... ou, se eu parar de trabalhar hoje, por quanto tempo poderei sobreviver?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao contrário do patrimônio líquido — a diferença entre ativos e passivos, que frequentemente está repleta com o lixo caro e as opiniões de pessoas sobre o valor das coisas — esta definição cria a possibilidade de desenvolver uma mensuração verdadeiramente acurada. Poderia assim medir e saber realmente em que pé estou em termos de meu objetivo de tornar-me financeiramente independente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora o patrimônio líquido frequentemente inclua ativos que não geram dinheiro, como objetos comprados e agora abandonados num canto da garagem, a riqueza mede quanto dinheiro seu dinheiro está gerando e, portanto, sua sobrevivência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A riqueza é a medida do fluxo de caixa gerado pela coluna dos ativos em comparação com a coluna das despesas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Vejamos um exemplo. Digamos que o fluxo de caixa da minha coluna de ativos gere US$1 mil por mês, e que eu tenha despesas mensais de US$2 mil. Qual é a minha riqueza?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Voltemos à definição de Buckminster Fuller. Usando essa definição, quantos dias para a frente posso sobreviver? Consideremos um mês de trinta dias. Por essa definição, eu tenho um fluxo de caixa suficiente para meio mês.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando eu tiver alcançado um fluxo de caixa gerado por meus ativos de US$2 mil, então eu serei abastado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ainda não estou rico, mas sou abastado. Agora eu tenho uma renda gerada por ativos, a cada mês, que cobre totalmente minhas despesas mensais. Se eu desejo aumentar essas despesas, preciso primeiro aumentar o fluxo de caixa gerado por meus ativos para manter esse nível de vida. Observe que nesse ponto eu não dependo mais de meu salário. Eu me concentro com sucesso em construir uma coluna de ativos que me tornou financeiramente independente. Se eu largar meu emprego hoje, eu poderei cobrir minhas despesas mensais com o fluxo de caixa gerado por meus ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu próximo objetivo poderia ser empregar o excedente de meu fluxo de caixa no reinvestimento, em mais ativos. Quanto mais dinheiro for destinado para a coluna dos ativos, mais esta crescerá. Quanto mais meus ativos crescerem, mais aumentará meu fluxo de caixa. E enquanto eu mantiver minhas despesas menores do que o fluxo de caixa gerado por esses ativos, eu me tornarei mais rico, com mais e mais fontes de renda além de meu trabalho físico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Enquanto este processo de reinvestimento continuar, estarei no caminho do enriquecimento. A verdadeira definição de riqueza depende de quem a define, você nunca poderá ser rico demais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Lembre desta observação simples: Os ricos compram ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os pobres só têm despesas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A classe média compra passivos pensando que são ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E como eu cuido dos meus negócios? Qual é a resposta? Ouça o fundador do McDonald' +"'s"},

//CAPÍTULO QUATRO
      { tipo: 'h3', texto: 'CAPÍTULO QUATRO' },
      { tipo: 'h3', texto: 'Lição 3:' },
      { tipo: 'h2', texto: 'Cuide de seus negócios' },
      
      { tipo: 'em', texto: 'E' },
      
      { tipo: 'small', texto: 'm 1974, Ray Kroc, fundador do McDonald'+"'s"+', foi convidado a fazer uma palestra para a turma de MBA da Universidade do Texas, em Austin. Um querido amigo meu, Keith Cunningham, era aluno dessa turma. Depois de uma exposição forte e inspiradora, os estudantes perguntaram a Ray se gostaria de juntar-se a eles num bar que frequentavam para tomar uma cerveja. Ray aceitou gentilmente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Qual é o meu negócio? — perguntou Ray, quando todo mundo já estava com o seu copo de cerveja.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Todos riram — conta Keith. — A maioria da turma pensou que Ray estivesse brincando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ninguém respondeu e Ray repetiu a pergunta.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Em que negócio vocês pensam que eu atuo?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os estudantes soltaram uma gargalhada e finalmente uma alma corajosa gritou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Ray, não há ninguém no mundo que não saiba que você está no ramo dos hambúrgueres.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ray deu uma risada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Achei que vocês fossem responder isso mesmo — fez uma pausa e disse rapidamente: — Senhoras e senhores, eu não atuo no ramo de hambúrgueres. Meu negócio são imóveis.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Keith conta que Ray passou um bom tempo explicando seu ponto de vista. Em seu plano de negócios, Ray sabia que o principal foco era a venda de franquias de hambúrguer, mas nunca perdeu de vista a localização de cada franquia. Ele sabia que os imóveis e sua localização eram o mais importante fator de sucesso de cada franquia. Basicamente, a pessoa que comprava a franquia estava também pagando, comprando, o terreno em que se situava a franquia da organização de Ray Kroc.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O McDonald'+"'s"+' é hoje o maior proprietário individual de terrenos no mundo, superando até a Igreja Católica. Atualmente, o McDonald'+"'s"+' é proprietário de alguns dos cruzamentos e esquinas mais valiosos não só dos Estados Unidos como também de outras partes do mundo.' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Keith diz que essa foi uma das mais importantes lições que recebeu em sua vida. Atualmente, Keith é proprietário de lava-carros, mas seu negócio são os terrenos que estão por baixo desses lavacarros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O capítulo anterior terminou com diagramas ilustrando que a maioria das pessoas trabalha para todo mundo menos para elas próprias. Elas trabalham, em primeiro lugar, para os donos das empresas, depois para o governo ao pagar impostos e finalmente para o banco onde fizeram a hipoteca.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando garoto, não havia nenhum McDonald'+"'s"+' por perto. Contudo, meu pai rico ensinou a mim e a Mike a mesma lição que Ray Kroc deu na Universidade do Texas. É a lição 3 dos ricos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O segredo é: “Cuide de seu negócio.” As dificuldades financeiras são muitas vezes o resultado direto de se trabalhar toda a vida para outras pessoas. Muita gente chegará sem nada ao fim de sua vida de trabalho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Novamente, uma imagem vale mil palavras. Aqui está o diagrama da demonstração de renda e do balanço que descrevem o conselho de Ray Kroc.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0090~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Nosso atual sistema de ensino se concentra em preparar a juventude para os empregos por meio do desenvolvimento de habilidades acadêmicas. Suas vidas girarão em torno de seus salários ou, como mostrado anteriormente, na coluna da renda. Depois de desenvolvidas as habilidades acadêmicas, os estudantes vão para níveis mais elevados de ensino a fim de desenvolver suas habilidades profissionais. Eles estudam para tornar-se engenheiros, cientistas, cozinheiros, policiais, artistas, escritores etc. Suas habilidades profissionais lhes permitirão ingressar na força de trabalho e trabalhar por dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há uma grande diferença entre sua profissão e seu negócio. Muitas vezes pergunto às pessoas: “Qual é o seu negócio?” E elas respondem: “Sou banqueiro.”[16] Então lhes pergunto se eles são donos do banco. Em geral respondem: “Não, eu trabalho para o banco.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Nesse caso, está-se confundindo profissão com negócio. Sua profissão pode ser a de banqueiro, mas elas ainda não são donas do negócio. Ray Kroc sabia claramente a diferença entre sua profissão e seu negócio. Em uma época ele vendia misturadores de milkshake, e pouco depois vendia franquias de hambúrguer. Mas enquanto sua profissão era vender franquia de hambúrguer, seu negócio era acumular imóveis geradores de renda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um dos problemas com a escola é que frequentemente você se transforma naquilo que você estuda. Se você estuda, digamos, culinária, você se torna um chef. Se você estuda direito, você se torna um advogado, e se você estuda mecânica de automóveis, você se torna um mecânico. O erro de tornarse aquilo para o que você estuda é que muitas pessoas se esquecem de cuidar de seu negócio. Elas passam a vida cuidando dos negócios de outras pessoas e enriquecendo essa pessoa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para ter segurança financeira, a pessoa precisa cuidar de seu negócio. Seu negócio gira em torno de sua coluna de ativos, em oposição a sua coluna de renda. Como dito anteriormente, a regra no 1 é conhecer a diferença entre um ativo e um passivo e comprar ativos. Os ricos se concentram em sua coluna de ativos enquanto os demais se preocupam com sua demonstração de renda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É por isso que ouvimos com tanta frequência: “Preciso de um aumento.” “Se pelo menos conseguisse uma promoção.” “Vou voltar a estudar para poder procurar um emprego melhor.” “Vou fazer hora extra.” “Quem sabe consigo mais um emprego.” “Vou me demitir em duas semanas, encontrei um emprego com salário melhor.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em alguns círculos, estas são ideias sensatas. Contudo, se prestar atenção em Ray Kroc, verá que ainda não está cuidando de seu negócio. Essas ideias todas ainda focam a coluna da renda e só ajudarão a pessoa a ter mais segurança financeira se o dinheiro adicional for utilizado na aquisição de ativos geradores de renda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A principal razão pela qual pobres e classe média são conservadores, do ponto de vista financeiro — o que quer dizer “não posso me arriscar” —, é que eles não têm um embasamento financeiro. Apenas agarram-se a seus empregos. Fazem o que é seguro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando o corte de pessoal se tornou a coisa in a ser feita, milhões de trabalhadores descobriram que seu chamado maior ativo, sua residência, os estava comendo vivos. Seu ativo, chamado de casa, ainda lhes custava dinheiro a cada mês. Seu carro, outro “ativo”, os devorava. Os tacos de golfe guardados na garagem e que tinham custado U$$1 mil já não valiam isso. Sem segurança no emprego, não tinham nada a que recorrer. O que eles pensavam que eram ativos não os podia ajudar a sobreviver em uma época de crise financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Imagino que todos nós já tenhamos preenchido uma ficha de cadastro para solicitar um financiamento bancário para comprar um imóvel ou um automóvel. É bem interessante olhar para o item “patrimônio líquido”. É interessante porque é isso que os bancos e as práticas contábeis aceitam como ativo de uma pessoa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Certo dia, minha posição financeira não parecia muito boa para obter um crédito, de modo que incluí meus tacos de golfe, minha coleção de arte, livros, aparelho de som, televisão, ternos Armani, relógios de pulso, sapatos e outros objetos pessoais a fim de aumentar o montante da coluna dos ativos. O empréstimo, entretanto, foi recusado porque eu tinha muito dinheiro investido em imóveis. Os responsáveis pela concessão de empréstimos não gostaram do fato de eu obter uma parte tão grande de minha renda com apartamentos alugados. Eles queriam saber por que eu não tinha um emprego normal, com um salário. Eles não questionaram os ternos Armani, os tacos de golfe ou a coleção de arte. A vida, às vezes, é dura para quem não se encaixa no perfil “padrão”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Tenho arrepios sempre que ouço alguém falar para mim que seu patrimônio líquido é de US$1 milhão ou de US$100 mil, ou qualquer outro valor. Um dos motivos por que o patrimônio líquido não é um indicador acurado é simplesmente porque no momento em que você começa a vender seus ativos, seus ganhos são tributados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas pessoas se envolvem em dificuldades financeiras quando sua renda é reduzida. Elas tomam empréstimos, elas vendem seus ativos. Primeiro, seus ativos em geral só podem ser vendidos por uma fração do valor declarado em seu balanço pessoal. Ou se houver um ganho na venda desses ativos, esse ganho será tributado. De modo que repito, o governo pega uma parte dos ganhos, reduzindo assim o montante disponível para auxiliá-las a sair da dívida. Por isso, costumo dizer que o patrimônio líquido de alguém frequentemente “vale menos” do que ele pensa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Comece a cuidar de seus negócios. Fique no seu emprego, mas comece a comprar ativos reais, não passivos ou objetos pessoais que não têm valor real, uma vez que você os leva para dentro de casa. Um carro novo perde cerca de 25% do preço que você paga no momento em que sai da concessionária. Não é um ativo verdadeiro, mesmo que seu banco permita que você o liste entre seus ativos. Meu novo taco de titânio que custou US$400, passou a valer US$150 no momento em que pisei no campo de golfe.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Para adultos, a lição é manter reduzidas as despesas, reduzir os passivos e formar diligentemente uma sólida base de ativos. Para os jovens, que ainda não saíram de casa, é importante que seus pais lhes ensinem a diferença entre ativos e passivos. Faça com que seus filhos comecem a construir uma firme base de ativos antes que saiam de casa, casem, comprem casa, tenham filhos e se encontrem em uma situação financeira difícil, agarrando-se a um emprego e comprando tudo a crédito. Vejo muitos jovens casarem e se verem aprisionados em um estilo de vida que não lhes permite sair do atoleiro das dívidas durante a maior parte dos anos de trabalho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Frequentemente, quando o último filho sai de casa, os pais constatam que não se prepararam adequadamente para a aposentadoria e começam a tentar pôr de lado algum dinheiro. Então, seus próprios pais adoecem e eles se deparam com novas dificuldades.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Qual o tipo de ativo que sugiro a você ou a seus filhos adquirirem? No meu mundo, ativos reais se agrupam em várias categorias diferentes:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Negócios que não exigem minha presença. Sou o dono deles, mas eles são administrados por outras pessoas. Se eu tiver de trabalhar neles, não é um negócio. Torna-se uma profissão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Ações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. Títulos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4. Fundos mútuos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '5. Imóveis que geram renda.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '6. Promissórias.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '7. Royalties de propriedade intelectual como música, escritos, patentes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '8. Tudo o que tenha valor, gere renda ou se valorize e tenha um mercado líquido.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando garoto, meu pai instruído me incentivava a procurar um emprego seguro. Meu pai rico, por outro lado, me incentivava a começar a adquirir ativos que me agradassem. “Se você não gostar deles, você não cuidará deles.” Comecei a adquirir imóveis simplesmente porque adoro prédios e terrenos. Gosto de comprá-los. Poderia buscá-los o dia todo. Quando surgem problemas, não são tão graves que mudem meu apreço pelos imóveis. Pessoas que detestam imóveis não deveriam comprá-los.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Adoro ações de pequenas empresas, especialmente aquelas que estão iniciando suas atividades. A razão é que eu sou um empreendedor, não um homem da grande empresa. Quando jovem, trabalhei em grandes organizações como a Standard Oil da Califórnia, a Marinha dos Estados Unidos e a Xerox Corp. Apreciei o tempo que lá passei e tenho boas lembranças, mas eu sabia lá no fundo que não era um homem de organização. Gosto de iniciar empresas, não de dirigilas. Então compro, em geral, ações de pequenas empresas e, às vezes, até início a empresa e depois a levo ao mercado. Podem se fazer fortunas com a emissão de novas ações e eu gosto desse jogo. Muitas pessoas têm medo de pequenas empresas e as consideram arriscadas, e de fato o são. Mas o risco sempre é diminuído se você gostar daquilo em que está investindo, entendê-lo e conhecer o jogo. Com pequenas empresas, minha estratégia é de investimento, é desfazer-me das ações no prazo de um ano. Por outro lado, minha estratégia para os imóveis é começar com pouco, depois trocálos por imóveis maiores e, portanto, adiar o pagamento dos impostos sobre os ganhos. Isto permite que seu valor aumente acentuadamente. Costumo ficar com os imóveis menos do que sete anos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Durante anos, mesmo quando estava na Marinha ou na Xerox, fiz o que aconselhava meu pai rico. Fiquei no meu emprego, mas ainda assim cuidava dos meus negócios. Estava atento à minha coluna de ativos. Negociava com imóveis e ações. Pai rico sempre destacava a importância da alfabetização financeira. Quanto melhor eu entendesse a contabilidade e a gestão do dinheiro, melhor eu poderia analisar investimentos e, por fim, construir minha própria empresa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu não incentivaria ninguém a iniciar uma nova empresa a menos que realmente o desejasse. Conhecendo o que conheço quanto à direção de uma empresa, não recomendaria a tarefa a ninguém. Em certos casos, quando a pessoa não consegue um emprego, iniciar uma empresa pode ser uma solução. As chances entretanto são adversas: nove entre dez empresas quebram em cinco anos. Das que sobrevivem aos primeiros cinco anos, nove entre cada dez também quebram. Se você realmente tem o desejo de ter sua própria empresa, vá em frente. Se não for esse o caso, fique no seu emprego e cuide de seus negócios.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando digo “cuide de seus negócios”, refiro-me à formação e à manutenção de uma sólida coluna de ativos. Se um dólar entrar nela, nunca o deixe sair de lá. Pense deste modo, uma vez que um dólar entra na coluna dos ativos, ele se transforma em seu empregado. O melhor do dinheiro é que ele trabalha 24 horas por dia e pode fazê-lo durante gerações. Fique no seu emprego, seja um ótimo empregado, mas construa essa coluna de ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'À medida que seu fluxo de caixa cresce, você pode comprar alguns artigos de luxo. Uma distinção importante é que os ricos compram os artigos de luxo por último, enquanto pobres e classe média tendem a fazê-lo antes. Nos Estados Unidos, os pobres e a classe média frequentemente compram itens de luxo como casas grandes, diamantes, peles, joias ou barcos porque desejam parecer ricos. Parecem ricos, mas na verdade estão afundando em dívidas. As pessoas que já têm dinheiro, os ricos a longo prazo, constroem primeiro sua coluna de ativos. Então, com a renda gerada por sua coluna de ativos, compram os artigos de luxo. Os pobres e a classe média compram artigos de luxo com seu próprio suor, sangue e com a herança de seus filhos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um luxo verdadeiro é uma recompensa por ter investido e desenvolvido uma coluna de ativos. Por exemplo, quando minha mulher e eu auferimos uma renda maior com nossos apartamentos, ela comprou sua Mercedes. Ela não fez nenhum trabalho extra, ou arriscou sua parte, porque os imóveis compraram o carro. Contudo, ela teve de esperar durante quatro anos enquanto o portfólio de imóveis crescia e finalmente começou a gerar suficiente renda extra para pagar o carro. Mas o luxo, a Mercedes, foi uma verdadeira recompensa: ela provou que sabia como aumentar sua coluna de ativos. Esse carro significa muito mais para ela do que apenas outro carro bonito. Significa que utilizou sua inteligência financeira para adquiri-lo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que muita gente faz é comprar compulsivamente um carro ou outro bem de luxo a crédito. Podem estar se sentindo entediadas e desejam apenas um brinquedo novo. Comprar um luxo a crédito leva alguém, mais cedo ou mais tarde, a se ressentir desse luxo, porque o endividamento se torna um ônus financeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Depois que você dedicou seu tempo e investiu em seus negócios, está pronto para acrescentar o toque mágico — o maior segredo dos ricos. O segredo que põe os ricos muito à frente da multidão. A recompensa no fim da estrada por ter dedicado diligentemente seu tempo para cuidar de seus negócios.' },

      //CAPÍTULO CINCO
      { tipo: 'h3', texto: 'CAPÍTULO CINCO' },
      { tipo: 'h3', texto: 'Lição 4:' },
      { tipo: 'h2', texto: 'A história dos impostos e o poder da sociedade anônima' },
      
      { tipo: 'em', texto: 'L' },
      { tipo: 'small', texto: 'embro-me de ter ouvido na escola a história de Robin Hood. Meu professor pensava que fosse uma maravilhosa história de um herói romântico, tipo Kevin Costner, que roubava dos ricos para dar aos pobres. Meu pai rico não via Robin Hood como um herói. Ele o chamava de bandido.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Robin Hood pode ter desaparecido há muito tempo, mas seus seguidores perduraram. Quantas vezes ouço as pessoas dizerem: “Por que os ricos não pagam por isso?” ou “Os ricos deveriam pagar mais impostos para atender à pobreza.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Essa ideia de Robin Hood, ou de tirar dos ricos para dar aos pobres, é que provoca os maiores sofrimentos para os pobres e para a classe média. Razão pela qual a classe média paga impostos tão pesados está no ideal de Robin Hood. Na verdade, os ricos não são tributados. É a classe média que paga pelos pobres, especialmente, a classe média alta instruída.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Novamente, para entender bem como tudo acontece, precisamos adotar uma perspectiva histórica. Precisamos conhecer a história dos impostos. Meu pai muito instruído era especialista em história da educação, já meu pai rico se tornou um especialista na história dos impostos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico explicou a Mike e a mim que originalmente na Inglaterra e nos Estados Unidos não havia impostos. De vez em quando eram lançados impostos eventuais para financiar guerras. O rei ou o presidente anunciava o acontecido e convocava todos para “rachar” a despesa. Impostos foram lançados na Grã-Bretanha para financiar as lutas contra Napoleão de 1799 a 1816 e nos Estados Unidos para financiar a Guerra Civil entre 1861 e 1865.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1874, a Inglaterra instituiu um imposto de renda permanente para seus cidadãos. Em 1913, o imposto de renda se tornou permanente nos Estados Unidos com a adoção da 16a emenda à Constituição. Durante certo tempo, os americanos eram contrários aos impostos. Foi o excessivo imposto sobre o chá que levou ao famoso Tea Party no porto de Boston, um incidente que ajudou a desencadear a Guerra Revolucionária. Foram necessários cerca de cinquenta anos, tanto na Inglaterra quanto nos Estados Unidos, para se consolidar a ideia de um imposto de renda rotineiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que esses dados históricos não revelam é que, em ambos os casos, os impostos foram inicialmente lançados sobre os ricos. Era isso o que pai rico queria que Mike e eu entendêssemos. Ele explicou que a ideia de impostos se tornou popular e foi aceita pela maioria, divulgando-se aos pobres e à classe média que os impostos estavam sendo criados para punir os ricos. Foi assim que as massas votaram a favor da lei e ela se tornou constitucionalmente legal. Embora fosse imaginada para punir os ricos, na realidade acabou punindo aquelas pessoas que votaram a seu favor, isto é, os pobres e a classe média.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Quando o governo sentiu o gosto do dinheiro, seu apetite aumentou”, disse pai rico. “Seu pai e eu somos exatamente os opostos. Ele é um burocrata do governo, eu sou um capitalista. Quanto mais ele gasta e quanto mais gente ele contrata, maior será sua organização. No governo, quanto maior sua organização, mais ele será respeitado. Por outro lado, dentro de minha organização, quanto menos gente eu contratar e quanto menos eu gastar, mais respeito obterei de meus investidores. É por isso que não gosto de gente do governo. Eles têm objetivos diferentes daqueles da maioria dos homens de negócios. À medida que o governo cresce, mais e mais dólares, saídos dos impostos, serão necessários para sustentá-lo.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído acreditava sinceramente que o governo deveria ajudar as pessoas. Gostava de John F. Kennedy e, especialmente, da ideia do Corpo da Paz. Gostava tanto dessa ideia que ele e mamãe trabalharam para o Corpo da Paz treinando voluntários para a Malásia, Tailândia e Filipinas. Ele sempre lutava por doações adicionais e aumentos no orçamento de modo que pudesse contratar mais gente, tanto no seu cargo no Departamento de Educação quanto no Corpo da Paz. Essa era sua função.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Desde meus 10 anos, ouvia meu pai rico dizer que os funcionários do governo eram um bando de ladrões preguiçosos, e meu pai pobre falava que os ricos eram bandidos gananciosos que deveriam ser obrigados a pagar mais impostos. Ambos os lados tinham argumentos válidos. Era difícil trabalhar para um dos maiores capitalistas da cidade e chegar à casa onde o pai era um destacado líder do governo. Não era fácil saber em quem acreditar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Contudo, quando você estuda a história dos impostos, aparece uma perspectiva interessante. Como já disse, a aprovação dos impostos só foi possível porque as massas acreditavam na teoria Robin Hood da economia, que era tirar dos ricos para distribuir aos demais. O problema é que o apetite do governo por dinheiro era tão grande que logo os impostos precisaram ser lançados sobre a classe média e daí “ir descendo”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os ricos, por outro lado, viram nisso uma oportunidade. Eles não jogam pelas mesmas regras. Como já disse, os ricos já sabiam sobre as sociedades anônimas que se tornaram populares na época das navegações. Os ricos criaram a sociedade anônima como veículo para limitar o risco dos ativos a cada viagem. Os ricos colocavam seu dinheiro em uma sociedade anônima para financiar a viagem. A sociedade anônima, então, contratava uma tripulação para ir ao Novo Mundo em busca de tesouros. Se a embarcação se perdesse, a tripulação perdia a vida, mas a perda para os ricos se limitava apenas ao dinheiro investido em cada viagem. O diagrama que se segue mostra como a estrutura da sociedade anônima fica fora de sua demonstração pessoal de renda e de seu balanço.' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0098~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'É o reconhecimento do poder da estrutura legal da sociedade anônima que dá aos ricos uma grande vantagem sobre os pobres e a classe média. Tendo dois pais a me ensinar, um socialista e o outro capitalista, rapidamente percebi que a filosofia dos capitalistas tinha mais sentido financeiro para mim. Tinha a impressão de que os socialistas, em última análise, puniam a si próprios, em decorrência de sua falta de instrução financeira. Não importa o que inventasse a turma do “Tire dos ricos”, os ricos sempre encontravam uma forma de passá-la para trás. E desta forma os impostos acabaram onerando a classe média. Os ricos passaram para trás os intelectuais, somente porque aqueles entendiam o poder do dinheiro, um tema não abordado pela escola.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como os ricos passaram para trás os intelectuais? Quando o imposto “Tire dos ricos” foi implementado, o dinheiro começou a fluir para os cofres do governo. Inicialmente as pessoas ficaram felizes. O dinheiro foi repassado para os funcionários do governo e para os ricos. Foi para os funcionários na forma de empregos e aposentadorias. Foi para os ricos quando as empresas receberam contratos do governo. O governo se tornou uma grande fonte de dinheiro, mas o problema era a administração fiscal desses recursos. Na verdade, não havia recirculação. Em outras palavras, a política do governo, se você fosse um burocrata estatal, era evitar ter excesso de dinheiro. Se não conseguisse gastar a verba recebida, você se arriscava a perdê-la no próximo orçamento. Certamente, não haveria reconhecimento para você se fosse eficiente. Os homens de negócios, por outro lado, são recompensados pelo dinheiro que sobra e são reconhecidos por sua eficiência.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'À medida que este ciclo de despesas públicas crescentes continuava, a demanda por dinheiro aumentava e a ideia de “Tire dos ricos” se ajustava agora para incluir níveis de renda mais baixos, chegando aos que tinham votado em favor dos impostos, os pobres e a classe média.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os verdadeiros capitalistas aplicavam seus conhecimentos financeiros para simplesmente encontrar uma maneira de escapar. Eles se voltaram para a proteção de uma sociedade anônima. Uma sociedade anônima protege os ricos. Mas o que muita gente desconhece é que uma sociedade anônima não é algo concreto, no sentido literal do termo. Uma sociedade anônima é simplesmente uma pasta de arquivo com alguns documentos legais, que descansa no escritório de um advogado e está registrada em um órgão público. Não é um edifício com o nome de uma empresa. Não é uma fábrica ou um grupo de pessoas. Uma sociedade anônima é simplesmente um documento legal que cria um corpo jurídico sem alma. A fortuna dos ricos estava novamente protegida. Mais uma vez as sociedades anônimas se tornaram populares — depois que as leis do imposto de renda permanente foram aprovadas — porque a alíquota do imposto de renda sobre as sociedades anônimas era menor do que as vigentes sobre as pessoas físicas. Além disso, como foi mostrado anterior mente, certas despesas poderiam ser descontadas da renda tributável da sociedade anônima.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Esta guerra entre os que têm e os que não têm se mantém há centenas de anos. É a turma do “Tire dos ricos” contra os ricos. A batalha é travada sempre que são discutidas leis, e continuará sempre. O problema é que as pessoas que perdem não têm informação. Se elas entendessem a maneira como os ricos jogam, também poderiam jogar. Então estariam a caminho de sua independência financeira. É por isso que me arrepio toda vez que ouço um pai aconselhar seu filho a estudar para poder conseguir um bom emprego seguro. Um empregado com um emprego bom e seguro não tem escapatória.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O americano comum de hoje trabalha de cinco a seis meses para o governo, antes de ter conseguido o suficiente para pagar seus impostos. Em minha opinião, isso é tempo demais. Quanto mais arduamente você trabalha, tanto mais você paga ao governo. É por isso que acredito que a ideia de “Tire dos ricos” acaba sendo um tiro pela culatra para aqueles que a votaram.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Toda vez que as pessoas tentam punir os ricos, estes não apenas não obedecem, como reagem. Eles têm o dinheiro, o poder e a intenção de mudar as coisas. Não ficam sentados e pagam voluntariamente mais impostos, ao contrário, buscam maneiras de minimizar sua carga tributária. Contratam advogados e contadores competentes e convencem os políticos a mudar as leis ou a criar artifícios legais. Eles têm os recursos para fazer mudanças.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O Código Tributário dos Estados Unidos também oferece outras formas de elidir os impostos. Muitos desses instrumentos estão à disposição de qualquer um, mas são em geral os ricos que tiram proveito deles porque cuidam de seus negócios. Por exemplo, “1031” é um jargão para a seção 1031 do Código da Receita Federal, que permite a um vendedor adiar o pagamento dos impostos sobre o ganho de capital resultante da venda de um imóvel se este for trocado por um imóvel mais caro. Se você continuar aumentando seu patrimônio mediante a troca de imóveis, seus ganhos não serão tributados, enquanto você não liquidar a transação. As pessoas que não se beneficiam desta poupança de impostos, permitida legalmente, estão perdendo uma grande oportunidade de aumentar sua coluna de ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os pobres e a classe média não têm os mesmos recursos. Eles ficam sentados e deixam que o governo espete em seus braços as agulhas para a doação de sangue. Atualmente fico chocado com o número de pessoas que pagam mais impostos ou aplicam menos deduções simplesmente porque têm medo do governo. E sei como um agente tributário do governo pode ser apavorante e intimidante. Tenho amigos cujos negócios foram fechados e destruídos, para só depois descobrirem que se tratava de um erro do governo. Eu percebi isso. Mas o preço de trabalhar de janeiro a meados de maio é um preço muito alto para essa intimidação. Meu pai pobre nunca se rebelou. Nem meu pai rico. Este foi apenas mais esperto, e usou as sociedades anônimas — o maior segredo dos ricos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Você lembrará a primeira lição que aprendi com meu pai rico. Eu era um garoto de 9 anos que teve de sentar e esperar até que ele resolvesse falar comigo. Frequentemente sentei em seu escritório esperando que ele “me atendesse”. Ele me ignorava propositalmente. Queria que eu reconhecesse seu poder e desejasse ter um dia esse mesmo poder. Durante todos os anos que estudei e trabalhei com ele, sempre me lembrou que conhecimento é poder. E com o dinheiro vem mais poder, o que exige o conhecimento certo para mantê-lo e fazê-lo se multiplicar. Sem esse conhecimento, o mundo arrasta você. Pai rico sempre recordava, a mim e a Mike, que o maior tirano não era o patrão ou o supervisor, mas o homem dos impostos. Se você deixar, o homem dos impostos sempre tirará mais de você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A primeira lição relativa a fazer o dinheiro trabalhar para mim, em vez de trabalhar pelo dinheiro, tem na verdade tudo a ver com poder. Se você trabalha pelo dinheiro, está cedendo o poder a seu empregador. Se seu dinheiro trabalha para você, você mantém e controla o poder.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No momento em que adquirimos esse conhecimento do poder do dinheiro trabalhando para nós, pai rico quis que nos tornássemos financeiramente espertos e não deixássemos os tiranos nos intimidarem. Você precisa conhecer as leis, a forma como funciona o sistema. Se for ignorante, é fácil ser intimidado. Se você sabe do que está falando, tem uma chance de vencer. É por isso que ele pagava tanto a advogados e contadores especialistas em tributação. Era menos dispendioso pagar-lhes do que pagar ao governo. A melhor lição que me deu, e que apliquei a maior parte de minha vida, é: “Seja esperto e você não será oprimido.” Ele conhecia a lei porque era um cidadão respeitador das leis. “Se você sabe que está certo, você não terá receio de se defender.” Mesmo se você estiver indo contra Robin Hood e seu bando.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído sempre me incentivou a conseguir um bom emprego em uma grande empresa. Ele falava das vantagens de “subir na hierarquia empresarial”. Ele não entendia que dependendo apenas do contracheque de um patrão eu seria uma vaca dócil pronta a ser ordenhada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando contei a meu pai rico o conselho de meu pai pobre, ele deu uma risadinha. “Por que não ser dono da hierarquia?” foi tudo o que disse.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Eu era garoto e não entendia o que meu pai rico queria dizer com tornarme dono de minha empresa. Era uma ideia que parecia impossível e assustadora. Embora a ideia me empolgasse, minha juventude não me permitia vislumbrar a possibilidade de que adultos trabalhassem, algum dia, para uma empresa da qual eu era o dono.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O importante é que se não fosse por meu pai rico, eu teria provavelmente seguido o conselho de meu pai instruído. Foi apenas a lembrança ocasional de meu pai rico que manteve viva a ideia de eu vir a ter minha própria empresa e me fez seguir um caminho diferente. Quando eu já estava com 15 ou 16 anos, sabia que não podia continuar a trajetória que meu pai instruído recomendava. Não tinha ideia de como fazer, mas estava disposto a não seguir na direção em que a maioria de meus colegas se encaminhava. Essa decisão mudou minha vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não foi antes de eu chegar aos 20 e poucos anos que o conselho de meu pai rico começou a fazer sentido. Tinha saído da Marinha e estava trabalhando na Xerox. Ganhava muito bem, mas cada vez que olhava para o contracheque me sentia desapontado. As deduções eram tão grandes e, quanto mais eu trabalhava, maiores elas eram. Na medida em que eu era bem-sucedido, meus chefes falavam de promoções e aumentos. Era lisonjeador, mas podia ouvir pai rico sussurrando em meu ouvido: “Para quem você está trabalhando? Quem você está enriquecendo?”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1974, ainda estava na Xerox, criei minha primeira sociedade anônima e comecei a “cuidar de meu negócio”. Já havia alguns ativos em minha coluna de ativos, mas agora estava determinado a focar um mercado maior. Esses contracheques cheios de deduções justificavam todos os conselhos que pai rico me dera ao longo dos anos. Via o futuro que me aguardava se seguisse o conselho de meu pai instruído.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitos empregadores temem aconselhar seus empregados a cuidar de seus próprios negócios. Estou certo de que isso pode valer para certas pessoas. Mas em meu caso, a atenção dada aos meus negócios, ao aumento de ativos, tornou-me um empregado melhor. Agora eu tinha um objetivo. Chegava cedo e trabalhava diligentemente, juntando todo o dinheiro possível para poder começar a adquirir imóveis. O Havaí estava começando a crescer, e havia fortunas a serem feitas. Quanto mais eu percebia os estágios iniciais da expansão, mais máquinas Xerox eu vendia. Quantas mais vendia, mais dinheiro ganhava e, naturalmente, mais deduções apareciam em meu contracheque. Era inspirador. Estava tão ansioso para fugir da armadilha que eu trabalhava mais, e não menos. Por volta de 1978, costumava ocupar um dos primeiros cinco lugares entre os vendedores, às vezes o primeiro. Estava louco para sair da Corrida dos Ratos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em menos de três anos eu estava faturando mais em minha pequena empresa, uma companhia imobiliária, do que na Xerox. E o dinheiro que ganhava na minha coluna de ativos, minha companhia imobiliária, era dinheiro que trabalhava para mim. Não era eu batendo em portas para vender copiadoras. O conselho de meu pai rico fazia mais sentido. Logo o fluxo de caixa de minhas propriedades permitiu que minha empresa comprasse meu primeiro Porsche. Meus colegas vendedores da Xerox pensavam que eu estava gastando minhas comissões. Não estava. Estava gastando minhas comissões em ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu dinheiro estava trabalhando arduamente para ganhar mais dinheiro. Cada dólar de minha coluna de ativos era um grande empregado dando duro para fazer mais empregados e comprando para o chefe um novo Porsche a ser deduzido da renda tributável. Comecei a trabalhar mais para a Xerox. O plano estava funcionando e meu Porsche era a prova.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao aplicar as lições de meu pai rico, eu, tão jovem, podia sair da “proverbial Corrida dos Ratos” de ser empregado. E isso foi possível dados os sólidos conhecimentos financeiros adquiridos com estas lições. Sem esses conhecimentos, que chamo de QI financeiro, meu caminho para a independência financeira teria sido muito mais difícil. Agora divido com outros, por meio de seminários, tudo que aprendi. Sempre que faço minhas palestras, lembro aos ouvintes que o QI financeiro se compõe de quatro grandes áreas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Contabilidade:' },

      { tipo: 'small', texto: ' É o que chamo de alfabetização financeira. Uma habilidade vital se você quer construir um império. Quanto mais dinheiro estiver sob sua responsabilidade, mais acuidade é exigida ou a casa desmorona. É o lado esquerdo do cérebro, ou os detalhes. A alfabetização financeira é a capacidade de ler e entender demonstrações financeiras. Isso lhe permite identificar os pontos fortes e fracos de qualquer negócio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Investimento:' },

      { tipo: 'small', texto: ' O que eu chamo de ciência do dinheiro que faz dinheiro. Isso envolve estratégias e fórmulas. É o lado direito do cérebro, ou o lado criativo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Entendimento dos mercados: A ciência da oferta e da demanda. Há necessidade de conhecer os aspectos “técnicos” do mercado, o que está relacionado à emoção. O boneco Tickle Me Elmo, no Natal de 1996, é um caso de mercado técnico ou conduzido pelas emoções. O outro fator de mercado é o dos “fundamentos” ou do sentido econômico de um investimento. Um investimento faz sentido ou não de acordo com as condições correntes do mercado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas pessoas pensam que os conceitos de investimento e a compreensão do mercado são muito complexos para as crianças. Elas não conseguem ver que as crianças conhecem esses assuntos intuitivamente. Para aqueles que não estão familiarizados com o boneco Elmo, esse era o personagem de Vila Sésamo que estava povoando o sonho das crianças antes do Natal. A maioria das crianças queria um e o colocava em primeiro lugar em sua lista de presentes. Muitos pais se perguntavam se a empresa estava retendo intencionalmente o produto fora do mercado, enquanto o continuava anunciando nas vésperas do Natal. Desencadeou-se um pânico em função da grande demanda e da oferta escassa. Sem encontrar bonecos à venda nas lojas, especuladores viram uma oportunidade de fazer pequenas fortunas à custa de pais desesperados. Os infelizes pais que não acharam o boneco foram forçados a comprar outros brinquedos. A incrível popularidade do boneco Elmo não fazia sentido para mim, mas serve como um excelente exemplo econômico de oferta e demanda. O mesmo pode ser dito dos mercados de ações, títulos, imóveis e cartões de beisebol.' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: 'Lei:' },

{ tipo: 'small', texto: 'Por exemplo, utilizando uma sociedade anônima com os artifícios técnicos contábeis, o investimento e os mercados podem permitir um crescimento explosivo. Uma pessoa com conhecimento das vantagens tributárias e a proteção oferecida por uma sociedade anônima pode enriquecer muito mais rapidamente do que alguém que é simples empregado ou proprietário único de uma empresa. É como a diferença entre andar e voar. A diferença é muito profunda quando se trata de riqueza a longo prazo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: '1. Vantagens tributárias:' },

{ tipo: 'small', texto: ' Uma sociedade anônima pode fazer muitas coisas que a pessoa física não pode, como pagar despesas antes de pagar impostos. Isto é uma especialização muito empolgante, mas não necessária, a menos que você tenha grandes ativos ou uma empresa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os empregados ganham e o imposto é descontado na fonte, assim eles têm que tentar sobreviver com o que sobra. Uma sociedade anônima fatura, gasta tudo o que pode e paga imposto sobre o que sobra. É uma das principais brechas tributárias de que se valem os ricos. É fácil constituí-las e não são dispendiosas se seus próprios investimentos geram um bom fluxo de caixa. Por exemplo, se você é dono de sua sociedade anônima, suas férias podem ser reuniões do Conselho no Havaí. Prestações de carro, seguros, consertos são despesas da sociedade. A mensalidade da academia de ginástica é uma despesa da sociedade. A maioria das refeições em restaurante pode ser considerada como despesa. E assim por diante — mas faça-o legalmente antes de pagar o imposto.' },

      { tipo: 'br', texto: '' },

{ tipo: 'b', texto: '2. Proteção contra processos judiciais:' },

{ tipo: 'small', texto: ' Vivemos em uma sociedade litigiosa. Todos querem uma parte de seu dinheiro. Os ricos escondem boa parte de sua fortuna por meio de sociedades anônimas e fundos fiduciários para proteger seus ativos dos credores. Quando alguém processa uma pessoa rica, depara-se frequentemente com camadas de proteção legal e descobre, finalmente, que a pessoa rica não possui, de fato, nada. Os ricos controlam tudo, mas não possuem nada. Os pobres e a classe média tentam ser donos de tudo e o perdem para o governo ou para outros cidadãos que gostam de processar os ricos. Eles aprenderam com a história de Robin Hood. Tire dos ricos, dê aos pobres.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não é o objetivo deste livro entrar nos detalhes da propriedade de uma sociedade anônima. Mas se você possui qualquer tipo de ativo legítimo, eu sugeriria que você pensasse, o mais rápido possível, em saber mais a respeito dos benefícios e da proteção oferecidos por uma sociedade anônima. Há muitos livros sobre o assunto que lhe mostrarão até os passos necessários para formar uma sociedade anônima. Um livro em especial, Inc. and Grow Rich, oferece conhecimentos importantes sobre o assunto.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O QI financeiro é na verdade a sinergia de várias habilidades e talentos. Mas eu diria que é uma combinação das quatro habilidades técnicas mencionadas anteriormente o que constitui a inteligência financeira básica. Se você aspira a uma grande fortuna, é a combinação dessas habilidades que amplificará a sua inteligência financeira.' },

      { tipo: 'br', texto: '' },

//CAPÍTULO SEIS
      { tipo: 'h3', texto: 'CAPÍTULO SEIS' },
      { tipo: 'h3', texto: 'Lição 5:' },
      { tipo: 'h2', texto: 'Os ricos inventam dinheiro.' },
      
      { tipo: 'em', texto: 'O' },
      
      { tipo: 'small', texto: 'ntem à noite interrompi a redação e fui assistir a um programa de televisão sobre a história de um jovem chamado Alexander Graham Bell. Bell acabara de patentear o telefone e estava tendo dificuldades crescentes em função da grande demanda por seu novo invento. Precisando ampliar suas atividades, ele procurou o gigante da época, a Western Union, para perguntar se havia interesse na compra de sua patente e de sua pequena empresa. Ele desejava US$100 mil por todo o pacote. O presidente da Western Union zombou dele e recusou a oferta afirmando que o preço era ridículo. O resto é história. Surgiu uma indústria multibilionária e nascia a AT&T.' },

      { tipo: 'br', texto: '' },
