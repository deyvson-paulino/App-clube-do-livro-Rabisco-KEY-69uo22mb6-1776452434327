{ tipo: 'big', texto: 'Quando terminou a história de Alexander Graham Bell, veio o noticiário noturno. Entre as notícias estava o downsizing de outra empresa local. Os trabalhadores estavam furiosos e reclamavam que os donos da empresa estavam sendo injustos. Um gerente demitido, de cerca de 45 anos, estava na fábrica com sua mulher e duas crianças, pedindo aos guardas que o deixassem entrar para falar com os proprietários a fim de solicitar que reconsiderassem sua demissão. Ele acabara de comprar uma casa e estava com medo de perdêla. A câmera focalizava suas queixas para que todo mundo pudesse ver. Não preciso dizer que isso prendeu minha atenção.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ensino profissionalmente desde 1984. Tem sido uma experiência muito gratificante. E também uma atividade perturbadora, pois tenho ensinado para milhares de pessoas e vejo algo em comum em todos nós, incluindo eu próprio. Todos temos um potencial tremendo e fomos abençoados com dons. Contudo, a única coisa que nos detém é alguma insegurança. Não é tanto a falta de informação mas sim a falta de autoconfiança. Alguns são mais afetados do que outros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando saímos da escola, a maioria de nós sabe que o que conta não é tanto o título que obtivemos ou as notas que tiramos. No mundo real, fora da academia, é necessário algo mais do que simplesmente notas. Já ouvi falar de “garra”, “ousadia”, “audácia”, “coragem”, “cara de pau”, “esperteza”, “tenacidade”, “brilho”. Este fator, qualquer que seja o nome que se lhe atribui, é mais decisivo, em última instância, para nosso futuro do que as notas obtidas ao longo dos estudos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Dentro de cada um de nós há alguma dessas características. Existe também o reverso das mesmas: pessoas que, se necessário, se ajoelhariam suplicantes. Depois de passar um ano no Vietnã, como piloto da Marinha, passei a conhecer intimamente esses dois aspectos dentro de mim. Nenhum deles é melhor do que o outro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Contudo, como professor, reconheço que são o medo excessivo e a falta de autoconfiança os grandes empecilhos à manifestação do gênio pessoal. Partia-me o coração ver estudantes que sabiam as respostas e que, no entanto, não tinham a coragem de agir em consequência. Muitas vezes, no mundo real, não são os talentosos que vão em frente, mas os ousados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em minha experiência pessoal, o gênio financeiro exige tanto conhecimento técnico quanto ousadia. Se o medo for muito forte, o gênio se extingue. Nas aulas, incentivo os estudantes a aprenderem a assumir riscos, a serem ousados, a deixarem seu gênio converter seu medo em poder e brilhantismo. Funciona para alguns e apavora outros. Acabei percebendo que a maioria das pessoas, quando se trata de dinheiro, prefere a segurança. Tive de responder a perguntas como: Por que arriscar? Por que me dar ao trabalho de desenvolver meu QI financeiro? Por que me alfabetizar financeiramente?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E a resposta é: “Para ter mais opções.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há grandes mudanças à nossa frente. Comecei com a história do jovem inventor Alexander Graham Bell, nos próximos anos haverá mais pessoas como ele. Haverá centenas de pessoas como Bill Gates e empresas extremamente bem-sucedidas como a Microsoft sendo criadas a cada ano, em todo o mundo. E também haverá muito mais falências, demissões e downsizing.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, por que se preocupar em desenvolver o QI financeiro? Ninguém pode responder isso a não ser você. Contudo, posso dizer por que eu o faço. Faço porque esta é a época mais empolgante para se viver. Prefiro saudar a mudança do que temê-la. Prefiro me entusiasmar com a possibilidade de ganhar milhões do que me preocupar com não conseguir um aumento de salário. O período em que nos encontramos é arrebatador, não tem precedentes na história mundial. As gerações futuras olharão para esta época e verão o quanto de vibração deve ter havido. Terá sido a morte do velho e o nascimento do novo. Terá sido tumultuada e empolgante.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, por que se preocupar em desenvolver o QI financeiro? Porque se você o fizer, poderá prosperar muito. E se você não o fizer, este será um período apavorante. Será uma época em que pessoas seguem ousadamente em frente enquanto outras se agarram a modos de vida decadentes.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há trezentos anos, a terra era riqueza, de modo que quem a possuísse, possuía riqueza. Então, apareceram as fábricas e a produção e os Estados Unidos ascenderam ao domínio. Os industriais eram os donos da riqueza. Hoje é a informação. E a pessoa que tiver a informação na hora certa, terá a riqueza. O problema é que a informação voa em volta do mundo à velocidade da luz. A nova riqueza não fica restrita por limites e fronteiras, como ocorria com as fábricas. As mudanças serão mais aceleradas e dramáticas. Haverá um aumento impressionante de novos multimilionários. E haverá também os que ficam para trás.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atualmente, vejo tantas pessoas com dificuldades, trabalhando mais arduamente, simplesmente porque se agarram às velhas ideias. Querem que tudo seja como era antes, resistem à mudança. Conheço pessoas que estão perdendo seus empregos e suas casas e que culpam a tecnologia, ou a economia, ou o chefe. Infelizmente, elas não percebem que elas próprias podem ser o problema. Velhas ideias são seu maior passivo. É um passivo simplesmente porque não conseguem perceber que aquela ideia ou maneira de fazer alguma coisa, que era um ativo ontem, não mais existe.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma tarde estava ensinando a investir utilizando um jogo de tabuleiro, CASHFLOW, que inventei como uma ferramenta de ensino. Um amigo tinha trazido consigo uma conhecida para assistir à aula. Essa conhecida tinha se divorciado recentemente sendo grandemente prejudicada pelo acordo feito e agora estava à procura de respostas. Seu amigo pensou que a aula pudesse ajudar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O jogo foi criado de modo a ajudar as pessoas a entender como funciona o dinheiro. Ao jogar, aprendem a interação entre demonstração de renda e balanço. Elas aprendem como “o dinheiro flui”[17] entre os dois e como a trajetória para a riqueza depende de aumentar o montante gerado mensalmente pela coluna de ativos até o ponto que este supere nossas despesas mensais. Uma vez atingido esse ponto, você pode abandonar a “Corrida dos Ratos” e entrar na “Pista da Alta Velocidade”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse, algumas pessoas odeiam o jogo, outras adoram e algumas não entendem. Essa mulher perdeu uma valiosa oportunidade de aprender. Logo no começo do jogo ela tirou um cartão em que aparecia uma lancha. No início ficou feliz. “Oh! Ganhei uma lancha.” Então, quando o amigo tentou lhe explicar como funcionavam as contas de sua demonstração de renda e de seu balanço, ela ficou frustrada porque nunca gostara de matemática. O resto dos jogadores de sua mesa ficou esperando enquanto o amigo lhe explicava a relação entre demonstração de renda, balanço e fluxo de caixa mensal. De repente, ela percebeu como os números se encaixavam e que a lancha a estava comendo viva. No correr do jogo, também foi atingida pelo downsizing e teve um filho. Para ela foi um jogo terrível.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Depois da aula, seu amigo se aproximou de mim e disse que ela estava perturbada. Viera para a aula pensando em aprender a investir e não gostara “do tempo gasto com um jogo bobo”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Seu amigo tentou levá-la a pensar se o jogo não teria se “refletido” nela de alguma forma. Com essa sugestão, a mulher pediu o dinheiro de volta. Disse que a mera ideia de que o jogo pudesse ter algo a ver com ela era ridícula. Seu dinheiro foi rapidamente devolvido e ela foi embora.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Desde 1984, ganho milhões simplesmente fazendo o que o sistema de ensino não faz. Na escola, a maioria dos professores faz exposições. Eu detestava exposições quando estudante; logo me aborrecia e minha mente começava a divagar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1984, comecei a ensinar por meio de jogos e simulações. Sempre incentivei os estudantes adultos a pensar nos jogos como uma reflexão sobre o que eles já sabem e sobre o que precisam ainda aprender. É um sistema de feedback instantâneo. Em lugar de um professor fazendo uma exposição para o aluno, o jogo lhe devolve uma exposição personalizada, feita sob medida para você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O amigo da mulher que foi embora me ligou mais tarde contando o que estava acontecendo. Ele disse que a amiga estava ótima e se acalmara. Depois de mais calma, ela começou a ver alguma relação entre o jogo e sua vida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Embora ela e o marido não possuíssem uma lancha, tinham tudo o que se pode imaginar. Ela estava furiosa depois do divórcio, tanto porque ele a deixara por uma mulher mais nova, quanto pelo fato de em vinte anos de casamento eles terem acumulado poucos ativos. Não havia quase nada a dividir. Os vinte anos de casamento tinham sido muito divertidos, mas tudo o que eles tinham acumulado era um monte de badulaques.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ela percebeu, ao fazer as contas — a demonstração de renda e o balanço' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— que sua raiva decorria do fato de não entendê-las. Ela tinha acreditado que as finanças eram assunto de homem. Ela cuidava da casa e da vida social e ele tratava das finanças. Estava agora certa de que nos últimos cinco anos de casamento ele ocultara dinheiro dela. Ela estava furiosa consigo mesma por não ter visto para onde o dinheiro ia, tanto quanto por não ter descoberto a existência da outra mulher.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Da mesma maneira que o jogo de tabuleiro, o mundo está sempre nos dando um feedback instantâneo. Poderíamos aprender muito se prestássemos mais atenção. Um dia, não muito tempo atrás, queixeime com minha mulher de que a lavanderia devia ter encolhido minhas calças. Minha mulher sorriu gentilmente e cutucou minha barriga para informar que as calças não tinham encolhido, alguma coisa tinha se expandido: eu!' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O jogo CASHFLOW se destina a oferecer a cada jogador um feedback pessoal. Seu objetivo é apresentar opções. Se você tirar um cartão que o endivida, a questão é “O que posso fazer agora?”. Quantas opções financeiras diferentes você pode imaginar? Este é o objetivo do jogo: ensinar os jogadores a pensar e criar várias e novas opções financeiras.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Já observei mais de mil pessoas jogarem CASHFLOW. Aquelas que saem da Corrida dos Ratos mais rapidamente são as que têm um bom conhecimento dos números e uma mente criativa do ponto de vista financeiro. Elas reconhecem as diferentes opções financeiras. As pessoas que demoram mais são as que não têm familiaridade com números e que frequentemente não entendem o poder do investimento. As pessoas ricas frequentemente são criativas e assumem riscos calculados.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há muita gente que ganha rios de dinheiro no jogo, mas não sabe o que fazer com ele. A maioria dessas pessoas também não é bemsucedida nas finanças na vida real, todos parecem passar à sua frente. São muitos os que, apesar da quantidade de dinheiro que possuem, não progridem financeiramente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Limitar suas opções é o mesmo que agarrar-se a ideias antiquadas. Tenho um amigo, do meu tempo no segundo grau, que trabalha em três empregos. Vinte anos atrás era o mais rico da minha turma. Quando a usina de açúcar local fechou, a empresa em que trabalhava quebrou junto. Na sua cabeça, ele só tinha uma opção e essa era a opção antiga: trabalhar arduamente. O problema é que não conseguia encontrar um emprego que reconhecesse sua antiguidade na empresa quebrada. Em consequência, ele tem uma qualificação superior ao necessário no emprego atual e seu salário é, portanto, inferior. Então ele está trabalhando em três empregos para conseguir sobreviver.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Observei pessoas que jogam CASHFLOW queixando-se de que as cartas não lhes oferecem as oportunidades “certas” e, assim, ficam paradas. Conheço quem faça isso na vida real. Esperam pela oportunidade “certa”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Observei pessoas que tiram a carta “certa” mas não têm dinheiro suficiente. Então se queixam de que poderiam ter saído da Corrida dos Ratos se tivessem mais dinheiro e, assim, ficam paradas. Na vida real há quem faça o mesmo. Veem todos os grandes negócios mas não têm dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'E já vi pessoas tirarem uma carta com uma grande oportunidade, lê-la em voz alta e não terem a ideia do que se tratava. Têm o dinheiro, a época é oportuna, têm a carta, mas não veem a chance que está à sua frente. Não conseguem ver como isso se encaixa em seu plano financeiro para sair da Corrida dos Ratos. E ainda os que parecem todos esses tipos combinados. A maioria tem uma oportunidade única bem na sua frente e não consegue vêla. Um ano depois descobre que todos os outros ficaram ricos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A inteligência financeira é simplesmente ter mais opções. Se as oportunidades não aparecem à sua frente, que outra coisa você pode fazer para melhorar sua posição financeira? Se uma oportunidade lhe cai do céu, e você não tem dinheiro, e o banco não lhe dá atenção, o que mais poderia fazer para essa oportunidade trabalhar a seu favor? Se seu palpite é errado e o que você esperava não acontece, como pode transformar um limão em milhões? Isso é inteligência financeira. Não é tanto o que acontece, mas quantas soluções financeiras diferentes você pode imaginar para transformar um limão em milhões. É a sua criatividade a serviço da solução de problemas financeiros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maioria das pessoas só conhece uma solução: trabalhar arduamente, poupar e levantar empréstimos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, por que você quer aumentar sua inteligência financeira? Porque você quer ser o tipo de pessoa que cria sua própria sorte. Você pega o que quer que aconteça e o torna melhor. Poucas pessoas percebem que a sorte é criada. Do mesmo modo que o dinheiro. E se você quer ter mais sorte e criar dinheiro em lugar de trabalhar arduamente, então sua inteligência financeira é importante. Agora, se você é o tipo de pessoa que fica à espera de a coisa “certa” acontecer, pode esperar muito tempo. É como esperar que todas as luzes estejam verdes cinco quilômetros antes de começar a viagem.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando éramos garotos, Mike e eu ouvíamos meu pai rico dizer que o “Dinheiro não é real”. Pai rico de vez em quando nos lembrava como chegamos perto do segredo do dinheiro naquele primeiro dia em que começamos a “fazer dinheiro” com gesso. “Os pobres e a classe média trabalham pelo dinheiro”, dizia. “Os ricos fazem dinheiro. Quanto mais real vocês pensarem que o dinheiro é, tanto mais arduamente trabalharão por ele. Se vocês perceberem que o dinheiro não é real, enriquecerão mais rápido.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Então o que é?”, era a pergunta que Mike e eu repetíamos frequentemente. “O que é a moeda se não é real?”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“O que nós concordamos que seja”, era tudo que pai rico respondia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O ativo mais poderoso que todos nós possuímos é nossa mente. Se for bem treinada, pode criar uma imensa riqueza no que parece ser um instante. Riqueza muito além dos sonhos de reis ou rainhas há trezentos anos. Uma mente não treinada também pode criar pobreza externa que perdura por muito tempo quando é transmitida às famílias.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na Era da Informação, o dinheiro cresce exponencialmente. Algumas poucas pessoas estão se tornando fabulosamente ricas a partir do nada, apenas com ideias e acordos. Se você perguntar a muitas pessoas que negociam com ações ou outros investimentos como meio de vida, elas dirão que veem isso acontecer a toda hora. Milhões podem ser ganhos instantaneamente a partir do nada. E ao dizer nada estão querendo dizer que não há dinheiro sendo trocado. Tudo é feito por um acordo, um sinal manual do pregão, um sinal na tela de um corretor em Lisboa originado por um corretor em Toronto e de volta a Lisboa; um telefonema para meu corretor para comprar e outro, logo a seguir, para vender. O dinheiro não muda de mãos. Os acordos mudam.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, por que desenvolver seu gênio financeiro? Só você pode responder a isso. Eu só posso dizer porque venho desenvolvendo essa área de minha inteligência. Eu o faço porque quero ganhar dinheiro rapidamente. Não porque eu precise, mas porque quero. É um processo de aprendizado fantástico. Desenvolvo meu QI financeiro porque quero participar do maior jogo do mundo. E de minha maneira pequena, gostaria de ser parte dessa evolução sem precedentes da humanidade, a era em que os seres humanos não trabalham com seus corpos, mas apenas com suas mentes. Aliás, nestas é onde está a ação. Êo que está acontecendo. É fantástico. É apavorante. E é divertido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É por isso que invisto em minha inteligência financeira, desenvolvendo o ativo mais poderoso que possuo. Quero estar junto das pessoas que se dirigem ousadamente para a frente. Não quero estar entre os que ficam para trás.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Vou lhe apresentar um exemplo simples de criação de dinheiro. No início da década de 1990, a economia de Phoenix estava em situação deplorável. Assistia na televisão ao “Bom-Dia América” quando um consultor financeiro começou a prever dias de desgraça e sombra. Seu conselho era “poupe seu dinheiro. Ponha US$100 de lado a cada mês”, dizia, “e em quarenta anos você será um multimilionário”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Bem, fazer uma poupança mensal é uma orientação válida. É uma opção' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— a opção que a maioria das pessoas encamparia. O problema é o seguinte: torna-nos cegos ao que está acontecendo a nossa volta. Perdem-se grandes oportunidades de um ganho maior. O mundo passa ao largo daqueles que optam por esse caminho.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como disse, a economia estava em situação deplorável naquele momento. Para os investidores, essa é a condição perfeita do mercado. Parte de meu dinheiro estava aplicada em ações e apartamentos. Tinha pouco dinheiro em mãos. Como todos estavam se desfazendo de coisas, eu estava comprando. Eu não estava poupando, estava investindo. Minha mulher e eu tínhamos mais de US$1 milhão trabalhando em um mercado que crescia rapidamente. Era a melhor oportunidade para investir. A economia encontrava-se em má situação. Eu não podia deixar aqueles pequenos negócios passarem ao largo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Casas que valiam US$100 mil, estavam agora sendo oferecidas por US$75 mil. Mas em vez de comprar na imobiliária local, comecei a comprar no escritório do advogado especializado em falências ou nos degraus do tribunal. Nesses lugares, uma casa de US$75 mil podia ser adquirida por US$20 mil ou menos. Com US$2 mil que um amigo me emprestou por noventa dias e encargos de US$200, dei ao advogado um cheque como entrada. Enquanto a aquisição estava sendo processada, coloquei um anúncio no jornal oferecendo uma casa que valia US$75 mil por US$60 mil, sem entrada. Choveram telefonemas. Depois de verificado o cadastro dos possíveis compradores e de que a casa fora passada para meu nome, os interessados puderam vê-la. Foi uma loucura. Em alguns minutos a casa estava vendida. Pedi ao comprador US$2.500 como taxa de processamento, o que foi logo pago imediatamente, e depois a transação passou às mãos da financeira. Devolvi a meu amigo os US$2 mil com um adicional de US$200. Ele ficou feliz, o comprador da casa ficou feliz, o advogado ficou feliz e eu fiquei feliz. Vendi por US$60 mil uma casa que me custou US$20 mil. Os US$40 mil foram criados com dinheiro que estava em minha coluna de ativos na forma de uma promissória do comprador. Tempo total de trabalho: cinco horas. Agora que você está alfabetizado financeiramente e lê os números, mostrarei por que isto é um exemplo de dinheiro sendo inventado.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'aside', texto: 'Poupança — quanto tempo seria necessário para poupar US$40 mil e quanto custaria considerando uma alíquota de imposto de 50%' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0114~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Nessa fase de mercado deprimido, minha mulher e eu fizemos seis de tais simples transações nas horas vagas. Enquanto o grosso de nosso dinheiro estava aplicado em imóveis maiores e em ações, conseguimos criar mais de US$190 mil em ativos (promissórias a juros de 10%) a partir dessas seis transações de compra, cria e vende. Isso representa uma renda anual de aproximadamente US$19 mil, boa parte dos quais abrigados sob o manto de nossa sociedade anônima. Esses US$19 mil anuais se destinarão sobretudo a pagar os carros de nossa empresa, gasolina, viagens, seguros, jantares com clientes e outros. Quando o governo tributa essa renda, ela já foi gasta em despesas legalmente dedutíveis.' },
      
      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },
      
      { tipo: 'aside', texto: 'US$40 mil criados na coluna de ativos — Dinheiro inventado sem tributação. A juros de 10% — você criou US$4 mil ao ano em fluxo de caixa' },
      
      { tipo: 'img', src: 'img/Robert T. Kiyosaki, Sharon L. Letcher - Pai Rico, Pai Pobre (2011, Elsevier Editora Ltda.) - libgen.li_0115~2.jpg' },
      
      { tipo: 'br', texto: '' },
      
      { tipo: 'big', texto: 'Isso foi um exemplo simples de como o dinheiro é inventado, criado e protegido usando-se inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pergunte-se quanto tempo levaria para poupar US$190 mil. O banco lhe pagaria um juro de 10% sobre esse dinheiro? E a promissória é de trinta anos. Espero que eles nunca me paguem os US $190 mil. Eu teria de pagar impostos se eles me pagassem o principal e, além disso, US$19 mil pagos ao longo de trinta anos geram uma renda de pouco mais de US$500 mil.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Já vi pessoas perguntarem o que aconteceria se o comprador não pagasse. Também seria bom. O mercado imobiliário de Phoenix foi, entre 1994 e 1997, um dos mais quentes do país. Aquela casa de US$60 mil teria sido retomada e revendida por US$70 mil, mais outros US$2.500 a título de despesas de processamento. E ainda seria um bom negócio para o novo comprador. E o processo prosseguiria.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você lembra, a primeira vez que vendi essa casa, devolvi os US $2 mil. Tecnicamente não pus dinheiro na transação. Meu retorno sobre o investimento (RON)[18] é infinito. Esse é um exemplo de um monte de dinheiro sendo feito a partir do nada.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na segunda transação, quando revendi, eu teria posto US$2 mil de meu bolso e renovado o empréstimo por trinta anos. Qual teria sido o ROI se eu recebi dinheiro para fazer dinheiro? Não sei, mas sem dúvida é muito mais do que seria obtido poupando US$100 todo mês, o que na verdade acaba sendo equivalente a US$150 porque se trata de uma renda, já descontado o imposto durante quarenta anos a 5%, e que novamente sofrerá tributação de 5%. Não é algo muito inteligente. Pode ser seguro mas não é esperto.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atualmente, em 1997, quando estou escrevendo este livro, as condições de mercado são exatamente o oposto do registrado cinco anos atrás. O mercado de Phoenix é a inveja dos Estados Unidos. As casas que eram vendidas a US$60 mil, valem agora US$110 mil. Há ainda oportunidades, mas me custariam um ativo valioso, meu tempo, sair por aí atrás delas. São raras. Mas hoje há milhares de compradores buscando esses negócios e apenas uns poucos fariam sentido financeiramente. O mercado mudou. É tempo de mudar e buscar outras oportunidades para sua coluna de ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '“Você não pode fazer isso aqui.” “Isso é contra a lei.” “Você está mentindo.” Ouço esses comentários com muito mais frequência do que “Você pode me mostrar como fazer isso?”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A matemática é simples. Você não precisa de álgebra ou de cálculo. Não escrevo muito porque a financeira cuida do lado legal da transação e do controle do pagamento. Não preciso consertar tetos ou instalações hidráulicas porque os proprietários cuidam disso. É a casa deles. De vez em quando alguém não paga. E isso é muito bom porque há multas de mora ou eles se mudam e a propriedade é vendida de novo. O sistema judiciário cuida disso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pode até não funcionar na sua região. As condições de mercado podem ser diferentes. Mas o exemplo ilustra como um processo financeiro simples cria centenas de milhares de dólares com pouco dinheiro e baixo risco. É um exemplo de dinheiro sendo apenas um contrato. Qualquer pessoa com instrução secundária pode fazer isso.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Contudo, muita gente não o faz. Muita gente segue o conselho padrão: “Trabalhe arduamente e poupe dinheiro.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Com cerca de trinta horas de trabalho, foram criados aproximadamente US$190 mil na coluna de ativos sem se pagar impostos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que lhe parece mais complicado?' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Trabalhar arduamente, pagar impostos com alíquota de 50%, poupar o que sobra (suas poupanças rendem 5%, que também são tributados)?' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'OU' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Despender tempo para desenvolver sua inteligência financeira e dominar o poder de seu cérebro e a coluna dos ativos?' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Acrescente a isso o tempo, e este é um de seus maiores ativos, que levará para poupar US$190 mil se você escolher a opção 1.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Agora você pode entender por que balanço a cabeça silenciosamente quando ouço pais dizerem: “Meu filho está indo muito bem na escola e está recebendo uma boa instrução.” Pode ser bom, mas é adequado?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sei que essa estratégia de investimento é pequena. Foi usada para mostrar como o pequeno pode transformar-se em grande. Novamente, meu sucesso reflete a importância de um sólido embasamento financeiro, o que começa com uma boa instrução financeira. Já disse antes mas vale a pena repetir — a inteligência financeira é constituída por estas quatro habilidades técnicas:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Alfabetização financeira. A capacidade de entender números.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Estratégias de investimento. A ciência do dinheiro fazendo dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. O mercado. Oferta e demanda. Alexander Graham Bell deu ao mercado o que este desejava. Bill Gates fez o mesmo. Uma casa de US$75 mil oferecida por US$60 mil e que custou US$20 mil também foi o resultado de perceber uma oportunidade criada pelo mercado. Alguém estava comprando e alguém estava vendendo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4.A lei. O conhecimento de lei e regulamentos estaduais e nacionais sobre contabilidade e empresas. Recomendo que se jogue dentro das regras.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'São os fundamentos básicos ou a combinação destas habilidades o necessário para ser bem-sucedido na busca da riqueza, seja pela compra e venda de pequenos imóveis, grandes apartamentos, empresas, ações, títulos, fundos mútuos, metais preciosos, cartões de beisebol ou coisas do gênero.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por volta de 1996, o mercado imobiliário tinha se recuperado e todos estavam entrando. O mercado de ações estava em alta e todos estavam entrando. A economia dos Estados Unidos punha-se de pé novamente. Comecei a vender em 1996 e viajei para o Peru, Noruega, Malásia e Filipinas. Os investimentos tinham mudado. Nós estávamos fora do mercado imobiliário pelo menos no que se referia a compras. Eu apenas observava o aumento dos valores da coluna de ativos e provavelmente começaria a vender mais para o fim do ano. Isto estava dependendo de algumas alterações na legislação serem aprovadas pelo Congresso. Desconfio que alguns desses pequenos negócios imobiliários começarão a ser vendidos e a promissória de US$40 mil será convertida em dinheiro. Preciso consultar meus contadores e me preparar para liquidá-la e procurar formas de resguardar o dinheiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que desejo ressaltar aqui é que os investimentos vêm e vão, os mercados sobem e descem, as economias melhoram e entram em crise. O mundo está sempre lhe apresentando oportunidades únicas, a cada dia de sua vida, mas, na maior parte das vezes, não conseguimos percebê-las. Mas elas estão lá. E quanto mais o mundo muda e quanto mais a tecnologia progride, maiores oportunidades existirão para permitir que você e sua família estejam seguros pelas próximas gerações.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Então, por que desenvolver sua inteligência financeira? Repito, só você pode responder a isso. Sei por que eu continuo a aprender e desenvolver. Eu o faço porque sei que estão vindo mudanças. Prefiro saudar a mudança do que me agarrar ao passado. Sei que haverá expansões do mercado e crises. Quero desenvolver continuamente minha inteligência financeira porque, a cada mudança, algumas pessoas estarão de joelhos suplicando por seus empregos. Outras, entretanto, pegarão os limões que a vida lhes dá — e ela nos dá a todos, ocasionalmente — e os transformarão em milhões. Isso é inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas vezes me perguntam sobre os limões que transformei em milhões. Hesito, porém, em usar mais exemplos de investimentos pessoais. Hesito porque tenho medo de que pareça bravata ou autoelogio. Não é essa minha intenção. Uso os exemplos apenas como ilustração numérica e cronológica de casos concretos e simples. Uso os meus exemplos porque quero que você saiba que é fácil. Torna-se mais fácil quanto mais você se familiariza com os quatro pilares da inteligência financeira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pessoalmente, emprego dois veículos principais para obter crescimento financeiro: imóveis e ações de pequenas empresas. Os imóveis são a base. Todo dia meus imóveis geram um fluxo de caixa e de tanto em tanto seu valor aumenta. As ações são usadas para obter um crescimento rápido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Não recomendo nada do que faço. Os exemplos são apenas isso: exemplos. Se a oportunidade é muito complexa e eu não entendo o investimento, não faço. Matemática simples e bom-senso são tudo o de que se necessita para alcançar sucesso financeiro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há cinco razões para usar os exemplos:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1.1. Inspirar as pessoas para que aprendam mais.' },

      { tipo: 'br', texto: '' },

      { tipo: 'i', texto: '2.2. Mostrar às pessoas que tudo é fácil se o embasamento é sólido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '3. 3. Mostrar que qualquer um pode obter uma grande fortuna.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '4.4. Mostrar que há milhões de maneiras de atingir nossos objetivos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '5. 5. Mostrar que isto não é ciência espacial.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1989, eu costumava correr numa bela região de Portland, Oregon. Era um subúrbio com lindas casas que pareciam de boneca. Eram pequenas e lindas. Eu quase que esperava encontrar na calçada Chapeuzinho Vermelho a caminho da casa da Vovó.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Por todo lugar havia cartazes de “vende-se”. O mercado de toras de madeira estava em crise, e o mercado de ações acabara de entrar em colapso e a economia estava deprimida. Numa rua notei um cartaz, que parecia pregado lá há mais tempo que os outros, anunciando a venda de uma casa. Correndo por lá um dia encontrei o dono da casa que tinha um ar preocupado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Quanto o senhor quer pela casa? — perguntei. O dono se virou e deu um sorriso desanimado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Faça uma oferta — disse. — Está à venda há um ano. Ninguém mais aparece para vê-la.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Vou olhar — disse eu, e meia hora depois comprava a casa por menos de US$20 mil do que o proprietário pedira originalmente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Era uma bela casinha de dois quartos, com enfeites de madeira em todas as janelas. Sua cor era azul com detalhes cinza e fora construída em 1930. Em seu interior uma lareira de pedra. Uma casa perfeita para se alugar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Dei uma entrada de US$5 mil por uma casa de US$45 mil, mas que realmente valia US$65 mil, embora ninguém quisesse comprá-la. O proprietário a desocupou em uma semana, feliz de se ver livre dela e logo chegou meu inquilino, um professor da escola local. Depois de pagar a hipoteca e despesas diversas, eu ficava com US$40 ao fim de cada mês. Nada muito empolgante.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um ano depois, o mercado imobiliário deprimido do Oregon começou a se recuperar. Os investidores da Califórnia, cheios de dinheiro obtido em seu mercado imobiliário ainda em expansão, estavam se deslocando para o norte e comprando imóveis no Oregon e em Washington.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Vendi a casinha por US$95 mil a um casal californiano que achou que estava diante de uma pechincha. Meu ganho de capital de cerca de US$40 mil foi empregado numa aplicação amparada pela sessão 1031[19] e comecei a procurar um lugar onde pôr o dinheiro. Em um mês encontrei um prédio com doze apartamentos perto da fábrica da Intel em Beaverton, Oregon. Seus donos moravam na Alemanha e não tinham ideia de quanto valia o local e, novamente, só queriam se desfazer do imóvel. Ofereci US$275 mil por um prédio que valia US $450 mil. Concordaram com US$300 mil. Comprei e fiquei com ele por dois anos. Utilizando o mesmo processo de troca de imóveis com tributação deferida, minha mulher e eu vendemos o prédio por US $495 mil e compramos outro com trinta apartamentos, em Phoenix, Arizona. Naquela época nos mudamos para Phoenix, para sair de uma crise, e teríamos de vendê-lo de qualquer maneira. O preço do prédio de trinta apartamentos era de US$875 mil com entrada de US$225 mil. O fluxo de caixa decorrente do aluguel dos trinta apartamentos era de pouco mais de US$5 mil ao mês. O mercado de imóveis do Arizona começou a subir e, em 1996, um investidor do Colorado nos ofereceu US$1,2 milhão pelo imóvel.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Minha mulher e eu pensamos em vendê-lo mas decidimos esperar para ver se a legislação relativa a ganhos de capital seria alterada pelo Congresso. Se mudasse o imóvel deveria aumentar, acredito, outros 15% ou 20%. Além disso, os US$5 mil ao mês eram um bom fluxo de caixa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Este exemplo mostra como é possível transformar uma pequena soma de dinheiro em outra muito maior. Repito, é uma questão de entender demonstrações financeiras, estratégias de investimento, sentir o mercado e conhecer as leis. Se as pessoas não são versadas nesses tópicos, então tenderão a seguir o dogma padrão, que é buscar segurança, diversificar e só aplicar em investimentos seguros. O problema é que investimentos “seguros” muitas vezes são esterilizados. Isto é, são tão seguros que seus ganhos são menores.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A maioria das corretoras não tocará em transações especulativas para se proteger a si próprias e a seus clientes. E essa é uma política sábia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Os negócios realmente quentes não são oferecidos aos novatos. Normalmente, os melhores negócios, que tornam os ricos ainda mais ricos, são reservados para aqueles que entendem o jogo. É tecnicamente ilegal oferecer a alguém que não é considerado “sofisticado” esses negócios especulativos, mas, naturalmente, acontece.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quanto mais “sofisticado” me torno, mais oportunidades aparecem no meu caminho. Outro argumento para desenvolver sua inteligência financeira, ao longo da vida, é, simplesmente, que mais oportunidades são apresentadas a você. E quanto maior for sua inteligência financeira mais fácil será reconhecer um bom negócio. Quanto mais aprendo — e há muito a aprender — mais dinheiro ganho, simplesmente porque com o passar dos anos acumulo experiência e sabedoria. Tenho amigos que se aprisionam à segurança, trabalhando com afinco em suas profissões, e que não conseguem adquirir sabedoria financeira, que leva tempo para ser desenvolvida.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'De modo geral, minha filosofia é plantar sementes em minha coluna de ativos. Essa é a minha fórmula. Começo com pouco e planto sementes. Algumas se desenvolvem; outras não.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na nossa empresa imobiliária há propriedades que valem muitos milhões. É nosso próprio Truste de Investimento em Imóveis. A maioria desses milhões partiu de investimentos mínimos, da ordem de US$5 mil ou US$10 mil. Todas essas entradas foram beneficiadas por terem ocorrido em momentos de rápida ascensão do mercado, aumentos isentos de imposto, compras e vendas feitas repentinamente ao longo de alguns anos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Também temos um portfólio de ações, abrigado em uma empresa que minha mulher e eu chamamos de nosso fundo mútuo pessoal. Temos amigos que fazem negócios especificamente com investidores como nós, de modo que temos a cada mês dinheiro extra para investir. Compramos ações de empresas de capital fechado, de alto risco, especulativas, que estão próximas de serem listadas em bolsas dos Estados Unidos ou do Canadá. Um exemplo de como é possível obter ganhos rápidos são 100 mil ações compradas a 25 centavos pouco antes da abertura de capital da empresa. Seis meses depois, a empresa estava listada em bolsa e as 100 mil ações agora valem US$2 cada uma. Se a empresa for bem administrada, o preço continuará subindo e as ações podem alcançar US$20 ou mais, cada uma. Houve ocasiões em que nossos US$25 mil se transformaram em um milhão em menos de um ano.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você sabe o que está fazendo, você não está jogando. É jogo quando você põe dinheiro em um negócio e reza para que dê certo. O importante é usar conhecimento técnico, sabedoria e amor ao jogo para minimizar os riscos. Naturalmente sempre há algum risco. É a inteligência financeira que aumenta as chances. Assim, o que é muito arriscado para uma pessoa é menos arriscado para outra. Essa é a principal razão pela qual incentivo sempre as pessoas a investir mais em sua instrução financeira do que em ações, imóveis ou outros mercados. Quanto mais esperto você for, mais chances terá de reduzir Os riscos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As ações nas quais eu invisto são extremamente arriscadas para a maioria das pessoas e não aconselho de forma alguma que outros o façam. Estou nesse jogo desde 1979 e já paguei mais do que devia por elas. Mas se você reler por que tais investimentos são um alto risco para a maioria das pessoas, poderá organizar sua vida de modo diferente, de modo a que a habilidade de pegar US$25 mil e transformá-los em US$1 milhão em um ano seja de baixo risco para você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Como já disse anteriormente, nada do que escrevi é uma recomendação. São exemplos do que é simples e possível. O que faço é café pequeno no esquema das coisas, contudo, para o indivíduo médio, uma renda de US$100 mil ao ano sem fazer muita força é agradável e não muito difícil de obter. Dependendo do mercado e do quão esperto você for, isso pode ser conseguido num prazo de cinco a dez anos. Se mantiver suas despesas correntes em um nível modesto, US$100 mil como renda adicional é bom, não importando se você trabalha. Você pode trabalhar se quiser ou tirar folga e usar o sistema tributário a seu favor e não contra você.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Minha base pessoal são os imóveis. Adoro imóveis porque são estáveis e mudam devagar. Mantenho essa base sólida. O fluxo de caixa é constante e, se administrado adequadamente, tem boas chances de ter seu valor aumentado. A beleza de uma sólida base em imóveis é que ela me permite arriscar um pouco mais com as ações especulativas que compro.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se tenho grandes lucros no mercado de ações, pago o imposto sobre os ganhos de capital e reinvisto o que sobra em imóveis, garantindo assim o alicerce de meus ativos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma última palavra sobre imóveis. Tenho viajado por todo o mundo ensinando a investir. Em todas as cidades ouço as pessoas dizerem que não há imóveis baratos. Não é essa minha experiência. Mesmo em Nova York ou Tóquio, ou mesmo nos arredores das cidades, há pechinchas desprezadas pela maioria das pessoas. Em Cingapura, que atualmente registra uma alta no preço dos imóveis, podem se encontrar ainda pechinchas em locais não muito distantes. Logo, sempre que ouço alguém me dizer “Você não pode fazer isso aqui”, respondo que talvez a afirmação adequada seja: “Não sei como fazer isso aqui... ainda.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'As grandes oportunidades não são vistas com os olhos. São vistas com a mente. Muita gente não ficará rica nunca simplesmente porque não tem o treinamento financeiro para reconhecer oportunidades que estão bem à sua frente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitas vezes me perguntam: “Como começo?”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No último capítulo, mostro dez passos que segui na trajetória para minha independência financeira. Mas sempre lembro que é preciso que seja divertido. É apenas um jogo. Algumas vezes você ganha e outras aprende. Mas divirta-se. A maioria das pessoas jamais ganha porque tem medo de perder. É por isso que a escola é tão tola. Na escola aprendemos que os erros são maus e somos punidos por cometê-los. Contudo, se você prestar atenção à maneira como os seres humanos aprendem, verá que aprendemos errando. Aprendemos a andar, caindo. Se nunca cairmos, não andaremos nunca. O mesmo quanto a andar de bicicleta. Ainda tenho cicatrizes nos joelhos, mas hoje ando de bicicleta sem pensar. O mesmo vale para enriquecer. Infelizmente, a principal razão pela qual a maioria das pessoas não é rica é por seu pavor de perder. Os vencedores não têm medo de perder. Mas os perdedores, sim. Os fracassos são parte do processo do sucesso. As pessoas que evitam os fracassos também evitam os sucessos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Penso no dinheiro de forma semelhante ao meu jogo de tênis. Jogo muito, erro, corrijo, erro mais, volto a corrigir e melhoro meu jogo. Se eu perder o jogo, vou até a rede e aperto a mão de meu adversário, sorrio e digo: “Até sábado.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há dois tipos de investidor:' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. O primeiro e mais comum são as pessoas que compram um investimento empacotado. Eles procuram um varejista, seja uma imobiliária, seja um corretor ou um consultor financeiro e compram alguma coisa. Pode ser um fundo mútuo, um truste de investimentos imobiliários, ações ou títulos. É uma forma bem limpa e simples de investir. Pode ser comparado à pessoa que vai à loja e compra um computador direto da prateleira.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. O segundo são os investidores que criam investimentos. Este investidor em geral organiza o negócio de forma semelhante às pessoas que compram os componentes e montam seu computador. É algo sob medida. Eu não sei como juntar componentes de computador. Mas sei como juntar oportunidades ou conheço gente que sabe.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'É este segundo tipo que tem mais probabilidade de se tornar um investidor profissional. Algumas vezes são necessários anos para se juntarem todas as peças. E às vezes nunca se consegue isso. Meu pai rico me incentivou a ser este tipo de investidor. É importante aprender a juntar as peças porque é aí onde estão os grandes ganhos e, se a maré é adversa, as grandes perdas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você quer ser o segundo tipo de investidor, precisa desenvolver três habilidades principais. Estas se somam áquelas necessárias para se adquirir a inteligência financeira.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Como encontrar uma oportunidade que ninguém mais viu. Você vê com sua mente o que os outros veem com os olhos. Por exemplo, um amigo comprou uma casa caindo aos pedaços. Era assustador olhar para ela, todos se perguntavam por que ele a teria comprado. O que ele viu e nós não vimos foi que junto com a casa, a compra envolvia mais quatro lotes de terreno vazio. Ele verificou isso indo à imobiliária. Depois de comprar a casa, ele a demoliu e vendeu os cinco lotes para um construtor por três vezes o que tinha pago. Ele ganhou US$75 mil em dois meses de trabalho. Não é muito dinheiro, mas sem dúvida é muito mais do que o salário mínimo, e não há muitas dificuldades técnicas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '2. Como conseguir dinheiro. Em geral as pessoas só procuram o banco. Esse segundo tipo de investidor precisa saber onde levantar recursos e há muitas formas de fazê-lo sem ir ao banco. Para começar, aprendi a comprar imóveis sem precisar de banco. Não é tanto pelos imóveis, mas pela aprendizagem de como conseguir o dinheiro, o que não tem preço.' },

      { tipo: 'br', texto: '' },

{ tipo: 'blockquote', texto: 'Muito frequentemente ouço as pessoas dizerem “O banco não me dá um empréstimo”, ou “Não tenho dinheiro para comprar isso”. Se você quiser se tornar um investidor do tipo 2, precisará aprender a fazer o que atrapalha tanta gente. Em outras palavras, a maioria das pessoas deixa que a falta de dinheiro as impeça de fechar um negócio. Se você puder evitar esse obstáculo, estará milhões à frente dos que não aprenderam essas habilidades. Muitas vezes adquiri uma casa ou ações ou um prédio de apartamentos sem ter um tostão no banco. Uma vez comprei um prédio por US$1,2 milhão. O que eu fiz é chamado “amarrar” a transação com um contrato escrito entre comprador e vendedor. Então, consegui o necessário para pagar o depósito de US$100 mil, o que me permitiu obter noventa dias para levantar o resto do dinheiro. Por que eu fiz isso? Simplesmente sabia que o prédio valia US$2 milhões. Nunca levantei o dinheiro. Em lugar disso, a pessoa que depositou os US $100 mil me deu US$50 mil por ter encontrado o prédio, assumiu minha posição e eu saí do negócio. Total de tempo de trabalho: três dias. Repito, conta mais o que você sabe do que o que você compra. Investir não é comprar. É conhecer.' },

      { tipo: 'br', texto: '' },

{ tipo: 'i', texto: '1. Como organizar pessoas espertas. Pessoas inteligentes são aquelas que trabalham com, ou contratam, uma pessoa mais inteligente do que elas. Quando você precisar de orientação assegure-se de escolher sabiamente seu conselheiro.' },

      { tipo: 'br', texto: '' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há muito o que aprender, mas a recompensa pode ser astronômica. Se você não quer aprender estas habilidades, então é aconselhável ser um investidor do tipo 1. Sua maior riqueza é o que você sabe. Seu maior risco é o que você não conhece.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sempre há risco, de modo que aprenda a administrá-lo em vez de evitá-lo.' },

      //CAPÍTULO SETE
      { tipo: 'h3', texto: 'CAPÍTULO SETE' },
      { tipo: 'h3', texto: 'Lição 6:' },
      { tipo: 'h2', texto: 'Trabalhe para aprender — não trabalhe pelo dinheiro' },
      
      { tipo: 'em', texto: 'E' },
      
      { tipo: 'small', texto: 'm 1995, concedi uma entrevista a um jornal de Cingapura. A jovem repórter chegou na hora e, imediatamente, começou a entrevista. Sentamos no hall de entrada de um hotel luxuoso, tomamos café e falamos do objetivo de minha visita à cidade. Eu devia dividir o palco com Zig Ziglar. Ele falaria de motivação e eu dos “Segredos dos Ricos”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Gostaria de ser, um dia, uma autora de best-sellers como o senhor — disse ela. Eu já lera alguns de seus artigos de jornal e ficara impressionado. Ela tinha um estilo forte e claro. Seus artigos atraíam o interesse do leitor.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— A senhora tem ótimo estilo — respondi. — O que a impede de alcançar seu sonho?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Parece que não consigo ir adiante — ela respondeu calmamente. — Todos dizem que meus romances são ótimos, mas não acontece nada. De modo que continuo no jornal. Pelo menos dá para pagar as contas. O senhor teria alguma sugestão?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sim — retruquei animadamente. — Um amigo meu tem, aqui em Cingapura, um curso que ensina as pessoas a vender. Ele dá cursos de treinamento em vendas para as principais empresas desta cidade e penso que se a senhora assistisse a um de seus cursos, sua carreira poderia se beneficiar bastante.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ela se espantou:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor está dizendo que eu deveria aprender a vender? Balancei a cabeça afirmativamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O senhor está falando sério?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Voltei a fazer que sim com a cabeça. “O que há de errado com isso?” Agora eu estava recuando. Ela se ofendera com o que eu disse. Preferiria não ter dito nada. Em minha tentativa de ser útil, comecei a defender minha sugestão.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Tenho um mestrado em literatura inglesa. Por que frequentaria um curso de vendas? Sou uma profissional. Fui para a universidade para não ser vendedora. Odeio vendedores. Eles só pensam em dinheiro. Diga-me, para que vou estudar vendas? — ela começou a arrumar suas coisas. A entrevista tinha acabado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na mesa em frente ao sofá estava um exemplar de um best-seller que eu publicara. Peguei o livro e algumas notas que ela fizera num bloco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na mesa em frente ao sofá estava um exemplar de um best-seller que eu publicara. Peguei o livro e algumas notas que ela fizera num bloco.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Está vendo isto? — disse eu apontando para suas anotações. Ela olhou para o bloco:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O quê? — ela disse confusa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Novamente, apontei para suas anotações. No bloco ela escrevera “Robert Kiyosaki, autor de best-sellers”. — Aqui fala “autor de bestsellers”, não diz “melhor escritor”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Seus olhos se arregalaram imediatamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Sou um péssimo escritor. Você é uma grande escritora. Eu frequentei cursos de vendas. Você tem um mestrado. Junte as duas coisas e você terá uma “autora de best-sellers” e uma “boa escritora”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Seu olhar estava enfurecido.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Nunca me rebaixarei tanto quanto chegar a aprender como vender. Pessoas como o senhor não têm nada que ficar escrevendo. Fui treinada profissionalmente para escrever e o senhor para vender. Não é justo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Guardou o resto de suas notas e disparou pelas amplas portas de vidro para a úmida manhã de Cingapura.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pelo menos, na manhã seguinte, sua reportagem era equilibrada e favorável.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O mundo está cheio de gente inteligente, talentosa, instruída e qualificada. Encontramos com elas todos os dias. Estão todas em volta de nós.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Alguns dias atrás, meu carro estava com problemas. Entrei numa oficina e o jovem mecânico o consertou em alguns minutos. Ele sabia o que estava errado apenas pelo barulho do motor. Fiquei impressionado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A triste verdade é que um grande talento não é suficiente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Sempre fico chocado ao perceber o pouco que ganham as pessoas talentosas. Ouvi outro dia que menos de 5% dos americanos ganham mais de US$100 mil ao ano. Já encontrei gente muito instruída, brilhante, que ganha menos de US$20 mil ao ano. Um consultor comercial especializado na área médica me dizia que muitos médicos, dentistas e quiropráticos têm dificuldades financeiras. Até então eu pensava que, quando eles se formassem, os dólares choveriam. Foi esse consultor que me disse: “Eles estão uma habilidade atrás da grande riqueza.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O que isso quer dizer é que muitas pessoas precisam apenas aprender e dominar uma habilidade a mais e sua renda aumentará exponencialmente. Já mencionei que a inteligência financeira é uma sinergia entre contabilidade, investimento, marketing e direito. Combine essas quatro habilidades técnicas e ganhar dinheiro, com dinheiro, será mais fácil. Quando se fala de dinheiro a única habilidade que a maioria das pessoas conhece é trabalhar mais.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O exemplo clássico de sinergia de habilidades era essa jovem jornalista. Se ela aprendesse ativamente as habilidades de vendas e marketing, sua renda poderia aumentar de forma espetacular. Se eu fosse ela, faria alguns cursos de redação publicitária além de vendas. Então, em vez de trabalhar no jornal, eu procuraria um emprego em uma agência de publicidade. Mesmo se seu salário se reduzisse, ela aprenderia a comunicar-se “sinteticamente” como se faz com tanto sucesso na publicidade. Ela também aprenderia relações-públicas, uma habilidade importante. Aprenderia a como obter milhões em publicidade gratuita. Então, à noite e nos fins de semana ela poderia escrever seu grande romance. E, quando este tivesse terminado, ela estaria mais apta a vender seu livro. E, assim, em pouco tempo, ela poderia ser “autora de best-sellers”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando publiquei meu primeiro livro, If you want to be rich and happy, don'+"'t"+ 'go to school? [Se você quer ser rico e feliz, não vá para a escola?], um editor sugeriu que eu mudasse o título para A economia da educação. Falei que com um título como este eu só conseguiria vender dois exemplares: um para minha família, o outro para meu melhor amigo. O problema é que eles esperariam ganhá-lo. O agressivo título foi escolhido porque eu sabia que assim obteria toneladas de publicidade. Sou favorável à educação e acredito em reforma educacional. De outra forma, por que continuaria eu a pressionar por mudanças em nosso sistema de ensino antiquado? Por isso, escolhi um título que me permitisse ir a mais apresentações de televisão e rádio, simplesmente por causa da controvérsia. Muitas pessoas pensaram que eu era louco, mas o livro vendeu muito bem.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando me formei na Academia de Marinha Mercante dos Estados Unidos, em 1969, meu pai instruído ficou feliz. A Standard Oil da Califórnia me contratara para sua frota de navios-tanque. Eu era terceiro imediato e o salário era baixo em comparação ao de meus colegas, mas era um bom emprego para um recém-formado. Meu salário inicial era de cerca de US$42 mil ao ano, incluindo as horas extras, e eu só trabalhava durante sete meses. Tinha cinco meses de férias. Se eu quisesse poderia ter ido para o Vietnã com uma empresa de navegação subsidiária e teria com facilidade dobrado meu salário em vez de descansar nas férias.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Tinha uma grande carreira à minha frente, contudo me demiti seis meses depois e fui para a Marinha dos Estados Unidos para aprender a voar. Meu pai instruído ficou arrasado. Pai rico me deu parabéns.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Na escola e no local de trabalho estava na moda a “especialização”. Isto é, para ganhar mais ou obter uma promoção era necessário especializar-se em algo como ortopedia ou pediatria. O mesmo se aplica a contadores, arquitetos, advogados, pilotos e outros.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído acreditava no mesmo dogma e ficou empolgado quando finalmente obteve um doutorado. Ele muitas vezes admitia que as escolas recompensam pessoas que estudam mais e mais a respeito de menos e menos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico me incentivava a fazer exatamente o oposto. “Você precisa saber um pouco sobre várias coisas” era a sua sugestão. É por isso que durante anos trabalhei em diferentes áreas de suas empresas. Por um tempo, trabalhei no departamento de contabilidade. Embora eu provavelmente nunca chegasse a ser um contador, ele queria que eu aprendesse por “osmose”. Pai rico sabia que eu pegaria o “jargão” e o sentimento daquilo que é importante e do que não é importante. Também trabalhei como ajudante de garçom e como operário na construção, bem como em vendas, reservas e marketing. Ele estava “preparando” Mike e eu. Ele insistia em que nos sentássemos para assistir a seus encontros com diretores de banco, advogados, contadores e corretores. Queria que conhecêssemos um pouco sobre cada aspecto de seu império.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando abandonei meu emprego bem pago na Standard Oil, meu pai instruído teve uma conversa séria comigo. Ele estava perturbado. Ele não podia entender minha decisão de largar uma carreira que oferecia salário alto, grandes benefícios, muito tempo de folga e oportunidades de promoção. Quando me perguntou certa noite “Por que você se demitiu?”, eu não consegui, por mais que tentasse, explicar para ele. Minha lógica não se encaixava com a lógica dele. O grande problema é que minha lógica era a lógica de meu pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A segurança no emprego era tudo para meu pai instruído. Aprender era tudo para meu pai rico.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído pensou que eu tivesse ido para o curso para aprender a ser um comandante de navio. Pai rico sabia que eu estava lá para estudar comércio internacional. Enquanto estudava fiz transporte de cargas, naveguei em grandes cargueiros, em navios de passageiros pelo Extremo Oriente e pelo Pacífico Sul. Pai rico me incentivava a navegar pelo Pacífico em lugar de ir para a Europa porque sabia que as “nações emergentes” estavam na Ásia e não no velho continente. A maioria de meus colegas de turma, incluindo Mike, ainda participava de festas nas suas fraternidades,[20] e eu já estudava comércio, gente, estilos de negócio e culturas no Japão, Taiwan, Tailândia, Cingapura, Hong Kong, Vietnã, Coreia, Taiti, Samoa e Filipinas. Eu também frequentava festas, mas não em fraternidades. Cresci rapidamente.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído não conseguia entender por que eu me demitira do emprego e entrara para a Marinha dos Estados Unidos. Disse-lhe que queria aprender a voar, mas realmente queria aprender a comandar tropas. Pai rico me explicara que a parte mais difícil da condução de uma empresa é a gestão de pessoas. Ele passara três anos no exército; meu pai instruído tinha sido isento do serviço militar. Pai rico me falou do valor de aprender a liderar pessoas em situações difíceis. “Liderança é o que você precisa aprender agora”, dizia. “Se você não for um bom líder, receberá um tiro pelas costas, como ocorre nos negócios.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Ao voltar do Vietnã, em 1973, me desliguei embora adorasse voar. Consegui um emprego na Xerox Corp. Fui para lá por uma razão, e esta não estava nos benefícios. Eu era bastante tímido e a ideia de vender me parecia a coisa mais apavorante do mundo. A Xerox tem um dos melhores programas de treinamento em vendas dos Estados Unidos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico ficou muito orgulhoso de mim. Meu pai instruído ficou envergonhado. Sendo um intelectual, considerava que os vendedores estavam abaixo dele. Trabalhei na Xerox durante quatro anos, até que superei o medo de bater às portas e ser rejeitado. Ao alcançar, permanentemente, um lugar entre os cinco maiores vendedores, me demiti e fui em frente deixando atrás de mim outra grande carreira em uma ótima empresa.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em 1977 formei minha primeira empresa. Pai rico preparara Mike e eu para assumirmos empresas. De modo que agora eu precisava formá-las e pôlas a funcionar. Meu primeiro produto, uma carteira de náilon e velcro, era fabricado no Extremo Oriente e remetido a um armazém em Nova York, perto da escola que eu frequentara. Minha educação formal estava completa e era tempo de testar minhas asas. Se eu fracassasse, estaria falido. Pai rico achava que era melhor quebrar antes dos trinta. “Você ainda tem tempo de se recuperar”, era seu conselho. Na véspera de meu trigésimo aniversário, a primeira remessa saiu da Coreia para Nova York.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Hoje, ainda faço negócios internacionais. E conforme me incentivou pai rico, procuro os países emergentes. Minha empresa de investimentos opera na América do Sul, Ásia, Noruega e Rússia.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há um velho dito segundo o qual “Emprego é a sigla de Quase Quebrado”.[21] E, infelizmente, eu diria que isso se aplica a milhões de pessoas. Como a escola não acha que inteligência financeira seja inteligência, a maioria dos trabalhadores “vive dentro de suas posses”. Trabalham e pagam as contas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Há outra terrível teoria da administração que diz: “Os empregados trabalham apenas o suficiente para não serem demitidos e os empregadores pagam apenas o suficiente para os trabalhadores não irem embora.” E se você observa a escala salarial da maioria das empresas, diria que há uma certa verdade na afirmação.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O resultado líquido é que, em geral, os trabalhadores não progridem. Eles fazem o que foram ensinados a fazer: “Conseguir um emprego seguro.” A maioria dos empregados se concentra em salários e benefícios que os remuneram a curto prazo, mas que são frequentemente desastrosos a longo prazo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Já eu recomendo aos jovens que procurem emprego pelas oportunidades de aprendizado, mais do que pelo que possam receber. É preciso ver que habilidades se deseja adquirir antes de escolher uma profissão específica e antes de cair na Corrida dos Ratos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Uma vez aprisionadas num processo permanente de pagamento de contas, as pessoas se tornam como os pequenos hamsters que se movimentam em suas gaiolas. Suas pequenas pernas peludas correm agitadas, a roda gira furiosamente, mas dia vai, dia vem, elas ainda estão na mesma gaiola: grande emprego...' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'No filme Jerry Mguire, com Tom Cruise, há grandes bordões. Talvez o mais memorável seja “Mostre-me o dinheiro”. Mas há outra frase que me parece mais verdadeira. Aparece na cena em que Tom Cruise está saindo da empresa. Ele acaba de ser demitido e pergunta para toda a empresa: “Quem quer me acompanhar?” E todos permanecem silenciosos e petrificados. Apenas uma mulher se levanta e diz: “Eu gostaria, mas daqui a três meses serei promovida.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A afirmação é provavelmente a mais verdadeira de todo o filme. É o tipo de frase que as pessoas usam para continuar trabalhando de forma a pagar suas contas. Sei que meu pai instruído esperava por seu aumento anual, e todo ano ficava desapontado. Então ele voltava a estudar para se tornar mais qualificado de modo a poder ganhar outro aumento, mas novamente sofria uma decepção.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Frequentemente pergunto às pessoas: “Para onde essa atividade diária está levando você?” Como o pequeno hamster, duvido que as pessoas olhem para onde seu trabalho árduo as está levando. O que o futuro oferece?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Cyril Brickfiel, o antigo diretor executivo da Associação Americana de Aposentados, afirma que “as aposentadorias privadas estão um caos. Em primeiro lugar, 50% da força de trabalho não contam atualmente com fundos de pensão. Apenas isso já deveria ser motivo de grande preocupação. E de 75% a 80% dos demais têm aposentadorias desprezíveis que pagam US$55 ou US$150 ou US$300 por mês”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Em seu livro The retirement myth [O mito da aposentadoria], Craig S. Karpel escreve: “Visitei a sede de uma grande empresa nacional de consultoria especializada em aposentadorias e falei com uma diretora administrativa que planeja exuberantes planos para altos executivos. Quando lhe perguntei o que as pessoas comuns poderiam esperar receber como aposentadoria, ela disse com um sorriso confiante: “A Bala de Prata”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— O que é — perguntei — “A Bala de Prata”? Ela deu de ombros:' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: '— Se os baby boomers[22] descobrem que não têm dinheiro suficiente para viver quando forem mais velhos, eles sempre podem dar um tiro nos miolos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Karpel continua explicando a diferença entre os antigos planos de Benefícios Definidos e os novos planos de Contribuições Programadas que são mais arriscados. Não é um quadro animador para a maioria das pessoas que está trabalhando atualmente. E isso é só a aposentadoria. Quando se acrescentam despesas médicas e casas de repouso para idosos, o quadro se torna aterrador. Em seu livro de 1995, ela indica que as despesas hospitalares variam de US$30 mil a US$125 mil ao ano. Em uma casa de repouso para idosos, sem qualquer mordomia, a anuidade estava em torno de US$88 mil.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Muitos hospitais em países onde a medicina é socializada já têm que tomar decisões dramáticas como: “Quem permanecerá vivo e quem vai morrer?” Eles tomam essas decisões com base no orçamento e na idade dos pacientes. Os cuidados médicos são destinados ao paciente mais jovem. O paciente mais velho fica para o fim da fila. Assim como os ricos podem se permitir uma educação, eles também podem se manter vivos enquanto aqueles com pouca fortuna morrem.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Fico imaginando se há trabalhadores pensando no futuro ou se eles apenas se preocupam com o próximo contracheque sem questionar-se sobre o que virá mais adiante?' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando falo para adultos que querem ganhar mais dinheiro, sempre dou o mesmo conselho. Sugiro que pensem no longo prazo. Em lugar de trabalhar simplesmente pelo dinheiro e pela segurança que são, admito, importantes, sugiro que procurem um segundo emprego onde possam aprender outra habilidade. Muitas vezes recomendo que se integrem a uma empresa de marketing de rede, também chamado de marketing multinível, se quiserem adquirir habilidades de venda. Algumas dessas empresas têm excelentes programas de treinamento que ajudam as pessoas a suportar o medo do fracasso e da rejeição que são as principais razões pelas quais a maioria das pessoas não é bem-sucedida. A instrução vale mais do que o dinheiro, a longo prazo.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando ofereço esta sugestão, ouço muitas vezes: “Ah, isso é muito trabalhoso” ou “Só quero fazer o que me interessa”.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quanto à primeira resposta, retruco: “Então o senhor prefere passar a vida entregando 50% do que ganha ao governo?” Quanto à segunda observação, digo: “Eu não tenho interesse em ir à academia de ginástica, mas vou para me sentir melhor e viver mais.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Infelizmente há verdade no velho adágio “Não se pode ensinar truques novos a um cachorro velho”. A menos que a pessoa esteja acostumada a mudar, é difícil mudar.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Mas para aqueles que ainda estão em cima do muro em relação à ideia de trabalhar para aprender algo novo, ofereço esta palavra de incentivo: a vida se parece muito com ir à academia. A parte mais difícil é se decidir a começar. Uma vez feito isso, fica fácil. Em muitas ocasiões, ficava temeroso de ir para a academia, mas chegando lá, em movimento, era ótimo. Depois dos exercícios fico feliz de ter me decidido a ir.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Se você não está disposto a trabalhar para aprender algo novo e insiste em se especializar em sua área, assegure-se de trabalhar em uma empresa sindicalizada.[23] Os sindicatos foram planejados para proteger especialistas.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Meu pai instruído, depois de ter caído em desgraça junto ao governador, tornou-se presidente do sindicato de professores do Havaí. Ele dizia que esse era o trabalho mais pesado que já tivera na vida. Meu pai rico, por outro lado, passou toda sua vida fazendo o possível para que suas empresas não fossem sindicalizadas. Ele foi bem-sucedido. Embora os sindicatos fizessem força, pai rico sempre conseguiu combatê-los.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pessoalmente, não tomo partido porque posso ver a necessidade e os benefícios de ambas as situações. Se você seguir os conselhos da escola, tornando-se altamente especializado, então procure a proteção do sindicato. Por exemplo, se eu tivesse prosseguido minha carreira de piloto de aviões, eu teria procurado trabalhar em uma empresa em que o sindicato dos pilotos fosse forte. Por quê? Porque minha vida teria sido dedicada a aprender uma habilidade que só tem valor em um ramo de atividade. Se eu tivesse que abandonar esse ramo, as minhas habilidades não teriam valor em outras atividades. Um piloto sênior — com 100 mil horas de voo, ganhando US$150 mil ao ano — teria dificuldades em encontrar um emprego com igual remuneração no ensino escolar. As habilidades não se transferem necessariamente de um ramo de atividades para outro; os pilotos recebem salários altos por possuírem habilidade que não teriam valor, por exemplo, no sistema de ensino.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Atualmente se pode dizer o mesmo até no caso dos médicos. Com todas as mudanças ocorridas na medicina, os especialistas têm de se agrupar em organizações médicas como os planos de saúde. Sem dúvida que professores precisam se sindicalizar. Atualmente nos Estados Unidos o sindicato dos professores é o maior e mais rico deles. A Associação Nacional de Educação tem uma força política tremenda. Os professores precisam da proteção de seu sindicato porque suas habilidades também têm escasso valor fora da área da educação. De modo que regra prática é: “Se for atualmente especializado, sindicalize-se.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Quando pergunto às minhas turmas “Quais de vocês fazem um hambúrguer melhor do que o do McDonald'+"'"+'s?” quase todos levantam a mão. Então pergunto: “Se a maioria de vocês faz um hambúrguer melhor do que o do McDonald'+"'"+'s, como pode ser que o McDonald'+"'"+'s ganhe mais dinheiro do que vocês?”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A resposta é óbvia: o McDonald'+"'s"+' é um ótimo sistema de negócios. A razão pela qual tantas pessoas talentosas são pobres é que elas se concentram na preparação de um melhor hambúrguer e sabem muito pouco sobre sistemas de negócios.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Um amigo meu, do Havaí, é um grande artista. Ganha bastante dinheiro. Um dia o advogado de sua mãe ligou dizendo que ela lhe deixara US$35 mil. Isto é o que sobrou de seus bens depois que o advogado e o governo pegaram sua parte. Imediatamente, ele viu uma oportunidade de aumentar seus negócios usando parte desse dinheiro em publicidade. Dois meses depois, seu primeiro anúncio em cores, de página inteira, apareceu em uma revista cara voltada para os muito ricos. O anúncio foi publicado durante três meses. Ele não teve nenhum retorno e toda a sua herança foi embora. Agora ele quer processar a revista por ter sido enganado.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Este é um caso típico de alguém que pode fazer um belo hambúrguer mas conhece pouco de negócios. Quando eu lhe perguntei o que ele tinha aprendido, sua resposta foi que “publicitários são escroques”. Então lhe perguntei se ele não gostaria de fazer um curso de vendas e outro de marketing direto. Sua resposta foi: “Não tenho tempo e não quero jogar dinheiro fora.”' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'O mundo está cheio de pessoas talentosas. Com muita frequência, são pobres ou têm dificuldades financeiras ou ganham menos do que poderiam, não pelo que sabem mas pelo que não sabem. Concentramse em aperfeiçoar suas habilidades de fazer um melhor hambúrguer em vez de pensar em como vender e entregar esse hambúrguer. Talvez o McDonald'+"'s"+' não faça o melhor hambúrguer, mas é o melhor no ofício de vender e entregar um sanduíche básico médio.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai pobre queria que eu me especializasse. Era assim que ele achava que se ganhava mais. Mesmo depois de ouvir do governador do Havaí que não poderia mais trabalhar no governo do estado, meu pai instruído continuou me incentivando a me especializar. Pai pobre então encampou a causa do sindicato dos professores, fazendo campanhas por mais proteção e maiores benefícios para esses profissionais altamente especializados e instruídos. Ele nunca entendeu que quanto mais especializado você se torna mais você fica amarrado e dependente dessa especialização.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'Pai rico aconselhava Mike e eu a nos “prepararmos”. Muitas grandes empresas fazem o mesmo: procuram jovens recém-formados nas faculdades e começam a “preparar” essas pessoas para exercer, um dia, altos cargos na organização. Esses jovens brilhantes não se especializam em um departamento; eles percorrem os vários departamentos para aprender todos os aspectos dos sistemas de negócios. Os ricos frequentemente “preparam” seus filhos ou os filhos dos outros. Ao fazê-lo, seus filhos adquirem uma visão geral das operações da empresa e conhecem a inter-relação entre os vários departamentos.' },

      { tipo: 'br', texto: '' },

{ tipo: 'big', texto: 'A geração da Segunda Guerra Mundial considerava “ruim” ficar trocando de emprego. Hoje considera-se uma atitude inteligente. Já que as pessoas ficarão mudando de emprego em lugar de buscar maior especialização, por que não pensar em “aprender” mais do que em “canhar”? No curto prazo, você pode ganhar menos. No longo prazo, resultará em grandes dividendos.' },

      { tipo: 'br', texto: '' },
